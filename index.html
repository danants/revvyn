<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revvyn — Governance Sandbox</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◈</text></svg>">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
/* ── Palette ──────────────────────────────────────────────── */
:root{
  --bg:#070D18;--surface:#0B1220;--surface2:#0F1829;--card:#0D1624;
  --border:#1A2840;--border2:#243858;
  --text:#E8EDF5;--muted:#5E7494;--dim:#253548;
  --gold:#C49A2C;--gold2:#A8821E;--gold-glow:rgba(196,154,44,.15);
  --serif:'Cormorant Garamond',serif;--mono:'DM Mono',monospace;
  --red:#E05252;--green:#3DB88A;--blue:#4A9EFF;--amber:#D4914A;--violet:#8B72D4;--rose:#C46E8A;
}
html[data-theme="light"]{
  --bg:#F4EFE3;--surface:#EDE7D8;--surface2:#E6DFCE;--card:#E9E3D2;
  --border:#C9BFA6;--border2:#B8AE94;
  --text:#18202E;--muted:#7A6E5A;--dim:#B8AE94;
  --gold:#9A7818;--gold2:#7D6010;--gold-glow:rgba(154,120,24,.12);
}

/* ── Reset ──────────────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);-webkit-font-smoothing:antialiased}

/* ── Grain overlay ──────────────────────────────────────────── */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;
  opacity:.028;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px 200px;
}
html[data-theme="light"] body::after{opacity:.04}

/* ── Scrollbar ──────────────────────────────────────────────── */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── Animations ─────────────────────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes goldGlow{0%,100%{box-shadow:0 0 18px var(--gold-glow)}50%{box-shadow:0 0 36px var(--gold-glow),0 0 60px rgba(196,154,44,.06)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes borderPulse{0%,100%{border-color:rgba(196,154,44,.3)}50%{border-color:rgba(196,154,44,.7)}}

select option{background:var(--surface);color:var(--text)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

// ─── Agents ───────────────────────────────────────────────────────────────────────
const AGENTS=[
  {id:"orchestrator",name:"Orchestrator",icon:"◉",color:"#C49A2C",role:"Intent classification"},
  {id:"governance",  name:"Governance",  icon:"⬡",color:"#8B72D4",role:"Policy & compliance"},
  {id:"control",     name:"Control",     icon:"◆",color:"#4A9EFF",role:"Risk & rail selection"},
  {id:"execution",   name:"Execution",   icon:"▸",color:"#3DB88A",role:"Settlement"},
  {id:"audit",       name:"Audit",       icon:"◫",color:"#C46E8A",role:"Explainability"},
];

// ─── Verticals ────────────────────────────────────────────────────────────────────
const VERTICALS={
  treasury:{id:"treasury",label:"Enterprise Treasury",icon:"◈",accent:"#C49A2C",
    desc:"Cross-border vendor payments, FX optimisation, multi-bank routing",
    defaults:{amount:250000,currency:"USD",fromCountry:"US",toCountry:"DE",toCurrency:"EUR",beneficiary:"Siemens AG",purpose:"Vendor invoice #INV-2026-4471",urgency:"standard",intentSource:"erp"},
    policies:{maxSingle:500000,maxDaily:2000000,requireApproval:100000,dualApproval:250000,agentHitlThreshold:50000,sanctions:["KP","IR","SY","CU","RU"],kycRequired:true,verifiableIntent:true,hitl:true,killswitch:true}},
  marketplace:{id:"marketplace",label:"Marketplace",icon:"◇",accent:"#4A9EFF",
    desc:"Seller payouts, split settlements, multi-currency disbursements",
    defaults:{amount:3200,currency:"USD",fromCountry:"US",toCountry:"IN",toCurrency:"INR",beneficiary:"Seller #SKU-88912",purpose:"Weekly payout",urgency:"standard",intentSource:"human"},
    policies:{maxSingle:50000,maxDaily:500000,requireApproval:25000,dualApproval:50000,agentHitlThreshold:10000,sanctions:["KP","IR","SY"],kycRequired:true,verifiableIntent:true,hitl:true,killswitch:true}},
  ai_commerce:{id:"ai_commerce",label:"AI-to-AI Commerce",icon:"◎",accent:"#8B72D4",
    desc:"Autonomous agent transactions, programmatic spend governance",
    defaults:{amount:890,currency:"USD",fromCountry:"US",toCountry:"SG",toCurrency:"USD",beneficiary:"Agent-API-7x9k2",purpose:"Autonomous procurement — cloud compute",urgency:"urgent",intentSource:"openai"},
    policies:{maxSingle:10000,maxDaily:100000,requireApproval:5000,dualApproval:10000,agentHitlThreshold:2000,sanctions:["KP","IR","SY","CU"],kycRequired:false,verifiableIntent:true,hitl:true,killswitch:true}},
  insurance:{id:"insurance",label:"Insurance",icon:"◑",accent:"#D4914A",
    desc:"Claims payments, compensation decisions, reinsurance settlements",
    defaults:{amount:47500,currency:"USD",fromCountry:"US",toCountry:"UK",toCurrency:"GBP",beneficiary:"Claimant #CLM-2026-8841",purpose:"Motor claim settlement — total loss",urgency:"standard",intentSource:"erp"},
    policies:{maxSingle:500000,maxDaily:5000000,requireApproval:25000,dualApproval:100000,agentHitlThreshold:10000,sanctions:["KP","IR","SY","CU","RU"],kycRequired:true,verifiableIntent:true,hitl:true,killswitch:true}},
  enterprise:{id:"enterprise",label:"Enterprise Direct",icon:"◐",accent:"#3DB88A",
    desc:"Complex multi-entity payments, ERP integration, global compliance",
    defaults:{amount:1200000,currency:"USD",fromCountry:"US",toCountry:"JP",toCurrency:"JPY",beneficiary:"Toyota Motor Corp",purpose:"Strategic supplier — Q1 manufacturing",urgency:"standard",intentSource:"erp"},
    policies:{maxSingle:5000000,maxDaily:20000000,requireApproval:500000,dualApproval:1000000,agentHitlThreshold:250000,sanctions:["KP","IR","SY","CU","RU","BY"],kycRequired:true,verifiableIntent:true,hitl:true,killswitch:true}},
  consumer:{id:"consumer",label:"Consumer AI Finance",icon:"◍",accent:"#C46E8A",
    desc:"Personal AI agents — yield-only spending, DeFi governance",
    defaults:{amount:85,currency:"USDC",fromCountry:"US",toCountry:"US",toCurrency:"USDC",beneficiary:"Self — Spending Card",purpose:"Yield-funded purchase",urgency:"standard",intentSource:"defi_agent"},
    policies:{maxSingle:500,maxDaily:2000,requireApproval:200,dualApproval:500,agentHitlThreshold:100,sanctions:["KP","IR","SY"],kycRequired:false,verifiableIntent:false,hitl:true,killswitch:true}},
};

// ─── Rails ────────────────────────────────────────────────────────────────────────
const RAILS=[
  {id:"visa",       name:"Visa Intelligent Commerce",speed:"Instant",cost:"2.4%",  provider:"Visa",      type:"card"},
  {id:"mastercard", name:"Mastercard Agent Pay",     speed:"Instant",cost:"2.5%",  provider:"Mastercard",type:"card"},
  {id:"swift",      name:"SWIFT gpi",               speed:"T+2",    cost:"$25–50",provider:"SWIFT",     type:"bank"},
  {id:"sepa",       name:"SEPA Instant",            speed:"~8s",    cost:"€0.20", provider:"SEPA",      type:"bank"},
  {id:"wooshpay",   name:"WooshPay API",            speed:"~4 min", cost:"1.2%",  provider:"WooshPay",  type:"api"},
  {id:"stablecoin", name:"USDC / USDT",             speed:"~2 min", cost:"$0.01", provider:"Circle",    type:"crypto"},
  {id:"rtp",        name:"RTP / FedNow",            speed:"~3s",    cost:"$0.50", provider:"TCH/Fed",   type:"instant"},
  {id:"defi",       name:"DeFi / Aave",             speed:"~12s",   cost:"Gas",   provider:"Aave",      type:"defi"},
  {id:"selfcustody",name:"Self-Custody Card",       speed:"Instant",cost:"$0.02", provider:"Wirex",     type:"self"},
];

const INTENT_SOURCES=[
  {id:"google_ucp",  name:"Google UCP",   color:"#4A9EFF"},
  {id:"openai",      name:"OpenAI Agent", color:"#3DB88A"},
  {id:"erp",         name:"ERP System",   color:"#C49A2C"},
  {id:"human",       name:"Human User",   color:"#C46E8A"},
  {id:"custom_agent",name:"Custom AI",    color:"#8B72D4"},
  {id:"defi_agent",  name:"DeFi Agent",   color:"#4A9EFF"},
];

const TRUST_SIGNALS=[
  {id:"mvi",   label:"Mastercard Verifiable Intent",short:"MVI",color:"#E05252",desc:"Cryptographic proof of payment authorisation. Proves intent — not permission."},
  {id:"erc8004",label:"ERC-8004",                  short:"8004",color:"#8B72D4",desc:"On-chain agent reputation standard. Scores the agent — Revvyn enforces the policy."},
  {id:"visa_tap",label:"Visa TAP",                 short:"TAP", color:"#4A9EFF",desc:"Token Attestation Protocol. Validates payment token — not whether the spend is permitted."},
];

const COUNTRIES=["US","UK","DE","JP","SG","BR","NG","AE","IN","AU","FR","CA","NL","CH","KP","IR","SY","CU","RU","BY","VE","MM"];
const CURRENCIES=["USD","EUR","GBP","JPY","SGD","BRL","NGN","AED","INR","AUD","CHF","CAD","USDC","USDT"];
const TX_STATES=["Created","Validated","Risk Assessed","Approved","Routed","Settled","Reconciled"];
const OFAC_COUNTRIES=new Set(["KP","IR","SY","CU","RU","BY","VE","MM","SD","YE","LY","ZW","SS","CF","ML","NI"]);

let FX={EUR:0.92,GBP:0.79,JPY:149.5,SGD:1.34,BRL:4.97,NGN:1550,AED:3.67,INR:83.1,AUD:1.53,CHF:0.88,CAD:1.36,USD:1,USDC:1,USDT:1};
let FX_STATE={status:"loading",source:"Loading...",timestamp:null};

async function loadFXRates(onUpdate){
  try{
    const res=await fetch("https://api.frankfurter.app/latest?from=USD&to=EUR,GBP,JPY,SGD,BRL,NGN,AED,INR,AUD,CHF,CAD",{signal:AbortSignal.timeout(8000)});
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    if(!data.rates) throw new Error("No rates");
    Object.assign(FX,data.rates,{USD:1,USDC:1,USDT:1});
    FX_STATE={status:"live",source:`ECB via frankfurter.app · ${data.date}`,timestamp:data.date,rates:data.rates};
    onUpdate({...FX_STATE});
  }catch(e){
    FX_STATE={status:"cached",source:"ECB reference rates (network unavailable)",timestamp:null};
    onUpdate({...FX_STATE});
  }
}

// ─── Sanctions ────────────────────────────────────────────────────────────────────
const SDN_OFAC=new Set(["BANK MELLI IRAN","BANK MELLAT","BANK SADERAT IRAN","BANK SEPAH","MAHAN AIR","IRAN AIR","ISLAMIC REVOLUTIONARY GUARD CORPS","IRGC","WAGNER GROUP","PMC WAGNER","KOREAN RYONBONG GENERAL CORPORATION","SYRIAN ARAB AIRLINES","ROSOBORONEXPORT","ROSTEC","ALMAZ-ANTEY","HEZBOLLAH","HAMAS","AL-QAEDA","ISIS","ISIL","ISLAMIC STATE","PDVSA","GAZPROMBANK","VTB BANK","SBERBANK"]);
const SDN_EU=new Set(["IGOR SECHIN","SERGEI CHEMEZOV","NIKOLAI PATRUSHEV","ROSSIYA BANK","SOGAZ","BANK ROSSIYA","DONETSK PEOPLES REPUBLIC","LUHANSK PEOPLES REPUBLIC","ORGANIZATION OF AEROSPACE INDUSTRIES"]);
const SDN_UN=new Set(["TALIBAN","ISLAMIC EMIRATE OF AFGHANISTAN","HAQQANI NETWORK","AL-SHABAAB","HOUTHI","ANSAR ALLAH","ANSARALLAH","IRGC-N"]);
for(const s of [...SDN_OFAC,...SDN_EU,...SDN_UN]){const w=s.split(/\s+/);if(w.length>=2){SDN_OFAC.add(w.slice(0,2).join(" "));}}
const SDN_ALL=new Set([...SDN_OFAC,...SDN_EU,...SDN_UN]);

let SANCTIONS_STATE={status:"loading",ofacNames:SDN_OFAC,euNames:SDN_EU,unNames:SDN_UN,ofacCount:SDN_OFAC.size,euCount:SDN_EU.size,unCount:SDN_UN.size,lastUpdated:null,dataDate:null,feeds:{ofac:"cached",eu:"cached",un:"cached"}};

function normName(n){return n.toUpperCase().trim().replace(/[.,\-']/g,"").replace(/\s+/g," ");}
function checkSDN(name,set){
  const norm=normName(name);
  if(set.has(norm)) return {match:true,matched:norm};
  for(const s of set){if(norm.includes(s)||s.includes(norm)){if(norm.length>4&&s.length>4)return{match:true,matched:s};}}
  return{match:false,matched:null};
}

// ─── Core decision logic ──────────────────────────────────────────────────────────
function genId(){return "PAY-"+Math.random().toString(36).substr(2,8).toUpperCase();}
function genTx(){return "RVN-"+Date.now().toString(36).toUpperCase()+Math.random().toString(36).substr(2,4).toUpperCase();}
function fmtAmt(n){return "$"+Number(n).toLocaleString();}
function now(){return new Date().toTimeString().slice(0,8);}

function selectRail(payment,vertical,policies){
  const {amount,fromCountry,toCountry,currency,toCurrency,urgency}=payment;
  const isCross=fromCountry!==toCountry;
  const isCrossCcy=currency!==toCurrency;
  const isCrypto=["USDC","USDT"].includes(currency)||["USDC","USDT"].includes(toCurrency);
  const isEU=["DE","FR","NL","BE","ES","IT","AT","PT"].includes(toCountry);
  const isUrgent=urgency==="urgent"||urgency==="critical";
  const isHV=amount>100000;
  const isDefi=vertical==="consumer"||payment.intentSource==="defi_agent";

  if(isDefi) return RAILS.find(r=>r.id==="defi")||RAILS[5];
  if(isCrypto) return RAILS.find(r=>r.id==="stablecoin")||RAILS[5];
  if(!isCross&&isUrgent) return RAILS.find(r=>r.id==="rtp")||RAILS[6];
  if(isEU&&!isHV) return RAILS.find(r=>r.id==="sepa")||RAILS[3];
  if(isHV&&isCross) return RAILS.find(r=>r.id==="swift")||RAILS[2];
  if(payment.intentSource==="openai"||payment.intentSource==="google_ucp"||payment.intentSource==="custom_agent") return RAILS.find(r=>r.id==="stablecoin")||RAILS[5];
  return RAILS.find(r=>r.id==="visa")||RAILS[0];
}

function altRails(selected,amount){
  return RAILS.filter(r=>r.id!==selected.id).slice(0,2).map(r=>({...r,reason:`Alternative: ${r.speed} settlement, ${r.cost} cost`}));
}

function computeResult(agentId,payment,vertical,policies,sdn){
  const v=VERTICALS[vertical]||VERTICALS.treasury;
  const isCross=payment.fromCountry!==payment.toCountry;
  const isCrossCcy=payment.currency!==payment.toCurrency;
  const fxRate=FX[payment.toCurrency]||1;
  const converted=isCrossCcy?Math.round(payment.amount*fxRate*100)/100:null;
  const isHV=payment.amount>100000;
  const totalEntities=(sdn.ofacCount||0)+(sdn.euCount||0)+(sdn.unCount||0)||SDN_ALL.size;
  const liveLabel=sdn.status==="live"?"Live OFAC SDN":"Cached SDN";
  const sourceLabel=sdn.status==="live"?`Live OFAC SDN+EU+UN (${totalEntities.toLocaleString()} entities)`:`Reference SDN lists (${SDN_ALL.size} entities)`;
  const rail=selectRail(payment,vertical,policies);
  const txId=genTx();
  const totalFee=rail.cost.startsWith("$")?parseFloat(rail.cost.slice(1)):rail.cost.endsWith("%")?Math.round(payment.amount*parseFloat(rail.cost)/100*100)/100:0.50;
  const isAgentInitiated=payment.intentSource!=="human";
  const agentThreshold=policies.agentHitlThreshold||5000;
  const needsAgentHitl=isAgentInitiated&&payment.amount>agentThreshold&&policies.hitl;
  const needsDual=payment.amount>=policies.dualApproval&&policies.hitl;
  const riskScore=Math.min(99,Math.round(
    (isCross?15:0)+(isHV?20:0)+(OFAC_COUNTRIES.has(payment.toCountry)?50:0)+
    (payment.urgency==="urgent"?10:payment.urgency==="critical"?20:0)+
    (isAgentInitiated?8:0)+Math.random()*10
  ));

  if(agentId==="orchestrator") return{
    intentClassification:`${isHV?"High-value ":""}${isCross?"cross-border ":""}${vertical} payment`,
    priority:isHV?"high":"medium",agentInitiated:isAgentInitiated,
    intentSource:payment.intentSource,amount:payment.amount,currency:payment.currency,
    trustSignals:{mvi:policies.verifiableIntent&&isAgentInitiated,erc8004:isAgentInitiated,visa_tap:["visa","mastercard"].includes(rail.id)},
    summary:`Classified ${isHV?"high-value ":""}${isCross?"cross-border ":""}payment intent. Priority: ${isHV?"high":"medium"}. Source: ${INTENT_SOURCES.find(s=>s.id===payment.intentSource)?.name||payment.intentSource}.`
  };

  if(agentId==="governance"){
    // Check sanctions
    const sdnEntity=checkSDN(payment.beneficiary,SDN_ALL);
    const euEntity=checkSDN(payment.beneficiary,SDN_EU);
    const sanctionedCountry=OFAC_COUNTRIES.has(payment.toCountry);
    if(sdnEntity.match||sanctionedCountry){
      const hitList=sdnEntity.match?"OFAC SDN":sanctionedCountry?"Country Sanctions":"SDN";
      return{
        approved:false,sdnHit:sdnEntity.match?{entity:sdnEntity.matched,list:hitList,source:sourceLabel}:null,
        complianceScore:0,escalationRequired:false,escalationReason:null,
        checks:[
          {name:"Entity Sanctions Screen",status:"fail",detail:`"${payment.beneficiary}" MATCHED on ${liveLabel} · ${hitList}. Transaction blocked.`,live:sdn.status==="live"},
          ...(sanctionedCountry?[{name:"Country Screening",status:"fail",detail:`${payment.toCountry} subject to comprehensive OFAC country sanctions. Corridor blocked.`,live:true}]:[]),
        ],
        regulatoryFrameworks:["OFAC","PSD2","FATF"],
        summary:`BLOCKED — ${sdnEntity.match?`SDN entity match: "${sdnEntity.matched}"`:""} ${sanctionedCountry?`Sanctioned country: ${payment.toCountry}`:""}`
      };
    }
    if(payment.amount>policies.maxSingle) return{
      approved:false,sdnHit:null,complianceScore:35,escalationRequired:false,escalationReason:null,
      checks:[{name:"Amount Validation",status:"fail",detail:`${fmtAmt(payment.amount)} exceeds single payment limit of ${fmtAmt(policies.maxSingle)}.`}],
      regulatoryFrameworks:["SOC2","PCI-DSS"],
      summary:`REJECTED — Amount ${fmtAmt(payment.amount)} exceeds limit ${fmtAmt(policies.maxSingle)}.`
    };
    const trustSignals={
      mvi:{active:policies.verifiableIntent&&isAgentInitiated,label:"Mastercard Verifiable Intent",desc:"Cryptographic proof of authorisation. Proves the intent — Revvyn decides the policy."},
      erc8004:{active:isAgentInitiated,label:"ERC-8004",desc:"Agent reputation score consumed as input. Revvyn enforces the decision."},
      visa_tap:{active:["visa","mastercard"].includes(rail.id),label:"Visa TAP",desc:"Token attestation validated. Credential confirmed — governance layer still applies."},
    };
    const checks=[
      {name:"Entity Sanctions Screen",status:"pass",detail:`"${payment.beneficiary}" screened against ${liveLabel} · ${totalEntities.toLocaleString()} entities (OFAC, EU, UN). No matches.`,live:sdn.status==="live"},
      {name:"Country Screening",status:"pass",detail:`${payment.toCountry} cleared. No comprehensive country sanctions apply.`,live:true},
      {name:"Amount Validation",status:"pass",detail:`${fmtAmt(payment.amount)} within limit of ${fmtAmt(policies.maxSingle)} (${Math.round(payment.amount/policies.maxSingle*100)}% utilisation).`},
      {name:"Beneficiary Verification",status:"pass",detail:`"${payment.beneficiary}" verified. No adverse media, PEP flags, or derogatory records.`},
      {name:"Daily Volume Check",status:payment.amount>policies.maxDaily*0.5?"warning":"pass",detail:`Daily volume at ${Math.round(payment.amount/policies.maxDaily*100)}% of ${fmtAmt(policies.maxDaily)} limit.`},
    ];
    if(isCross) checks.push({name:"Corridor Compliance",status:"pass",detail:`${payment.fromCountry} → ${payment.toCountry} cleared. AML/CFT requirements met.`});
    if(policies.kycRequired) checks.push({name:"KYC / AML Verification",status:"pass",detail:`Enhanced due diligence complete. Risk: standard.`});
    if(vertical==="insurance") checks.push({name:"Claims Authorisation",status:"pass",detail:`Claim #${payment.beneficiary.split("#")[1]||"N/A"} validated against policy schedule. Coverage confirmed. Compensation within authorised band.`});
    if(policies.verifiableIntent&&payment.intentSource!=="human") checks.push({name:"Verifiable Intent",status:"pass",detail:`${INTENT_SOURCES.find(s=>s.id===payment.intentSource)?.name||"Agent"} intent signal validated. Scope confirmed.`,live:true});
    if(isAgentInitiated) checks.push({name:"Agent Intent Classification",status:needsAgentHitl?"warning":"pass",detail:needsAgentHitl?`${INTENT_SOURCES.find(s=>s.id===payment.intentSource)?.name} initiated — ${fmtAmt(payment.amount)} exceeds agent HITL threshold of ${fmtAmt(agentThreshold)}. Human review required.`:`${INTENT_SOURCES.find(s=>s.id===payment.intentSource)?.name} — ${fmtAmt(payment.amount)} within autonomous execution limit of ${fmtAmt(agentThreshold)}.`});
    const escalationRequired=(needsDual||needsAgentHitl)&&policies.hitl;
    const escalationReason=needsDual?`${fmtAmt(payment.amount)} meets dual approval threshold (${fmtAmt(policies.dualApproval)}). Human authorisation required.`:needsAgentHitl?`Agent-initiated (${INTENT_SOURCES.find(s=>s.id===payment.intentSource)?.name}) payment of ${fmtAmt(payment.amount)} exceeds agent autonomous limit of ${fmtAmt(agentThreshold)}. Policy requires human sign-off.`:null;
    return{approved:true,checks,trustSignals,complianceScore:isCross?87:94,escalationRequired,escalationReason,regulatoryFrameworks:["PSD2","FATF","SOC2","PCI-DSS","ISO20022"].concat(isCross?["GDPR","MiCA"]:[]).concat(vertical==="insurance"?["Solvency II","IAIS"]:vertical==="consumer"?["DeFi-Governance"]:[]),summary:`APPROVED — All ${checks.length} compliance checks passed.${escalationRequired?" Escalation triggered.":""} Score: ${isCross?87:94}%.`};
  }

  if(agentId==="control") return{
    riskScore,riskLevel:riskScore<30?"low":riskScore<60?"medium":riskScore<80?"high":"critical",
    fraudIndicators:[
      {indicator:"Velocity Check",severity:"low",detail:`Transaction frequency within normal parameters for ${v.label}.`},
      {indicator:"Beneficiary Pattern",severity:isCross?"medium":"low",detail:isCross?`First transaction to ${payment.toCountry} corridor this period.`:"Recurring beneficiary."},
      {indicator:"Amount Deviation",severity:isHV?"medium":"low",detail:isHV?`Amount is ${Math.round(payment.amount/50000)}× above median. Within policy, flagged.`:`Within expected range.`},
    ],
    recommendedRail:{...rail,reason:`Optimal for ${vertical} vertical — ${rail.speed} settlement at ${rail.cost}.`},
    alternativeRails:altRails(rail,payment.amount),
    fxOptimization:{applicable:isCrossCcy,strategy:isCrossCcy?`Mid-market rate lock (${fxRate} ${payment.toCurrency}/${payment.currency}). Est. savings vs retail: $${Math.round(payment.amount*0.003).toLocaleString()}.`:"N/A — same-currency settlement",estimatedSavings:isCrossCcy?`$${Math.round(payment.amount*0.003).toLocaleString()}`:"$0"},

function loadKYA(){

function buildKYARecord(payment,existing){
  const src=INTENT_SOURCES.find(s=>s.id===payment.intentSource)||{id:payment.intentSource,name:payment.intentSource,color:"#C49A2C"};
  const prev=existing||{
    agentId:"AGT-"+payment.intentSource.toUpperCase().slice(0,3)+"-"+Math.random().toString(36).substr(2,4).toUpperCase(),
    origin:src.name,intentSource:payment.intentSource,
    firstSeen:payment.timestamp,lastSeen:payment.timestamp,
    txCount:0,totalVolume:0,blockedCount:0,
    mandateScope:getMandateScope(payment.intentSource),
    trustSignals:{mvi:payment.intentSource!=="human",erc8004:payment.intentSource!=="human",visa_tap:false},
    behaviouralFlags:[],riskHistory:[],
    agentProofScore:Math.floor(Math.random()*40)+50,
  };
  const riskScore=Math.min(99,Math.round((payment.amount>100000?20:0)+(prev.blockedCount>0?15:0)+Math.random()*10+30));
  return{
    ...prev,lastSeen:payment.timestamp,txCount:prev.txCount+1,
    totalVolume:prev.totalVolume+payment.amount,
    riskHistory:[...prev.riskHistory.slice(-9),riskScore],
    agentProofScore:Math.min(99,prev.agentProofScore+(prev.blockedCount===0?1:-3)),
  };
}

function getMandateScope(intentSource){
  const scopes={
    google_ucp:"Authorised for API procurement, cloud spend, data services. Max autonomous: $2,000.",
    openai:"Authorised for compute, tooling, and API payments. Max autonomous: $5,000.",
    erp:"Authorised for vendor payments, payroll, supplier settlement per approved schedule.",
    human:"Full mandate. Human-directed payments subject to standard approval thresholds.",
    custom_agent:"Limited mandate. Scope defined by deploying entity. Max autonomous: $500.",
    defi_agent:"Yield-only spending. Principal protection enforced. DeFi corridors only.",
  };
  return scopes[intentSource]||"Mandate scope not defined.";
}

function Analytics({payments,vertical}){
  const v=VERTICALS[vertical];
  const vp=payments.filter(p=>p.vertical===vertical);
  const settled=vp.filter(p=>p.finalStatus==="settled");
  const rejected=vp.filter(p=>p.finalStatus==="rejected");
  const sdnBlocked=vp.filter(p=>p.sdnBlocked);
  const total=vp.reduce((s,p)=>s+(p.payment?.amount||0),0);
  const avgRisk=settled.length?Math.round(settled.reduce((s,p)=>s+(p.results?.control?.riskScore||0),0)/settled.length):0;
  const byRail={};
  settled.forEach(p=>{const r=p.results?.control?.recommendedRail?.name||"Unknown";byRail[r]=(byRail[r]||0)+1;});
  const byIntent={};
  vp.forEach(p=>{const s=p.payment?.intentSource||"unknown";byIntent[s]=(byIntent[s]||0)+1;});
  return <div style={{padding:"13px 15px",display:"flex",flexDirection:"column",gap:11}}>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>

function App(){
  const [theme,setTheme]=useState("dark");
  const [showHero,setShowHero]=useState(true);
  const [vertical,setVertical]=useState("treasury");
  const [policies,setPolicies]=useState({...VERTICALS.treasury.policies});
  const [payments,setPayments]=useState([]);
  const [agentStatuses,setAgentStatuses]=useState({});
  const [agentResults,setAgentResults]=useState({});
  const [auditEntries,setAuditEntries]=useState([]);
  const [isProcessing,setIsProcessing]=useState(false);
  const [killActive,setKillActive]=useState(false);
  const [selectedAgent,setSelectedAgent]=useState(null);
  const [txState,setTxState]=useState(null);
  const [selectedRail,setSelectedRail]=useState(null);
  const [intentSource,setIntentSource]=useState("erp");
  const [hitl,setHitl]=useState(null);
  const [leftTab,setLeftTab]=useState("payment");
  const [rightTab,setRightTab]=useState("pipeline");
  const [fxState,setFxState]=useState(null);
  const [sanctionsState,setSanctionsState]=useState(SANCTIONS_STATE);
  const [demoScene,setDemoScene]=useState(null);
  const [kyaRegistry,setKyaRegistry]=useState(loadKYA());
  const escRef=useRef(null);
  const demoAbortRef=useRef(false);

  useEffect(()=>{document.documentElement.setAttribute("data-theme",theme);},[theme]);

  useEffect(()=>{
    loadFXRates(setFxState);
  },[]);

  const v=VERTICALS[vertical];

  const addAudit=useCallback((agent,message,status)=>{
    setAuditEntries(p=>[...p,{agent,message,status,time:now()}]);
  },[]);

  const updateKYA=useCallback((payment,blocked)=>{
    setKyaRegistry(prev=>{
      const existing=prev[payment.intentSource];
      const updated=buildKYARecord(payment,existing);
      if(blocked) updated.blockedCount=(updated.blockedCount||0)+1;
      const next={...prev,[payment.intentSource]:updated};
      saveKYA(next);
      return next;
    });
  },[]);

  const processPayment=useCallback(async(paymentData,vertOverride,polOverride)=>{
    if(isProcessing||killActive) return;
    const pol=polOverride||policies;
    const vert=vertOverride||vertical;
    const payment={...paymentData,id:paymentData.id||genId(),timestamp:paymentData.timestamp||new Date().toISOString(),vertical:vert};
    setIntentSource(payment.intentSource);
    setIsProcessing(true);
    setAgentStatuses({});setAgentResults({});setSelectedRail(null);setTxState("Created");
    setPayments(p=>[...p,{id:payment.id,payment,vertical:vert,finalStatus:"pending"}]);
    const allResults={};
    let aborted=false;
    for(const agent of AGENTS){
      if(killActive){aborted=true;break;}
      await new Promise(r=>setTimeout(r,600+Math.random()*400));
      setAgentStatuses(p=>({...p,[agent.id]:"running"}));
      if(agent.id==="orchestrator") setTxState("Validated");
      if(agent.id==="governance") setTxState("Risk Assessed");
      if(agent.id==="control") setTxState("Routed");
      const result=computeResult(agent.id,payment,vert,pol,sanctionsState);
      allResults[agent.id]=result;
      setAgentResults(p=>({...p,[agent.id]:result}));
      if(result.approved===false){
        setAgentStatuses(p=>({...p,[agent.id]:"failed"}));
        addAudit(agent.id,`REJECTED — ${result.summary}`,"fail");
        result.checks?.filter(c=>c.status==="fail").forEach(c=>addAudit(agent.id,`✗ ${c.name}: ${c.detail}`,"fail"));
        if(result.sdnHit) addAudit(agent.id,`⬡ SDN MATCH: "${result.sdnHit.entity}" · ${result.sdnHit.source}`,"fail");
        aborted=true;
        setPayments(p=>p.map(x=>x.id===payment.id?{...x,finalStatus:"rejected",sdnBlocked:!!result.sdnHit,results:allResults}:x));
        setTxState(null);
        updateKYA(payment,true);
        continue;
      }
      if(result.escalationRequired&&pol.hitl){
        addAudit(agent.id,"ESCALATION: "+result.escalationReason,"warning");
        setHitl({payment,reason:result.escalationReason,checks:result.checks?.filter(c=>c.status==="pass").slice(0,3).map(c=>({label:c.name,detail:c.detail.slice(0,60)+"..."}))||[]});
        const approved=await new Promise(res=>{escRef.current=res;});
        setHitl(null);
        setPayments(p=>p.map(x=>x.id===payment.id?{...x,wasEscalated:true}:x));
        if(!approved){
          addAudit(agent.id,"REJECTED by human reviewer","fail");
          setAgentStatuses(p=>({...p,[agent.id]:"failed"}));
          aborted=true;
          setPayments(p=>p.map(x=>x.id===payment.id?{...x,finalStatus:"rejected",results:allResults}:x));
          setTxState(null);
          updateKYA(payment,true);
          continue;
        }
        addAudit(agent.id,"APPROVED by human reviewer — continuing pipeline","pass");
        setTxState("Approved");
      }
      result.checks?.forEach(c=>addAudit(agent.id,`${c.live?"[LIVE] ":""}${c.name}: ${c.detail}`,c.status));
      if(agent.id==="control"&&result.recommendedRail){
        setSelectedRail(result.recommendedRail.id);
        addAudit(agent.id,`Rail: ${result.recommendedRail.name} — ${result.recommendedRail.reason}`,"pass");
        addAudit(agent.id,`Risk: ${result.riskScore}/100 (${result.riskLevel})`,result.riskLevel==="low"?"pass":"warning");
      }
      if(agent.id==="execution"){
        setTxState("Settled");
        addAudit(agent.id,`SETTLED via ${result.selectedRail} [${result.provider}]`,"pass");
        addAudit(agent.id,`TX: ${result.transactionId} | Fees: $${result.fees?.total} | ${result.settlementTime}`,null);
      }
      if(agent.id==="audit"){
        setTxState("Reconciled");
        result.decisionChain?.forEach(d=>addAudit(agent.id,`[${d.reasonCode}] ${d.agent}: ${d.decision}`,null));
      }
      setAgentStatuses(p=>({...p,[agent.id]:"complete"}));
      addAudit(agent.id,result.summary||"Complete","pass");
    }
    if(!aborted){
      const final={};AGENTS.forEach(a=>{final[a.id]="complete";});setAgentStatuses(final);
      setPayments(p=>p.map(x=>x.id===payment.id?{...x,finalStatus:"settled",results:allResults}:x));
      updateKYA(payment,false);
    }
    setIsProcessing(false);
  },[vertical,policies,killActive,isProcessing,addAudit,sanctionsState,updateKYA]);

  const stopDemo=useCallback(()=>{demoAbortRef.current=true;setDemoScene(null);setKillActive(false);},[]);

  const runAutoDemo=useCallback(async()=>{
    setShowHero(false);demoAbortRef.current=false;setPayments([]);setKillActive(false);
    const sleep=ms=>new Promise(r=>setTimeout(r,ms));
    const aborted=()=>demoAbortRef.current;
    const switchTo=(vert)=>{setVertical(vert);setLeftTab("payment");setAgentStatuses({});setAgentResults({});setAuditEntries([]);setSelectedAgent(null);setTxState(null);setSelectedRail(null);};
    const submit=async(payment,vertOverride,polOverride)=>{
      await new Promise(async resolve=>{
        processPayment(payment,vertOverride,polOverride);
        setTimeout(()=>resolve(),12000);
      });
      await sleep(600);
    };
    await sleep(300);
    if(aborted()) return;
    setDemoScene(DEMO_SCENES[0]);switchTo("treasury");await sleep(800);
    await submit({id:genId(),timestamp:new Date().toISOString(),vertical:"treasury",amount:45000,currency:"USD",fromCountry:"US",toCountry:"AE",toCurrency:"USD",beneficiary:"Bank Melli Iran",purpose:"Vendor payment",urgency:"standard",intentSource:"erp"},"treasury",VERTICALS.treasury.policies);
    await sleep(2000);
    if(aborted()) return;
    setDemoScene(DEMO_SCENES[1]);await sleep(600);
    await submit({id:genId(),timestamp:new Date().toISOString(),vertical:"treasury",amount:120000,currency:"USD",fromCountry:"US",toCountry:"IR",toCurrency:"USD",beneficiary:"Tehran Trade LLC",purpose:"Supply chain payment",urgency:"standard",intentSource:"erp"},"treasury",VERTICALS.treasury.policies);
    await sleep(2000);
    if(aborted()) return;
    setDemoScene(DEMO_SCENES[2]);setKillActive(true);addAudit("orchestrator","■ KILL SWITCH ACTIVATED — all transactions halted globally","fail");setLeftTab("payment");await sleep(3500);setKillActive(false);addAudit("orchestrator","System resumed","pass");await sleep(800);
    if(aborted()) return;
    setDemoScene(DEMO_SCENES[3]);switchTo("ai_commerce");setLeftTab("policy");await sleep(1500);setLeftTab("payment");await sleep(500);
    const agentHitlPol={...VERTICALS.ai_commerce.policies,agentHitlThreshold:2000,hitl:true};
    processPayment({id:genId(),timestamp:new Date().toISOString(),vertical:"ai_commerce",amount:3500,currency:"USD",fromCountry:"US",toCountry:"SG",toCurrency:"USD",beneficiary:"Compute-Broker-9z",purpose:"Autonomous procurement — GPU burst capacity",urgency:"urgent",intentSource:"google_ucp"},"ai_commerce",agentHitlPol);
    await sleep(4500);if(!aborted()&&escRef.current) escRef.current(true);await sleep(7000);
    if(aborted()) return;
    setDemoScene(DEMO_SCENES[4]);switchTo("treasury");setLeftTab("payment");await sleep(800);
    await submit({id:genId(),timestamp:new Date().toISOString(),vertical:"treasury",amount:250000,currency:"USD",fromCountry:"US",toCountry:"DE",toCurrency:"EUR",beneficiary:"Siemens AG",purpose:"Vendor invoice #INV-2026-4471",urgency:"standard",intentSource:"human"},"treasury",VERTICALS.treasury.policies);
    setRightTab("audit");await sleep(3000);
    if(aborted()) return;
    setDemoScene(DEMO_SCENES[5]);switchTo("treasury");setLeftTab("policy");await sleep(2000);setLeftTab("payment");await sleep(500);
    const agentTreasuryPol={...VERTICALS.treasury.policies,agentHitlThreshold:50000,dualApproval:500000,hitl:true};
    processPayment({id:genId(),timestamp:new Date().toISOString(),vertical:"treasury",amount:250000,currency:"USD",fromCountry:"US",toCountry:"DE",toCurrency:"EUR",beneficiary:"Siemens AG",purpose:"ERP-initiated vendor payment",urgency:"standard",intentSource:"erp"},"treasury",agentTreasuryPol);
    await sleep(4500);if(!aborted()&&escRef.current) escRef.current(true);await sleep(7000);setLeftTab("analytics");await sleep(2000);
    if(!aborted()) setDemoScene(null);
  },[processPayment,addAudit]);

  if(showHero) return <><StyleInjector/><Hero onEnter={()=>setShowHero(false)} onAutoDemo={runAutoDemo}/></>;

  const leftTabs=[{id:"payment",label:"Payment"},{id:"policy",label:"Governance"},{id:"analytics",label:"Analytics"},{id:"kya",label:"KYA"}];
  const rightTabs=[{id:"pipeline",label:"Agent Detail"},{id:"audit",label:`Audit (${auditEntries.length})`}];

  return <div style={{height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
    <StyleInjector/>
    <Header vertical={vertical} killActive={killActive} onKillToggle={()=>{setKillActive(k=>!k);addAudit("orchestrator",killActive?"System resumed":"■ KILL SWITCH — all transactions halted",killActive?"pass":"fail");}} onHero={()=>setShowHero(true)} sanctionsState={sanctionsState} fxState={fxState} theme={theme} onThemeToggle={()=>setTheme(t=>t==="dark"?"light":"dark")}/>
    <VerticalTabs active={vertical} onChange={v=>{setVertical(v);setPolicies({...VERTICALS[v].policies});setAgentStatuses({});setAgentResults({});setAuditEntries([]);setSelectedAgent(null);setTxState(null);setSelectedRail(null);}}/>
    <AgentPipeline statuses={agentStatuses} selected={selectedAgent} onSelect={id=>{setSelectedAgent(id);setRightTab("pipeline");}}/>
    {txState&&<LifecycleBar current={txState}/>}
    <StackDiagram selectedRail={selectedRail} intentSource={intentSource} vertical={vertical}/>
    <MetricsBar payments={payments}/>
    <div style={{flex:1,display:"flex",overflow:"hidden",minHeight:0}}>
      <div style={{flex:"0 0 400px",borderRight:"1px solid var(--border)",display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <TabBar tabs={leftTabs} active={leftTab} onChange={setLeftTab} accent={v.accent}/>
        <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",minHeight:0}}>
          {leftTab==="payment"&&<PaymentForm vertical={vertical} policies={policies} onSubmit={processPayment} isProcessing={isProcessing} killActive={killActive}/>}
          {leftTab==="policy"&&<PolicyPanel vertical={vertical} policies={policies} onChange={setPolicies}/>}
          {leftTab==="analytics"&&<div style={{flex:1,overflowY:"auto"}}><Analytics payments={payments} vertical={vertical}/></div>}
          {leftTab==="kya"&&<div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",minHeight:0}}><KYAPanel kyaRegistry={kyaRegistry} onClear={()=>{setKyaRegistry({});saveKYA({});}}/></div>}
        </div>
      </div>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minHeight:0}}>
        <TabBar tabs={rightTabs} active={rightTab} onChange={setRightTab} accent={v.accent}/>
        <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",minHeight:0}}>
          {rightTab==="pipeline"&&<div style={{flex:1,overflowY:"auto"}}><AgentDetail agentId={selectedAgent||"orchestrator"} results={agentResults}/></div>}
          {rightTab==="audit"&&<AuditTrail entries={auditEntries}/>}
        </div>
      </div>
    </div>
    {hitl&&<HITLModal payment={hitl.payment} reason={hitl.reason} checks={hitl.checks} onApprove={()=>{setHitl(null);if(escRef.current)escRef.current(true);}} onReject={()=>{setHitl(null);if(escRef.current)escRef.current(false);}}/>}
    {demoScene&&<DemoNarrator scene={demoScene} onSkip={stopDemo}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
