// Normalize name for matching
function normalizeName(name){
  return name.toUpperCase().trim()
    .replace(/[.,\-']/g,"")
    .replace(/\s+/g," ");
}

// Check if a name matches any SDN entry (fuzzy — catches common variants)
function checkSDNMatch(name,sdnNames){
  const norm=normalizeName(name);
  // Exact match
  if(sdnNames.has(norm)) return {match:true,matched:norm};
  // Check if any SDN name is contained in the input or vice versa
  for(const sdn of sdnNames){
    if(norm.includes(sdn)||sdn.includes(norm)){
      if(norm.length>4&&sdn.length>4) return {match:true,matched:sdn};
    }
  }
  return {match:false,matched:null};
}

function parseOfacCSV(text){
  const names=new Set();let count=0;
  for(const line of text.split("\n")){
    if(!line.trim()) continue;
    const m=line.match(/^"?(\d+)"?,\s*"([^"]+)"/);
    if(m&&m[2]){
      const name=m[2].trim().toUpperCase();
      if(name&&name!=="-0-"&&name.length>3){
        names.add(name);
        const words=name.split(/\s+/);
        if(words.length>=2) names.add(words.slice(0,2).join(" "));
        count++;
      }
    }
  }
  return {names,count};
}

function parseEuCSV(text){
  const names=new Set();let count=0;
  for(const line of text.split("\n")){
    if(!line.trim()||line.startsWith("Entity")) continue;
    const cols=line.split(";");
    // EU CSV has name in various columns — grab first few non-empty strings
    for(let i=0;i<Math.min(cols.length,6);i++){
      const name=cols[i].replace(/^"|"$/g,"").trim().toUpperCase();
      if(name&&name.length>3&&!/^\d+$/.test(name)){
        names.add(name);
        const words=name.split(/\s+/);
        if(words.length>=2) names.add(words.slice(0,2).join(" "));
        count++;
        break;
      }
    }
  }
  return {names,count};
}

function parseUnXML(text){
  const names=new Set();let count=0;
  const matches=text.matchAll(/<FIRST_NAME>([^<]+)<\/FIRST_NAME>|<SECOND_NAME>([^<]+)<\/SECOND_NAME>|<THIRD_NAME>([^<]+)<\/THIRD_NAME>|<NAME_ORIGINAL_SCRIPT>([^<]+)<\/NAME_ORIGINAL_SCRIPT>/g);
  for(const m of matches){
    const name=(m[1]||m[2]||m[3]||m[4]||"").trim().toUpperCase();
    if(name&&name.length>2){names.add(name);count++;}
  }
  // Also grab entity names
  const entityMatches=text.matchAll(/<FIRST_NAME>([^<]{4,})<\/FIRST_NAME>/g);
  for(const m of entityMatches){
    const name=m[1].trim().toUpperCase();
    names.add(name);
    const words=name.split(/\s+/);
    if(words.length>=2) names.add(words.slice(0,2).join(" "));
  }
  return {names,count};
}

const PROXY="https://api.allorigins.win/raw?url=";

async function loadSanctionsData(onUpdate){
  const date=new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
  let ofacNames=SDN_FALLBACK,euNames=new Set(),unNames=new Set();
  let ofacCount=SDN_FALLBACK.size,euCount=0,unCount=0;
  let ofacStatus="cached",euStatus="cached",unStatus="cached";

  // Run all three fetches in parallel
  const [ofacResult,euResult,unResult]=await Promise.allSettled([
    // OFAC SDN
    (async()=>{
      const res=await fetch(PROXY+encodeURIComponent("https://www.treasury.gov/ofac/downloads/sdn.csv"),{signal:AbortSignal.timeout(20000)});
      if(!res.ok) throw new Error(`OFAC HTTP ${res.status}`);
      const text=await res.text();
      if(text.length<1000) throw new Error("OFAC response too short");
      const {names,count}=parseOfacCSV(text);
      if(count<100) throw new Error("OFAC too few entries");
      return {names,count};
    })(),
    // EU Consolidated Sanctions
    (async()=>{
      const res=await fetch(PROXY+encodeURIComponent("https://webgate.ec.europa.eu/fsd/fsf/public/files/csvFullSanctionsList/content"),{signal:AbortSignal.timeout(20000)});
      if(!res.ok) throw new Error(`EU HTTP ${res.status}`);
      const text=await res.text();
      if(text.length<500) throw new Error("EU response too short");
      const {names,count}=parseEuCSV(text);
      return {names,count};
    })(),
    // UN Security Council Sanctions
    (async()=>{
      const res=await fetch(PROXY+encodeURIComponent("https://scsanctions.un.org/feed/"),{signal:AbortSignal.timeout(15000)});
      if(!res.ok) throw new Error(`UN HTTP ${res.status}`);
      const text=await res.text();
      if(text.length<200) throw new Error("UN response too short");
      const {names,count}=parseUnXML(text);
      return {names,count};
    })(),
  ]);

  if(ofacResult.status==="fulfilled"){
    ofacNames=ofacResult.value.names;ofacCount=ofacResult.value.count;ofacStatus="live";
  }else{console.warn("[Revvyn] OFAC failed:",ofacResult.reason?.message);}

  if(euResult.status==="fulfilled"){
    euNames=euResult.value.names;euCount=euResult.value.count;euStatus="live";
  }else{console.warn("[Revvyn] EU failed:",euResult.reason?.message);}

  if(unResult.status==="fulfilled"){
    unNames=unResult.value.names;unCount=unResult.value.count;unStatus="live";
  }else{console.warn("[Revvyn] UN failed:",unResult.reason?.message);}

  const anyLive=ofacStatus==="live"||euStatus==="live"||unStatus==="live";
  SANCTIONS_STATE={
    status:anyLive?"live":"cached",
    ofacNames,euNames,unNames,
    ofacCount,euCount,unCount,
    lastUpdated:new Date().toLocaleTimeString("en-US",{hour12:false}),
    dataDate:date,
    feeds:{ofac:ofacStatus,eu:euStatus,un:unStatus},
  };
  onUpdate({...SANCTIONS_STATE});
}

function pickRail(payment,vert){
  const {toCountry,toCurrency,amount,urgency}=payment;
  if(vert==="consumer") return {id:"selfcustody",name:"Self-Custody Card",provider:"Wirex/Gnosis Pay",reason:"Yield-funded self-custody wallet — principal protection preserved"};
  if(toCurrency==="USDC"||toCurrency==="USDT") return {id:"stablecoin",name:"USDC / USDT",provider:"Circle",reason:"Stablecoin settlement — near-zero cost, sub-minute finality"};
  if(["DE","FR","NL","CH"].includes(toCountry)) return {id:"sepa",name:"SEPA Instant",provider:"SEPA",reason:"EUR-zone destination — SEPA Instant at €0.20 flat, ~8s settlement"};
  if(urgency==="critical"&&amount<50000) return {id:"rtp",name:"RTP / FedNow",provider:"TCH/Fed",reason:"Critical urgency, moderate amount — RTP delivers ~3s at $0.50"};
  if(amount>100000) return {id:"swift",name:"SWIFT gpi",provider:"SWIFT",reason:"High-value cross-border — SWIFT gpi with end-to-end tracking"};
  if(["IN","SG","NG"].includes(toCountry)) return {id:"wooshpay",name:"WooshPay API",provider:"WooshPay",reason:"Emerging market corridor — WooshPay local rails at 1.2%"};
  if(amount<5000) return {id:"visa",name:"Visa Intelligent Commerce",provider:"Visa",reason:"Sub-$5K on supported corridor — Visa TAP-enabled instant settlement"};
  return {id:"swift",name:"SWIFT gpi",provider:"SWIFT",reason:"Default high-value cross-border via SWIFT gpi"};
}

function altRails(primary,amount){
  const alts=[];
  if(primary.id!=="visa") alts.push({id:"visa",name:"Visa Intelligent Commerce",reason:"Card-rail fallback with Visa TAP agent authentication"});
  if(primary.id!=="stablecoin") alts.push({id:"stablecoin",name:"USDC / USDT",reason:"Stablecoin alt — near-zero cost settlement"});
  if(primary.id!=="swift"&&amount>10000) alts.push({id:"swift",name:"SWIFT gpi",reason:"Traditional correspondent banking with gpi tracking"});
  return alts.slice(0,2);
}

      ],
      complianceScore:8,escalationRequired:false,escalationReason:null,
      regulatoryFrameworks:["OFAC","EU-2580/2001","UN-1267","FATF-R6","PSD2"],
      sdnHit:{entity:sdnCheck.matched,list:sdnCheck.list,source:sourceLabel},
      summary:`REJECTED — Beneficiary matched "${sdnCheck.matched}" on ${sdnCheck.list}. Transaction blocked. Source: ${sourceLabel}.`
    };
    if(isCountrySanctioned) return {
      approved:false,
      checks:[
        {name:"Country Screening",status:"fail",detail:`Destination ${payment.toCountry} is subject to comprehensive sanctions. Transaction blocked.`,live:true},
        {name:"Entity Sanctions Screen",status:"pass",detail:`Beneficiary "${payment.beneficiary}" not matched on ${liveLabel} (${totalEntities.toLocaleString()} entities across OFAC, EU, UN).`,live:sdn.status==="live"},
        {name:"Amount Validation",status:"pass",detail:`${payment.currency} ${fmtAmt(payment.amount)} within single limit of ${fmtAmt(policies.maxSingle)}`},
        {name:"Beneficiary Verification",status:"warning",detail:"Suspended — country sanctions block takes precedence"},
      ],
      complianceScore:12,escalationRequired:false,escalationReason:null,
      regulatoryFrameworks:["OFAC","EU-Sanctions","UN-Charter-Art41","FATF-R6","PSD2"],
      summary:`REJECTED — ${payment.toCountry} is a sanctioned jurisdiction. Transaction blocked at governance layer.`
    };
    if(overMax) return {
      approved:false,
      checks:[
        {name:"Amount Validation",status:"fail",detail:`${payment.currency} ${fmtAmt(payment.amount)} exceeds max single limit of ${fmtAmt(policies.maxSingle)}`},
        {name:"Entity Sanctions Screen",status:"pass",detail:`Beneficiary "${payment.beneficiary}" cleared against ${liveLabel} (${totalEntities.toLocaleString()} entities · OFAC, EU, UN).`,live:sdn.status==="live"},
        {name:"Country Screening",status:"pass",detail:`${payment.toCountry} cleared against OFAC, EU, and UN country sanctions lists.`},
        {name:"Daily Volume Check",status:"warning",detail:`Would consume ${Math.round(payment.amount/policies.maxDaily*100)}% of daily limit`},
      ],
      complianceScore:35,escalationRequired:false,escalationReason:null,
      regulatoryFrameworks:["SOC2","PCI-DSS","ISO20022"],
      summary:"REJECTED — Amount exceeds maximum single payment policy threshold."
    };
    const checks=[
      {name:"Entity Sanctions Screen",status:"pass",detail:`"${payment.beneficiary}" screened against ${liveLabel} · ${totalEntities.toLocaleString()} entities (OFAC${sdn.feeds?.ofac==="live"?" ✓":""}, EU${sdn.feeds?.eu==="live"?" ✓":""}, UN${sdn.feeds?.un==="live"?" ✓":""}). No matches found.`,live:sdn.status==="live"},
      {name:"Country Screening",status:"pass",detail:`${payment.toCountry} cleared. Not subject to OFAC, EU, or UN comprehensive country sanctions.`,live:true},
      {name:"Amount Validation",status:"pass",detail:`${payment.currency} ${fmtAmt(payment.amount)} within limit of ${fmtAmt(policies.maxSingle)} (${Math.round(payment.amount/policies.maxSingle*100)}% utilisation)`},
      {name:"Beneficiary Verification",status:"pass",detail:`"${payment.beneficiary}" verified against KYC registry. No adverse media or PEP flags.`},
      {name:"Daily Volume Check",status:payment.amount>policies.maxDaily*0.5?"warning":"pass",detail:`Daily volume at ${Math.round(payment.amount/policies.maxDaily*100)}% of ${fmtAmt(policies.maxDaily)} limit${payment.amount>policies.maxDaily*0.5?". Approaching threshold.":"."}`},
    ];
    if(isCross) checks.push({name:"Corridor Compliance",status:"pass",detail:`${payment.fromCountry} → ${payment.toCountry} cleared. No capital control restrictions. AML/CFT requirements met.`});
    if(policies.kycRequired) checks.push({name:"KYC/AML Verification",status:"pass",detail:`Enhanced due diligence complete. Identity verified via ${vert==="consumer"?"DeFi wallet attestation":"corporate registry"}. Risk: standard.`});
    if(vert==="consumer") checks.push({name:"Principal Protection",status:"pass",detail:`$${payment.amount} funded from accrued DeFi yield ($${Math.round(payment.amount*1.8)} available). Principal untouched.`});
    if(policies.verifiableIntent&&payment.intentSource!=="human") checks.push({name:"Verifiable Intent",status:"pass",detail:`${INTENT_SOURCES.find(s=>s.id===payment.intentSource)?.name||"Agent"} signal validated. Intent matches authorised scope.`});
    return {
      approved:true,checks,
      complianceScore:isCross?87:94,
      escalationRequired:needsDual&&policies.hitl,
      escalationReason:needsDual?`${payment.currency} ${fmtAmt(payment.amount)} meets dual approval threshold (${fmtAmt(policies.dualApproval)}). Human authorisation required.`:null,
      regulatoryFrameworks:["PSD2","FATF","SOC2","PCI-DSS","ISO20022"].concat(isCross?["GDPR","MiCA"]:[]),
      summary:`APPROVED — All ${checks.length} compliance checks passed.${needsDual?" Dual approval escalation triggered.":""} Compliance score: ${isCross?87:94}%. SDN source: ${sourceLabel}.`
    };
  }

  if(agentId==="control") return {
    riskScore,
    riskLevel:riskScore<30?"low":riskScore<60?"medium":riskScore<80?"high":"critical",
    fraudIndicators:[
      {indicator:"Velocity Check",severity:"low",detail:`Transaction frequency within normal patterns for ${v.label}. No anomalies detected.`},
      {indicator:"Beneficiary Pattern",severity:isCross?"medium":"low",detail:isCross?`First transaction to ${payment.toCountry} corridor this period. Enhanced monitoring applied.`:"Recurring beneficiary with established payment history."},
      {indicator:"Amount Deviation",severity:isHV?"medium":"low",detail:isHV?`Amount is ${Math.round(payment.amount/50000)}× above median for this vertical. Within policy, flagged for monitoring.`:`Amount within expected range for ${v.label} payments.`},
    ],
    recommendedRail:rail,
    alternativeRails:altRails(rail,payment.amount),
    fxOptimization:{
      applicable:isCrossCcy,
      strategy:isCrossCcy?`Mid-market rate lock (${fxRate} ${payment.toCurrency}/${payment.currency}). Estimated savings vs retail: $${Math.round(payment.amount*0.003).toLocaleString()}.`:"N/A — same-currency settlement",
      estimatedSavings:isCrossCcy?`$${Math.round(payment.amount*0.003).toLocaleString()}`:"$0",
    },
    summary:`Risk ${riskScore}/100 (${riskScore<30?"low":riskScore<60?"medium":"high"}). Rail: ${rail.name} via ${rail.provider}.${isCrossCcy?` FX saves ~$${Math.round(payment.amount*0.003).toLocaleString()}.`:""}`
  };

  if(agentId==="execution") return {
    status:"settled",selectedRail:rail.name,provider:rail.provider,transactionId:txId,
    settlementTime:rail.id==="swift"?"T+2 (48h est.)":rail.id==="sepa"?"8.2 seconds":rail.id==="rtp"?"3.1 seconds":rail.id==="visa"||rail.id==="mastercard"?"Sub-second":rail.id==="stablecoin"?"2 min 14s":rail.id==="defi"?"12.4s (2 blocks)":rail.id==="selfcustody"?"Instant":"4 min 38s",
    fees:{total:totalFee,breakdown:{network:Math.round(totalFee*.45*100)/100,fx:isCrossCcy?Math.round(totalFee*.3*100)/100:0,processing:Math.round(totalFee*.2*100)/100,compliance:Math.round(totalFee*.05*100)/100}},
    fxRate:isCrossCcy?fxRate:null,convertedAmount:converted,
    ledgerEntries:[
      {type:"debit", account:`Operating — ${payment.fromCountry}`,amount:payment.amount,   currency:payment.currency},
      {type:"credit",account:`Beneficiary — ${payment.beneficiary}`,amount:converted||payment.amount,currency:payment.toCurrency},
    ],
    summary:`Settled ${payment.currency} ${fmtAmt(payment.amount)} via ${rail.name}.${converted?` Converted to ${payment.toCurrency} ${Number(converted).toLocaleString()} @ ${fxRate}. `:" "}Fees: $${totalFee}. Settlement: ${rail.id==="swift"?"T+2":"sub-minute"}.`
  };

  if(agentId==="audit") return {
    auditId:"AUD-"+Date.now().toString(36).toUpperCase(),
    decisionChain:[
      {agent:"Orchestrator",decision:`Classified ${isHV?"high-value ":""}${isCross?"cross-border ":""}payment. Priority: ${isHV?"high":"medium"}`,reasonCode:"ORCH-CLF-001",confidence:97},
      {agent:"Governance",  decision:`All compliance checks passed.${needsDual?" Dual approval obtained.":""} Score: ${isCross?87:94}%`,reasonCode:`GOV-APR-${needsDual?"DAP":"STD"}`,confidence:94},
      {agent:"Control",     decision:`Risk ${riskScore}/100. Selected ${rail.name}.${isCrossCcy?" FX optimised.":""}`,reasonCode:`CTL-RSK-${riskScore<30?"LOW":"MED"}`,confidence:91},
      {agent:"Execution",   decision:`Settled via ${rail.provider}. ${txId}. Fees: $${totalFee}`,reasonCode:"EXE-STL-OK",confidence:99},
      {agent:"Audit",       decision:"Full regulatory trail. 7-year retention. All frameworks satisfied.",reasonCode:"AUD-CMP-FUL",confidence:96},
    ],
    complianceStatus:"compliant",
    riskClassification:riskScore<30?"low":riskScore<60?"medium":"high",
    regulatoryTags:["PSD2","FATF","SOC2","PCI-DSS","ISO20022"].concat(isCross?["GDPR","MiCA"]:[]).concat(vert==="consumer"?["DeFi-Governance"]:[]),
    dataRetention:"7 years",sanctionsSource:sourceLabel,
    recommendations:[
      isCross?`Consider pre-funded FX positions for recurring ${payment.fromCountry}→${payment.toCountry} corridor`:"Domestic rail performing within SLA",
      isHV?"Implement batch processing for high-value payments to reduce overhead":"Current volume within optimal parameters",
      "Next review: Quarterly compliance audit per SOC2 Type II",
    ],
    summary:`Audit complete. 5-agent decision chain recorded. ${["PSD2","FATF","SOC2","PCI-DSS","ISO20022"].length+(isCross?2:0)} regulatory frameworks. SDN data: ${sourceLabel}.`
  };
}

function StyleInjector(){

}

// ─── Sanctions Status Badge ──────────────────────────────────────────────────────

function LiveDataStatus({sanctionsState,fxState}){
  const sdn=sanctionsState;
  const isLoading=sdn?.status==="loading";
  const feeds=sdn?.feeds||{};
  const liveSdn=[feeds.ofac,feeds.eu,feeds.un].filter(f=>f==="live").length;
  const totalEntities=(sdn?.ofacCount||0)+(sdn?.euCount||0)+(sdn?.unCount||0)||sdn?.count||0;
  const fxLive=fxState?.status==="live";

  if(isLoading) return <div style={{display:"flex",alignItems:"center",gap:5,padding:"3px 10px",borderRadius:3,background:"rgba(255,184,77,.08)",border:"1px solid rgba(255,184,77,.2)"}}>
    <div style={{width:5,height:5,border:"1px solid #ffb84d",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 1s linear infinite",flexShrink:0}}/>
    <span style={{fontFamily:"var(--mono)",fontSize:8,color:"#ffb84d",letterSpacing:".08em"}}>LOADING LIVE DATA...</span>
  </div>;

  return <div style={{display:"flex",alignItems:"center",gap:8}}>
    {/* Sanctions feeds */}
    <div style={{display:"flex",alignItems:"center",gap:4,padding:"3px 8px",borderRadius:3,background:liveSdn>0?"rgba(0,229,160,.06)":"rgba(100,116,139,.06)",border:`1px solid ${liveSdn>0?"rgba(0,229,160,.2)":"rgba(100,116,139,.15)"}`}}>
      <div style={{width:5,height:5,borderRadius:"50%",background:liveSdn>0?"#00e5a0":"#64748b",boxShadow:liveSdn>0?"0 0 6px #00e5a0":"none",animation:liveSdn>0?"pulse 2s infinite":"none",flexShrink:0}}/>
      <div>
        <div style={{fontFamily:"var(--mono)",fontSize:7,fontWeight:700,color:liveSdn>0?"#00e5a0":"#64748b",letterSpacing:".1em",whiteSpace:"nowrap"}}>
          {liveSdn>0?`LIVE SANCTIONS · ${totalEntities.toLocaleString()} ENTITIES`:"CACHED SANCTIONS"}
        </div>
        <div style={{fontFamily:"var(--mono)",fontSize:6,color:"var(--dim)",whiteSpace:"nowrap"}}>
          OFAC{feeds.ofac==="live"?" ✓":""}  EU{feeds.eu==="live"?" ✓":""}  UN{feeds.un==="live"?" ✓":""}
        </div>
      </div>
    </div>
    {/* FX rates */}
    <div style={{display:"flex",alignItems:"center",gap:4,padding:"3px 8px",borderRadius:3,background:fxLive?"rgba(56,189,248,.06)":"rgba(100,116,139,.06)",border:`1px solid ${fxLive?"rgba(56,189,248,.2)":"rgba(100,116,139,.15)"}`}}>
      <div style={{width:5,height:5,borderRadius:"50%",background:fxLive?"#38bdf8":"#64748b",boxShadow:fxLive?"0 0 6px #38bdf8":"none",animation:fxLive?"pulse 2s infinite":"none",flexShrink:0}}/>
      <div>
        <div style={{fontFamily:"var(--mono)",fontSize:7,fontWeight:700,color:fxLive?"#38bdf8":"#64748b",letterSpacing:".1em",whiteSpace:"nowrap"}}>{fxLive?"LIVE FX RATES":"CACHED FX RATES"}</div>
        <div style={{fontFamily:"var(--mono)",fontSize:6,color:"var(--dim)",whiteSpace:"nowrap"}}>{fxLive?`ECB · ${fxState.timestamp}`:"ECB Reference"}</div>
      </div>
    </div>
  </div>;
}

// ─── Agent Pipeline ───────────────────────────────────────────────────────────────

function AgentPipeline({statuses,selected,onSelect}){
  return <div style={{display:"flex",gap:4,padding:"8px 14px",background:"var(--surface)",borderBottom:"1px solid var(--border)",flexShrink:0,overflowX:"auto"}}>
    {AGENTS.map((a,i)=>{
      const st=statuses[a.id]||"idle";
      const isSel=selected===a.id;
      return <React.Fragment key={a.id}>
        <div onClick={()=>onSelect(a.id)} style={{
          flex:"1 0 0",minWidth:90,padding:"7px 9px",borderRadius:3,cursor:"pointer",
          background:isSel?a.color+"10":st==="running"?a.color+"06":"var(--card)",
          border:`1.5px solid ${isSel?a.color:st==="running"?a.color+"60":st==="complete"?a.color+"40":st==="failed"?"#ff456040":"var(--border)"}`,
          position:"relative",overflow:"hidden",transition:"all .2s"
        }}>
          {st==="running"&&<div style={{position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,transparent,${a.color},transparent)`,animation:"shimmer 1.5s infinite"}}/>}
          <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:2}}>
            <span style={{fontSize:11,color:a.color}}>{a.icon}</span>
            <span style={{fontFamily:"var(--sans)",fontSize:9,fontWeight:700,color:a.color,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.name}</span>
            <div style={{marginLeft:"auto",width:5,height:5,borderRadius:"50%",flexShrink:0,
              background:st==="complete"?a.color:st==="failed"?"#ff4560":st==="running"?a.color:"var(--border)",
              boxShadow:st==="running"?`0 0 6px ${a.color}`:"none",
              animation:st==="running"?"pulse 1s infinite":"none"
            }}/>
          </div>
          <div style={{fontSize:8,color:"var(--muted)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
            {st==="running"?"Processing...":st==="complete"?"Done ✓":st==="failed"?"Blocked ✗":a.role}
          </div>
        </div>
        {i<AGENTS.length-1&&<div style={{display:"flex",alignItems:"center",color:st==="complete"?a.color:"var(--border)",fontSize:8,flexShrink:0}}>▸</div>}
      </React.Fragment>;
    })}
  </div>;
}

  useEffect(()=>{if(ref.current)ref.current.scrollTop=ref.current.scrollHeight},[entries]);
  return <div ref={ref} style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:3,padding:"10px 14px"}}>
    {entries.length===0&&<div style={{color:"var(--dim)",fontSize:11,textAlign:"center",padding:24}}>Audit trail populates as agents process...</div>}
    {entries.map((e,i)=>{
      const ag=AGENTS.find(a=>a.id===e.agent);
      return <div key={i} style={{padding:"5px 8px",borderRadius:2,background:"var(--card)",borderLeft:`3px solid ${ag?ag.color:"var(--border)"}`,animation:"fadeUp .2s ease"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:1}}>
          <span style={{fontFamily:"var(--mono)",fontSize:8,fontWeight:700,color:ag?ag.color:"var(--muted)",textTransform:"uppercase",letterSpacing:".06em"}}>{e.agent}</span>
          <span style={{fontFamily:"var(--mono)",fontSize:7,color:"var(--dim)"}}>{e.time}</span>
        </div>
        <div style={{fontSize:11,color:"#94a3b8",lineHeight:1.4}}>{e.message}</div>
        {e.status&&<span className="tag" style={{display:"inline-block",marginTop:2,background:e.status==="pass"?"rgba(0,229,160,.1)":e.status==="fail"?"rgba(255,69,96,.1)":"rgba(255,184,77,.1)",color:e.status==="pass"?"#00e5a0":e.status==="fail"?"#ff4560":"#ffb84d"}}>{e.status.toUpperCase()}</span>}
      </div>;
    })}
  </div>;
}

// ─── Analytics ─────────────────────────────────────────────────────────────────────

function Analytics({payments,vertical}){
  const v=VERTICALS[vertical];
  const vp=payments.filter(p=>p.vertical===vertical);
  const settled=vp.filter(p=>p.finalStatus==="settled");
  const rejected=vp.filter(p=>p.finalStatus==="rejected");
  const sdnBlocked=vp.filter(p=>p.sdnBlocked);
  const total=vp.reduce((s,p)=>s+(p.payment?.amount||0),0);
  const avgRisk=settled.length?Math.round(settled.reduce((s,p)=>s+(p.results?.control?.riskScore||0),0)/settled.length):0;
  const byRail={};
  settled.forEach(p=>{const r=p.results?.control?.recommendedRail?.name||"Unknown";byRail[r]=(byRail[r]||0)+1});
  return <div style={{padding:"14px 16px",display:"flex",flexDirection:"column",gap:12}}>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
      <Badge label="Total Processed" value={vp.length} color={v.accent}/>
      <Badge label="Volume" value={total>1e6?`$${(total/1e6).toFixed(1)}M`:`$${total.toLocaleString()}`} color={v.accent}/>
      <Badge label="Settled" value={`${settled.length} (${vp.length?Math.round(settled.length/vp.length*100):0}%)`} color="#00e5a0"/>
      <Badge label="Blocked" value={`${rejected.length} (${vp.length?Math.round(rejected.length/vp.length*100):0}%)`} color="#ff4560"/>
      <Badge label="SDN Hits" value={sdnBlocked.length} color="#a78bfa"/>
      <Badge label="Avg Risk" value={avgRisk||"—"} color={avgRisk<40?"#00e5a0":avgRisk<70?"#ffb84d":"#ff4560"}/>
    </div>
    {Object.keys(byRail).length>0&&<div>
      <div className="lbl" style={{marginBottom:6}}>Rail Distribution</div>
      {Object.entries(byRail).map(([name,count])=><div key={name} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid var(--border)",fontSize:11,color:"var(--muted)"}}>
        <span style={{color:"#38bdf8"}}>{name}</span>
        <span>{count} tx ({Math.round(count/settled.length*100)}%)</span>
      </div>)}

// ─── App ───────────────────────────────────────────────────────────────────────────

function App(){
  const [showHero,setShowHero]=useState(true);
  const [vertical,setVertical]=useState("treasury");
  const [policies,setPolicies]=useState(VERTICALS.treasury.policies);
  const [payments,setPayments]=useState([]);
  const [isProcessing,setIsProcessing]=useState(false);
  const [killActive,setKillActive]=useState(false);
  const [agentStatuses,setAgentStatuses]=useState({});
  const [agentResults,setAgentResults]=useState({});
  const [selectedAgent,setSelectedAgent]=useState(null);
  const [auditEntries,setAuditEntries]=useState([]);
  const [selectedRail,setSelectedRail]=useState(null);
  const [txState,setTxState]=useState(null);
  const [leftTab,setLeftTab]=useState("payment");
  const [rightTab,setRightTab]=useState("pipeline");
  const [hitl,setHitl]=useState(null);
  const [intentSource,setIntentSource]=useState("human");
  const [sanctionsState,setSanctionsState]=useState({status:"loading",count:0,source:"Loading...",feeds:{ofac:"loading",eu:"loading",un:"loading"}});
  const [fxState,setFxState]=useState({status:"loading"});
  const [demoScene,setDemoScene]=useState(null);
  const demoAbortRef=useRef(false);
  const escRef=useRef(null);
  const v=VERTICALS[vertical];

  // Load live data on mount — parallel
  useEffect(()=>{
    loadSanctionsData(state=>{setSanctionsState(state);SANCTIONS_STATE=state;});
    loadFXRates(state=>{setFxState(state);FX_STATE=state;});
  },[]);

  useEffect(()=>{setPolicies(VERTICALS[vertical].policies)},[vertical]);

  const addAudit=useCallback((agent,msg,status)=>{
    setAuditEntries(p=>[...p,{agent,message:msg,status,time:now()}]);
  },[]);

  const processPayment=useCallback(async(payment,_vertOverride,_polOverride)=>{
    if(isProcessing) return;
    const activeVert=_vertOverride||vertical;
    const activePol=_polOverride||policies;
    setIsProcessing(true);
    setAgentStatuses({});setAgentResults({});setSelectedAgent(null);setAuditEntries([]);setSelectedRail(null);setTxState("Created");
    setIntentSource(payment.intentSource||"human");
    setRightTab("pipeline");
    const rec={id:payment.id,payment,finalStatus:"processing",results:{},vertical:activeVert,wasEscalated:false,sdnBlocked:false};
    setPayments(p=>[rec,...p]);

    const pol=activePol;
    const sdn=SANCTIONS_STATE;
    let aborted=false;
    const allResults={};

    for(let ai=0;ai<AGENTS.length;ai++){
      const agent=AGENTS[ai];
      if(aborted||killActive){setAgentStatuses(p=>({...p,[agent.id]:"skipped"}));continue;}
      setAgentStatuses(p=>({...p,[agent.id]:"running"}));
      setSelectedAgent(agent.id);
      addAudit(agent.id,`${agent.name} activated`,null);

      if(agent.id==="governance") setTxState("Validated");
      if(agent.id==="control")    setTxState("Risk Assessed");
      if(agent.id==="execution")  setTxState("Routed");

      await new Promise(r=>setTimeout(r,600+Math.random()*700));

      const result=simulate(agent.id,payment,activeVert,pol,sdn);
      allResults[agent.id]=result;
      setAgentResults(p=>({...p,[agent.id]:result}));

      if(agent.id==="governance"){
        if(result.approved===false){
          setAgentStatuses(p=>({...p,[agent.id]:"failed"}));
          const isSdnHit=!!result.sdnHit;
          addAudit(agent.id,`REJECTED — ${result.summary}`,"fail");
          result.checks?.filter(c=>c.status==="fail").forEach(c=>addAudit(agent.id,`✗ ${c.name}: ${c.detail}`,"fail"));
          if(isSdnHit) addAudit(agent.id,`⬡ LIVE OFAC MATCH: "${result.sdnHit.entity}" · ${result.sdnHit.source}`,"fail");
          aborted=true;
          setPayments(p=>p.map(x=>x.id===payment.id?{...x,finalStatus:"rejected",sdnBlocked:isSdnHit,results:allResults}:x));
          setTxState(null);
          continue;
        }
        if(result.escalationRequired&&pol.hitl){
          addAudit(agent.id,"ESCALATION: "+result.escalationReason,"warning");
          setHitl({payment,reason:result.escalationReason,checks:result.checks?.filter(c=>c.status==="pass").slice(0,3).map(c=>({label:c.name,detail:c.detail.slice(0,60)+"..."}))||[]});
          const approved=await new Promise(res=>{escRef.current=res});
          setHitl(null);
          setPayments(p=>p.map(x=>x.id===payment.id?{...x,wasEscalated:true}:x));
          if(!approved){
            addAudit(agent.id,"REJECTED by human reviewer","fail");
            setAgentStatuses(p=>({...p,[agent.id]:"failed"}));
            aborted=true;
            setPayments(p=>p.map(x=>x.id===payment.id?{...x,finalStatus:"rejected",results:allResults}:x));
            setTxState(null);
            continue;
          }
          addAudit(agent.id,"APPROVED by human reviewer — continuing pipeline","pass");
          setTxState("Approved");
        }
        result.checks?.forEach(c=>addAudit(agent.id,`${c.live?"[LIVE] ":""}${c.name}: ${c.detail}`,c.status));
      }

      if(agent.id==="control"&&result.recommendedRail){
        setSelectedRail(result.recommendedRail.id);
        addAudit(agent.id,`Rail: ${result.recommendedRail.name} — ${result.recommendedRail.reason}`,"pass");
        addAudit(agent.id,`Risk score: ${result.riskScore}/100 (${result.riskLevel})`,result.riskLevel==="low"?"pass":"warning");
      }
      if(agent.id==="execution"){
        setTxState("Settled");
        addAudit(agent.id,`SETTLED via ${result.selectedRail} [${result.provider}]`,"pass");
        addAudit(agent.id,`TX: ${result.transactionId} | Fees: $${result.fees?.total} | ${result.settlementTime}`,null);
      }
      if(agent.id==="audit"){
        setTxState("Reconciled");
        result.decisionChain?.forEach(d=>addAudit(agent.id,`[${d.reasonCode}] ${d.agent}: ${d.decision}`,null));
        addAudit(agent.id,`SDN data: ${result.sanctionsSource||"reference list"}`,null);
      }

      setAgentStatuses(p=>({...p,[agent.id]:"complete"}));
      addAudit(agent.id,result.summary||"Complete","pass");
    }

    if(!aborted){
      const final={};AGENTS.forEach(a=>{final[a.id]="complete"});
      setAgentStatuses(final);
      setPayments(p=>p.map(x=>x.id===payment.id?{...x,finalStatus:"settled",results:allResults}:x));
    }
    setIsProcessing(false);
  },[vertical,policies,killActive,isProcessing,addAudit]);

  const stopDemo=useCallback(()=>{
    demoAbortRef.current=true;
    setDemoScene(null);
    setKillActive(false);
  },[]);

  const runAutoDemo=useCallback(async()=>{
    setShowHero(false);
    demoAbortRef.current=false;
    setPayments([]);
    setKillActive(false);

    const sleep=ms=>new Promise(r=>setTimeout(r,ms));
    const aborted=()=>demoAbortRef.current;

    // Helper: switch vertical + reset UI
    const switchTo=(vert)=>{
      setVertical(vert);
      setLeftTab("payment");
      setAgentStatuses({});setAgentResults({});setAuditEntries([]);setSelectedAgent(null);setTxState(null);setSelectedRail(null);
    };

    // Helper: submit and wait for processing to finish
    const submit=async(payment,vertOverride,polOverride)=>{
      await new Promise(async resolve=>{
        const startLen=Date.now();
        processPayment(payment,vertOverride,polOverride);
        // poll isProcessing — wait until done (max 15s)
        const check=setInterval(()=>{
          if(Date.now()-startLen>15000||!document.getElementById("root")) {clearInterval(check);resolve();}
        },200);
        // resolve when processing finishes (approximate — processing sets isProcessing false)
        setTimeout(()=>{clearInterval(check);resolve();},12000);
      });
      await sleep(600);
    };

    await sleep(300);

    // ── Scene 1: OFAC SDN Entity Block ──────────────────────────────────────────
    if(aborted()) return;
    setDemoScene(DEMO_SCENES[0]);
    switchTo("treasury");
    await sleep(800);
    await submit({
      id:genId(),timestamp:new Date().toISOString(),vertical:"treasury",
      amount:45000,currency:"USD",fromCountry:"US",toCountry:"AE",toCurrency:"USD",
      beneficiary:"Bank Melli Iran",purpose:"Vendor payment",urgency:"standard",intentSource:"erp"
    },"treasury",VERTICALS.treasury.policies);
    await sleep(2000);

    // ── Scene 2: Sanctioned Country Block ───────────────────────────────────────
    if(aborted()) return;
    setDemoScene(DEMO_SCENES[1]);
    await sleep(600);
    await submit({
      id:genId(),timestamp:new Date().toISOString(),vertical:"treasury",
      amount:120000,currency:"USD",fromCountry:"US",toCountry:"IR",toCurrency:"USD",
      beneficiary:"Tehran Trade LLC",purpose:"Supply chain payment",urgency:"standard",intentSource:"erp"
    },"treasury",VERTICALS.treasury.policies);
    await sleep(2000);

    // ── Scene 3: Kill Switch ─────────────────────────────────────────────────────
    if(aborted()) return;
    setDemoScene(DEMO_SCENES[2]);
    setKillActive(true);
    addAudit("orchestrator","⬛ KILL SWITCH ACTIVATED — all transactions halted globally","fail");
    setLeftTab("payment");
    await sleep(3500);
    setKillActive(false);
    addAudit("orchestrator","System resumed — kill switch deactivated","pass");
    await sleep(800);

    // ── Scene 4: Human-in-the-Loop ───────────────────────────────────────────────
    if(aborted()) return;
    setDemoScene(DEMO_SCENES[3]);
    switchTo("enterprise");
    await sleep(800);
    // Submit high-value payment that will trigger HITL (above dualApproval threshold)
    const enterprisePol={...VERTICALS.enterprise.policies,dualApproval:1000000,hitl:true};
    const hitlPayment={
      id:genId(),timestamp:new Date().toISOString(),vertical:"enterprise",
      amount:1500000,currency:"USD",fromCountry:"US",toCountry:"JP",toCurrency:"JPY",
      beneficiary:"Toyota Motor Corp",purpose:"Strategic supplier — Q1 manufacturing",urgency:"standard",intentSource:"erp"
    };
    // Start processing but don't await — we'll auto-approve HITL after delay
    processPayment(hitlPayment,"enterprise",enterprisePol);
    // Wait for HITL modal to appear then auto-approve
    await sleep(4000);
    if(!aborted()&&escRef.current){
      escRef.current(true); // auto-approve
    }
    await sleep(8000); // wait for rest of pipeline
    await sleep(1500);

    // ── Scene 5: Live FX + Full Settlement ──────────────────────────────────────
    if(aborted()) return;
    setDemoScene(DEMO_SCENES[4]);
    switchTo("treasury");
    setLeftTab("payment");
    await sleep(800);
    await submit({
      id:genId(),timestamp:new Date().toISOString(),vertical:"treasury",
      amount:250000,currency:"USD",fromCountry:"US",toCountry:"DE",toCurrency:"EUR",
      beneficiary:"Siemens AG",purpose:"Vendor invoice #INV-2026-4471",urgency:"standard",intentSource:"erp"
    },"treasury",VERTICALS.treasury.policies);
    setRightTab("audit");
    await sleep(3000);

    // ── Scene 6: AI-to-AI Commerce ───────────────────────────────────────────────
    if(aborted()) return;
    setDemoScene(DEMO_SCENES[5]);
    switchTo("ai_commerce");
    setRightTab("pipeline");
    await sleep(800);
    await submit({
      id:genId(),timestamp:new Date().toISOString(),vertical:"ai_commerce",
      amount:890,currency:"USD",fromCountry:"US",toCountry:"SG",toCurrency:"USD",
      beneficiary:"Agent-API-7x9k2",purpose:"Autonomous procurement — cloud compute",urgency:"urgent",intentSource:"openai"
    },"ai_commerce",VERTICALS.ai_commerce.policies);
    setLeftTab("analytics");
    await sleep(3000);

    // End
    if(!aborted()) setDemoScene(null);
  },[processPayment,addAudit]);

  if(showHero) return <Hero onEnter={()=>setShowHero(false)} onAutoDemo={runAutoDemo}/>;

  const leftTabs=[{id:"payment",label:"Payment"},{id:"policy",label:"Governance"},{id:"landscape",label:"Landscape"},{id:"analytics",label:"Analytics"}];
  const rightTabs=[{id:"pipeline",label:"Agent Detail"},{id:"audit",label:`Audit (${auditEntries.length})`}];

  return <div style={{height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
    <StyleInjector/>
    <style>{`
      input[type=range]{-webkit-appearance:none;appearance:none;background:var(--border);border-radius:2px;height:3px;cursor:pointer;border:none;padding:0}
      input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent,#06d6a0);cursor:pointer}
      details summary{outline:none;user-select:none;list-style:none}
    `}</style>
    <Header vertical={vertical} killActive={killActive} onKillToggle={()=>{setKillActive(k=>!k);addAudit("orchestrator",killActive?"System resumed":"⬛ KILL SWITCH — all transactions halted",killActive?"pass":"fail")}} onHero={()=>setShowHero(true)} sanctionsState={sanctionsState} fxState={fxState}/>
    <VerticalTabs active={vertical} onChange={v=>{setVertical(v);setAgentStatuses({});setAgentResults({});setAuditEntries([]);setSelectedAgent(null);setTxState(null);setSelectedRail(null)}}/>
    <AgentPipeline statuses={agentStatuses} selected={selectedAgent} onSelect={id=>{setSelectedAgent(id);setRightTab("pipeline")}}/>
    {txState&&<LifecycleBar current={txState}/>}
    <StackDiagram selectedRail={selectedRail} intentSource={intentSource} vertical={vertical}/>
    <MetricsBar payments={payments}/>

    <div style={{flex:1,display:"flex",overflow:"hidden",minHeight:0}}>
      <div style={{flex:"0 0 400px",borderRight:"1px solid var(--border)",display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <TabBar tabs={leftTabs} active={leftTab} onChange={setLeftTab} accent={v.accent}/>
        <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",minHeight:0}}>
          {leftTab==="payment"&&<PaymentForm vertical={vertical} policies={policies} onSubmit={processPayment} isProcessing={isProcessing} killActive={killActive}/>}
          {leftTab==="policy"&&<PolicyPanel vertical={vertical} policies={policies} onChange={setPolicies}/>}
          {leftTab==="landscape"&&<div style={{flex:1,overflowY:"auto"}}><Landscape/></div>}
          {leftTab==="analytics"&&<div style={{flex:1,overflowY:"auto"}}><Analytics payments={payments} vertical={vertical}/></div>}
        </div>
      </div>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minHeight:0}}>
        <TabBar tabs={rightTabs} active={rightTab} onChange={setRightTab} accent={v.accent}/>
        <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",minHeight:0}}>
          {rightTab==="pipeline"&&<div style={{flex:1,overflowY:"auto"}}><AgentDetail agentId={selectedAgent||"orchestrator"} results={agentResults}/></div>}
          {rightTab==="audit"&&<AuditTrail entries={auditEntries}/>}
        </div>
      </div>
    </div>

    {hitl&&<HITLModal payment={hitl.payment} reason={hitl.reason} checks={hitl.checks} onApprove={()=>{setHitl(null);if(escRef.current)escRef.current(true)}} onReject={()=>{setHitl(null);if(escRef.current)escRef.current(false)}}/>}
    {demoScene&&<DemoNarrator scene={demoScene} onSkip={stopDemo}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
