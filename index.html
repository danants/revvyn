@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');
:root{--m:'IBM Plex Mono',monospace;--b:'Outfit',sans-serif;--bg:#06080e;--surface:#0c1019;--surface2:#111827;--border:#1e293b;--text:#e2e8f0;--muted:#64748b;--dim:#334155}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--b);-webkit-font-smoothing:antialiased}

::-webkit-scrollbar-track{background:var(--bg)}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(6,214,160,.1)}50%{box-shadow:0 0 40px rgba(6,214,160,.25)}}

<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback}=React;

const AGENTS=[
  {id:"orchestrator",name:"Orchestrator",icon:"\u25C9",color:"#06d6a0",role:"Intent classification"},
  {id:"governance",name:"Governance",icon:"\u2B21",color:"#a78bfa",role:"Policy & compliance"},
  {id:"control",name:"Control",icon:"\u25C6",color:"#fbbf24",role:"Risk & rail selection"},
  {id:"execution",name:"Execution",icon:"\u25B8",color:"#38bdf8",role:"Settlement"},
  {id:"audit",name:"Audit",icon:"\u25EB",color:"#f472b6",role:"Explainability"},
];

const VERTICALS={
  treasury:{id:"treasury",label:"Enterprise Treasury",icon:"\u25C8",accent:"#06d6a0",desc:"Cross-border vendor payments, FX optimization, multi-bank routing",defaults:{amount:250000,currency:"USD",fromCountry:"US",toCountry:"DE",toCurrency:"EUR",beneficiary:"Siemens AG",purpose:"Vendor invoice #INV-2026-4471",urgency:"standard"},policies:{maxSingle:500000,maxDaily:2000000,requireApproval:100000,sanctions:["KP","IR","SY","CU","RU"],kycRequired:true,dualApproval:250000}},
  marketplace:{id:"marketplace",label:"Marketplace",icon:"\u25C7",accent:"#38bdf8",desc:"Seller payouts, split settlements, multi-currency disbursements",defaults:{amount:3200,currency:"USD",fromCountry:"US",toCountry:"IN",toCurrency:"INR",beneficiary:"Seller #SKU-88912",purpose:"Weekly payout",urgency:"standard"},policies:{maxSingle:50000,maxDaily:500000,requireApproval:25000,sanctions:["KP","IR","SY"],kycRequired:true,dualApproval:50000}},
  ai_commerce:{id:"ai_commerce",label:"AI-to-AI Commerce",icon:"\u25CE",accent:"#a78bfa",desc:"Autonomous agent transactions, programmatic spend governance",defaults:{amount:890,currency:"USD",fromCountry:"US",toCountry:"SG",toCurrency:"USD",beneficiary:"Agent-API-7x9k2",purpose:"Autonomous procurement - cloud compute",urgency:"urgent"},policies:{maxSingle:10000,maxDaily:100000,requireApproval:5000,sanctions:["KP","IR","SY","CU"],kycRequired:false,dualApproval:10000}},
  enterprise:{id:"enterprise",label:"Enterprise Direct",icon:"\u25D0",accent:"#fbbf24",desc:"Complex multi-entity payments, ERP integration, global compliance",defaults:{amount:1200000,currency:"USD",fromCountry:"US",toCountry:"JP",toCurrency:"JPY",beneficiary:"Toyota Motor Corp",purpose:"Strategic supplier - Q1 manufacturing",urgency:"standard"},policies:{maxSingle:5000000,maxDaily:20000000,requireApproval:500000,sanctions:["KP","IR","SY","CU","RU","BY"],kycRequired:true,dualApproval:1000000}},
  consumer:{id:"consumer",label:"Consumer AI Finance",icon:"\u25CD",accent:"#f472b6",desc:"Personal AI agents - yield-only spending, DeFi governance",defaults:{amount:85,currency:"USDC",fromCountry:"US",toCountry:"US",toCurrency:"USDC",beneficiary:"Self - Spending Card",purpose:"Yield-funded purchase",urgency:"standard"},policies:{maxSingle:500,maxDaily:2000,requireApproval:200,sanctions:["KP","IR","SY"],kycRequired:false,dualApproval:500}},
};

const RAILS=[
  {id:"visa",name:"Visa Intelligent Commerce",speed:"Instant",cost:"2.4%",icon:"\uD83D\uDCB3",provider:"Visa",type:"card"},
  {id:"mastercard",name:"Mastercard Agent Pay",speed:"Instant",cost:"2.5%",icon:"\uD83D\uDD34",provider:"Mastercard",type:"card"},
  {id:"swift",name:"SWIFT gpi",speed:"2-5 days",cost:"$25-50",icon:"\uD83C\uDFE6",provider:"SWIFT",type:"bank"},
  {id:"sepa",name:"SEPA Instant",speed:"Seconds",cost:"\u20AC0.20",icon:"\uD83C\uDDEA\uD83C\uDDFA",provider:"SEPA",type:"bank"},
  {id:"wooshpay",name:"WooshPay API",speed:"Minutes",cost:"1.2%",icon:"\uD83C\uDF10",provider:"WooshPay",type:"api"},
  {id:"stablecoin",name:"USDC / USDT",speed:"Minutes",cost:"$0.01",icon:"\u2B21",provider:"Circle",type:"crypto"},
  {id:"rtp",name:"RTP / FedNow",speed:"Seconds",cost:"$0.50",icon:"\u26A1",provider:"TCH/Fed",type:"instant"},
  {id:"defi",name:"DeFi / Aave",speed:"Seconds",cost:"Gas only",icon:"\uD83D\uDD2E",provider:"Aave",type:"defi"},
  {id:"selfcustody",name:"Self-Custody Card",speed:"Instant",cost:"$0.02",icon:"\uD83D\uDD10",provider:"Wirex",type:"self-custody"},
];

const INTENT_SOURCES=[
  {id:"google_ucp",name:"Google UCP",color:"#4285f4"},
  {id:"openai",name:"OpenAI Agent",color:"#10b981"},
  {id:"erp",name:"ERP System",color:"#fbbf24"},
  {id:"human",name:"Human User",color:"#f472b6"},
  {id:"custom_agent",name:"Custom AI",color:"#a78bfa"},
  {id:"defi_agent",name:"DeFi Agent",color:"#f472b6"},
];

const COUNTRIES=["US","UK","DE","JP","SG","BR","NG","AE","IN","AU","FR","CA","NL","CH"];
const CURRENCIES=["USD","EUR","GBP","JPY","SGD","BRL","NGN","AED","INR","AUD","CHF","CAD","USDC","USDT"];
const SANCTIONED=["KP","IR","SY","CU"];
const STATES=["Created","Validated","Risk Assessed","Approved","Routed","Settled","Reconciled"];

const COMPS=[
  {name:"Circuit & Chisel",raised:"$19.2M",lead:"Primary VC, ParaFi, Stripe",what:"ATXP protocol for agent-to-agent payments",gap:"No policy engine, no compliance, no multi-rail governance"},
  {name:"Natural",raised:"$9.8M",lead:"Abstract, Human Capital",what:"B2B agentic payment automation",gap:"No governance, no risk scoring, no audit trail"},
  {name:"Nekuda",raised:"$5M",lead:"Madrona, Visa, Amex Ventures",what:"Agent checkout & credential management",gap:"No policy enforcement, no rail optimization, no DeFi"},
  {name:"t54 Labs",raised:"$5M",lead:"Anagram, Franklin Templeton, Ripple",what:"Know Your Agent identity & compliance",gap:"No payment governance, no rail selection, no policy engine"},
  {name:"Based",raised:"$11.5M",lead:"Pantera, Coinbase Ventures",what:"Consumer agentic commerce on Hyperliquid",gap:"No enterprise governance, no multi-rail, no compliance"},
];

function genId(){return "PAY-"+Math.random().toString(36).substr(2,8).toUpperCase()}
function genTx(){return "TX-"+Date.now().toString(36).toUpperCase()+Math.random().toString(36).substr(2,4).toUpperCase()}

// ═══════════════════════════════════════════════════════════
// SIMULATION ENGINE — replaces API calls
// ═══════════════════════════════════════════════════════════

var FX_RATES={EUR:0.92,GBP:0.79,JPY:149.5,SGD:1.34,BRL:4.97,NGN:1550,AED:3.67,INR:83.1,AUD:1.53,CHF:0.88,CAD:1.36,USD:1,USDC:1,USDT:1};

function pickRail(payment,vertical){
  var to=payment.toCountry;var ccy=payment.toCurrency;var amt=payment.amount;var urg=payment.urgency;
  if(vertical==="consumer") return {id:"selfcustody",name:"Self-Custody Card",provider:"Wirex/Gnosis Pay",reason:"Yield-funded self-custody wallet minimizes counterparty risk and preserves principal protection"};
  if(ccy==="USDC"||ccy==="USDT") return {id:"stablecoin",name:"USDC / USDT",provider:"Circle",reason:"Stablecoin settlement offers near-zero cost with sub-minute finality"};
  if(to==="DE"||to==="FR"||to==="NL"||to==="CH") return {id:"sepa",name:"SEPA Instant",provider:"SEPA",reason:"EUR-zone destination qualifies for SEPA Instant \u2014 sub-second settlement at \u20AC0.20 flat"};
  if(urg==="critical"&&amt<50000) return {id:"rtp",name:"RTP / FedNow",provider:"TCH/Fed",reason:"Critical urgency with moderate amount \u2014 RTP delivers seconds settlement at $0.50"};
  if(amt>100000) return {id:"swift",name:"SWIFT gpi",provider:"SWIFT",reason:"High-value cross-border transfer \u2014 SWIFT gpi offers end-to-end tracking with correspondent banking network"};
  if(to==="IN"||to==="SG"||to==="NG") return {id:"wooshpay",name:"WooshPay API",provider:"WooshPay",reason:"Emerging market corridor optimized via WooshPay local rails \u2014 1.2% with fast settlement"};
  if(amt<5000) return {id:"visa",name:"Visa Intelligent Commerce",provider:"Visa",reason:"Sub-$5K transaction on supported corridor \u2014 Visa TAP-enabled instant settlement at 2.4%"};
  return {id:"swift",name:"SWIFT gpi",provider:"SWIFT",reason:"Default high-value cross-border routing via SWIFT gpi with end-to-end tracking"};
}

function altRails(primary,payment,vertical){
  var alts=[];
  if(primary.id!=="visa") alts.push({id:"visa",name:"Visa Intelligent Commerce",reason:"Card-rail fallback with Visa TAP agent authentication"});
  if(primary.id!=="stablecoin") alts.push({id:"stablecoin",name:"USDC / USDT",reason:"Stablecoin alternative for near-zero settlement cost"});
  if(primary.id!=="swift"&&payment.amount>10000) alts.push({id:"swift",name:"SWIFT gpi",reason:"Traditional correspondent banking with gpi tracking"});
  return alts.slice(0,2);
}

function simulateAgent(agentId,payment,vert,policies){
  var v=VERTICALS[vert];
  var isSanctioned=policies.sanctions.indexOf(payment.toCountry)>=0;
  var overMax=payment.amount>policies.maxSingle;
  var needsApproval=payment.amount>=policies.requireApproval;
  var needsDual=payment.amount>=policies.dualApproval;
  var isCrossBorder=payment.fromCountry!==payment.toCountry;
  var isCrossCurrency=payment.currency!==payment.toCurrency;
  var isHighValue=payment.amount>100000;
  var riskBase=isSanctioned?95:isCrossBorder?(isHighValue?42:28):(isHighValue?22:15);
  var riskJitter=Math.floor(Math.random()*10)-5;
  var riskScore=Math.max(5,Math.min(95,riskBase+riskJitter));
  var rail=pickRail(payment,vert);
  var fxRate=FX_RATES[payment.toCurrency]||1;
  var converted=payment.currency!==payment.toCurrency?Math.round(payment.amount*fxRate*100)/100:null;
  var feeRate=payment.amount>500000?0.0008:payment.amount>100000?0.0015:payment.amount>10000?0.003:0.024;
  var totalFee=Math.max(0.50,Math.round(payment.amount*feeRate*100)/100);
  var txId=genTx();

  var results={
    orchestrator:{
      classification:isHighValue?"high-value":isCrossBorder?"cross-border":payment.urgency==="urgent"?"urgent":"standard",
      intentSource:payment.intentSource||"human",
      priority:isHighValue?"high":payment.urgency==="urgent"?"high":"medium",
      requiredChecks:["sanctions_screening","amount_validation","kyc_verification","corridor_check","beneficiary_verification"].concat(isCrossBorder?["fx_optimization","correspondent_check"]:[]),
      routingHints:isCrossBorder?["cross_border_corridor","fx_hedge_eligible","multi_rail_candidate"]:["domestic_fast_rail","low_cost_priority"],
      estimatedComplexity:isHighValue?"high":isCrossBorder?"medium":"low",
      summary:"Classified as "+( isHighValue?"high-value":"")+(isCrossBorder?" cross-border":"")+" "+v.label.toLowerCase()+" payment. "+(needsApproval?"Approval required. ":"")+"Routing to governance for policy enforcement."
    },
    governance:(function(){
      if(isSanctioned) return {
        approved:false,
        checks:[
          {name:"OFAC Sanctions Screening",status:"fail",detail:"Destination country "+payment.toCountry+" is on the sanctioned entities list. Transaction blocked under OFAC/EU sanctions regime."},
          {name:"Amount Validation",status:"pass",detail:"Amount "+payment.currency+" "+Number(payment.amount).toLocaleString()+" within single transaction limit of $"+Number(policies.maxSingle).toLocaleString()},
          {name:"Beneficiary Verification",status:"warning",detail:"Beneficiary verification suspended \u2014 sanctions block takes precedence"}
        ],
        complianceScore:12,
        escalationRequired:false,escalationReason:null,escalationType:"none",
        regulatoryFrameworks:["OFAC","EU-Sanctions","FATF-R6","PSD2"],
        summary:"REJECTED \u2014 Destination country "+payment.toCountry+" is sanctioned. Transaction blocked at governance layer."
      };
      if(overMax) return {
        approved:false,
        checks:[
          {name:"Amount Validation",status:"fail",detail:"Amount "+payment.currency+" "+Number(payment.amount).toLocaleString()+" exceeds maximum single payment limit of $"+Number(policies.maxSingle).toLocaleString()},
          {name:"OFAC Sanctions Screening",status:"pass",detail:"Destination "+payment.toCountry+" cleared against OFAC, EU, and UN sanctions databases"},
          {name:"Daily Volume Check",status:"warning",detail:"Amount would consume "+(Math.round(payment.amount/policies.maxDaily*100))+"% of daily limit"}
        ],
        complianceScore:35,
        escalationRequired:false,escalationReason:null,escalationType:"none",
        regulatoryFrameworks:["SOC2","PCI-DSS","ISO20022"],
        summary:"REJECTED \u2014 Amount exceeds maximum single payment policy threshold."
      };
      var checks=[
        {name:"OFAC Sanctions Screening",status:"pass",detail:"Destination "+payment.toCountry+" cleared against OFAC, EU, and UN consolidated sanctions databases. No matches found."},
        {name:"Amount Validation",status:"pass",detail:"Amount "+payment.currency+" "+Number(payment.amount).toLocaleString()+" within single transaction limit of $"+Number(policies.maxSingle).toLocaleString()+" ("+(Math.round(payment.amount/policies.maxSingle*100))+"% utilization)"},
        {name:"Beneficiary Verification",status:"pass",detail:"Beneficiary \""+payment.beneficiary+"\" verified against KYC registry. No adverse media or PEP flags."},
        {name:"Daily Volume Check",status:payment.amount>policies.maxDaily*0.5?"warning":"pass",detail:"Daily volume at "+(Math.round(payment.amount/policies.maxDaily*100))+"% of $"+Number(policies.maxDaily).toLocaleString()+" limit"+(payment.amount>policies.maxDaily*0.5?". Approaching threshold.":".")}
      ];
      if(isCrossBorder) checks.push({name:"Corridor Compliance",status:"pass",detail:payment.fromCountry+" \u2192 "+payment.toCountry+" corridor cleared. No capital control restrictions. AML/CFT requirements met."});
      if(policies.kycRequired) checks.push({name:"KYC/AML Verification",status:"pass",detail:"Enhanced due diligence completed. Identity verified via "+( vert==="consumer"?"DeFi wallet attestation":"corporate registry")+". Risk rating: standard."});
      if(vert==="consumer") checks.push({name:"Principal Protection",status:"pass",detail:"Transaction amount $"+payment.amount+" funded from accrued DeFi yield ($"+( Math.round(payment.amount*1.8))+  " available). Principal remains untouched."});
      var esc=needsDual&&!overMax;
      return {
        approved:true,
        checks:checks,
        complianceScore:isCrossBorder?87:94,
        escalationRequired:esc,
        escalationReason:esc?"Amount of "+payment.currency+" "+Number(payment.amount).toLocaleString()+" meets dual approval threshold ($"+Number(policies.dualApproval).toLocaleString()+"). Human authorization required under governance policy.":null,
        escalationType:esc?"dual_approval":"none",
        regulatoryFrameworks:["PSD2","FATF","SOC2","PCI-DSS","ISO20022"].concat(isCrossBorder?["GDPR","MiCA"]:[]),
        summary:"APPROVED \u2014 All "+checks.length+" compliance checks passed."+(esc?" Dual approval escalation triggered.":"")+" Compliance score: "+(isCrossBorder?87:94)+"%."
      };
    })(),
    control:{
      riskScore:riskScore,
      riskLevel:riskScore<30?"low":riskScore<60?"medium":riskScore<80?"high":"critical",
      fraudIndicators:[
        {indicator:"Velocity Check",severity:"low",detail:"Transaction frequency within normal patterns for "+v.label+" vertical. No anomalies detected."},
        {indicator:"Beneficiary Pattern",severity:isCrossBorder?"medium":"low",detail:isCrossBorder?"First transaction to "+payment.toCountry+" corridor this period. Enhanced monitoring applied.":"Recurring beneficiary with established payment history."},
        {indicator:"Amount Deviation",severity:isHighValue?"medium":"low",detail:isHighValue?"Amount is "+(Math.round(payment.amount/50000))+"x above median for this vertical. Within policy but flagged for monitoring.":"Amount within expected range for "+v.label+" payments."}
      ],
      recommendedRail:rail,
      alternativeRails:altRails(rail,payment,vert),
      fxOptimization:{
        applicable:isCrossCurrency,
        strategy:isCrossCurrency?"Mid-market rate lock with 15-minute execution window. Estimated savings vs retail rate: "+(Math.round(payment.amount*0.003)).toLocaleString()+" "+payment.currency+".":"N/A \u2014 same-currency settlement",
        estimatedSavings:isCrossCurrency?"$"+(Math.round(payment.amount*0.003)).toLocaleString():"$0"
      },
      humanReviewRequired:false,
      summary:"Risk score "+riskScore+"/100 ("+( riskScore<30?"low":riskScore<60?"medium":"high")+"). Recommended rail: "+rail.name+" via "+rail.provider+". "+(isCrossCurrency?"FX optimization saves ~$"+(Math.round(payment.amount*0.003)).toLocaleString()+".":"Same-currency settlement.")
    },
    execution:{
      status:"settled",
      selectedRail:rail.name,
      provider:rail.provider,
      transactionId:txId,
      settlementTime:rail.id==="swift"?"T+2 (48 hours estimated)":rail.id==="sepa"?"8.2 seconds":rail.id==="rtp"?"3.1 seconds":rail.id==="visa"||rail.id==="mastercard"?"Instant (sub-second)":rail.id==="stablecoin"?"2 minutes 14 seconds":rail.id==="defi"?"12.4 seconds (2 block confirmations)":rail.id==="selfcustody"?"Instant":rail.id==="wooshpay"?"4 minutes 38 seconds":"Processing",
      fees:{total:totalFee,currency:"USD",breakdown:{network:Math.round(totalFee*0.45*100)/100,fx:isCrossCurrency?Math.round(totalFee*0.3*100)/100:0,processing:Math.round(totalFee*0.2*100)/100,compliance:Math.round(totalFee*0.05*100)/100}},
      fxRate:isCrossCurrency?fxRate:null,
      convertedAmount:converted,
      ledgerEntries:[
        {type:"debit",account:"Operating \u2014 "+payment.fromCountry,amount:payment.amount,currency:payment.currency},
        {type:"credit",account:"Beneficiary \u2014 "+payment.beneficiary,amount:converted||payment.amount,currency:payment.toCurrency}
      ],
      networkResponse:{code:"200",message:"Settlement confirmed. Reference: "+txId},
      summary:"Settled "+payment.currency+" "+Number(payment.amount).toLocaleString()+" via "+rail.name+" ("+rail.provider+"). "+(converted?"Converted to "+payment.toCurrency+" "+Number(converted).toLocaleString()+" at "+fxRate+". ":"")+"Fees: $"+totalFee+". Settlement: "+( rail.id==="swift"?"T+2":"sub-minute")+"."
    },
    audit:{
      auditId:"AUD-"+Date.now().toString(36).toUpperCase(),
      decisionChain:[
        {agent:"Orchestrator",decision:"Classified as "+(isHighValue?"high-value ":"")+(isCrossBorder?"cross-border ":"")+"payment. Priority: "+(isHighValue?"high":"medium"),reasonCode:"ORCH-CLF-001",confidence:97},
        {agent:"Governance",decision:"All compliance checks passed. "+(needsDual?"Dual approval obtained.":"Standard approval.")+" Score: "+(isCrossBorder?87:94)+"%",reasonCode:"GOV-APR-"+(needsDual?"DAP":"STD"),confidence:94},
        {agent:"Control",decision:"Risk "+riskScore+"/100. Selected "+rail.name+" for optimal cost/speed."+(isCrossCurrency?" FX optimized.":""),reasonCode:"CTL-RSK-"+( riskScore<30?"LOW":"MED"),confidence:91},
        {agent:"Execution",decision:"Settled via "+rail.provider+". "+txId+". Fees: $"+totalFee,reasonCode:"EXE-STL-OK",confidence:99},
        {agent:"Audit",decision:"Full regulatory trail generated. 7-year retention. All frameworks satisfied.",reasonCode:"AUD-CMP-FUL",confidence:96}
      ],
      complianceStatus:"compliant",
      riskClassification:riskScore<30?"low":riskScore<60?"medium":"high",
      regulatoryTags:["PSD2","FATF","SOC2","PCI-DSS","ISO20022"].concat(isCrossBorder?["GDPR","MiCA"]:[]).concat(vert==="consumer"?["DeFi-Governance"]:[]),
      railProvider:rail.provider,
      dataRetention:"7 years",
      recommendations:[
        isCrossBorder?"Consider pre-funded FX positions for recurring "+payment.fromCountry+"\u2192"+payment.toCountry+" corridor":"Domestic rail performing within SLA",
        isHighValue?"Implement scheduled batch processing for high-value payments to reduce per-transaction overhead":"Current transaction volume within optimal parameters",
        "Next review: Quarterly compliance audit scheduled per SOC2 Type II requirements"
      ],
      summary:"Audit complete. Full decision chain recorded across 5 agents with "+( ["PSD2","FATF","SOC2","PCI-DSS","ISO20022"].length+(isCrossBorder?2:0))+" regulatory frameworks. Classification: compliant. Data retained for 7 years per regulatory requirements."
    }
  };
  return results[agentId];
}

// ═══════════════════════════════════════════════════════════
// UI COMPONENTS
// ═══════════════════════════════════════════════════════════

function Tabs({tabs,active,onChange,accent}){
  return React.createElement("div",{style:{display:"flex",gap:"2px",borderBottom:"1px solid var(--border)",overflow:"auto",flexShrink:0,background:"var(--surface)",padding:"0 8px"}},
    tabs.map(function(t){return React.createElement("button",{key:t.id,onClick:function(){onChange(t.id)},style:{padding:"11px 14px",border:"none",background:"transparent",fontFamily:"var(--m)",fontSize:"11px",fontWeight:600,color:active===t.id?accent:"var(--muted)",cursor:"pointer",letterSpacing:".5px",whiteSpace:"nowrap",borderBottom:"2px solid "+(active===t.id?accent:"transparent"),transition:"all .15s"}},t.label)})
  );
}

function Badge({label,value,color}){
  return React.createElement("div",{style:{padding:"5px 8px",borderRadius:"6px",background:color+"10",border:"1px solid "+color+"20"}},
    React.createElement("div",{style:{fontFamily:"var(--m)",fontSize:"7px",color:"var(--muted)"}},label),
    React.createElement("div",{style:{fontFamily:"var(--m)",fontSize:"12px",fontWeight:700,color:color}},value)
  );
}

function SC({label,value,sub,color}){
  return React.createElement("div",{style:{padding:"12px",borderRadius:"8px",background:"var(--surface)",border:"1px solid var(--border)"}},
    React.createElement("div",{style:{fontFamily:"var(--m)",fontSize:"8px",color:"var(--muted)",letterSpacing:".5px"}},label.toUpperCase()),
    React.createElement("div",{style:{fontFamily:"var(--m)",fontSize:"24px",fontWeight:700,color:color,lineHeight:1.1}},value),
    React.createElement("div",{style:{fontSize:"10px",color:"var(--muted)",marginTop:"2px"}},sub)
  );
}

function Fld({label,children}){
  return React.createElement("div",null,
    React.createElement("label",{style:{display:"block",fontFamily:"var(--m)",fontSize:"9px",color:"var(--muted)",letterSpacing:".8px",marginBottom:"4px",fontWeight:600}},label),children);
}

function PipelineRow({statuses,selected,onSelect,isMobile}){
  return React.createElement("div",{style:{display:"flex",gap:isMobile?"4px":"6px",padding:isMobile?"8px 10px":"10px 16px",overflowX:"auto",flexShrink:0}},
    AGENTS.map(function(a,i){
