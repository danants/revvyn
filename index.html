<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revvyn — Governance Sandbox</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◈</text></svg>">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06080e;--surface:#0c1019;--surface2:#111827;--card:#0f1720;
  --border:#1e2d45;--border2:#2a4070;
  --text:#e2eaf5;--muted:#6b8299;--dim:#334155;
  --mono:'DM Mono',monospace;--sans:'Syne',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
select option{background:var(--surface);color:var(--text)}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(0,212,255,.1)}50%{box-shadow:0 0 40px rgba(0,212,255,.3)}}
@keyframes nodeGlow{0%,100%{box-shadow:0 0 12px var(--c,.5)}50%{box-shadow:0 0 24px var(--c,1)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

// ─── Constants ─────────────────────────────────────────────────────────────────

const AGENTS=[
  {id:"orchestrator",name:"Orchestrator",icon:"◉",color:"#06d6a0",role:"Intent classification"},
  {id:"governance",  name:"Governance",  icon:"⬡",color:"#a78bfa",role:"Policy & compliance"},
  {id:"control",     name:"Control",     icon:"◆",color:"#fbbf24",role:"Risk & rail selection"},
  {id:"execution",   name:"Execution",   icon:"▸",color:"#38bdf8",role:"Settlement"},
  {id:"audit",       name:"Audit",       icon:"◫",color:"#f472b6",role:"Explainability"},
];

const VERTICALS={
  treasury:{id:"treasury",label:"Enterprise Treasury",icon:"◈",accent:"#06d6a0",
    desc:"Cross-border vendor payments, FX optimization, multi-bank routing",
    defaults:{amount:250000,currency:"USD",fromCountry:"US",toCountry:"DE",toCurrency:"EUR",beneficiary:"Siemens AG",purpose:"Vendor invoice #INV-2026-4471",urgency:"standard",intentSource:"erp"},
    policies:{maxSingle:500000,maxDaily:2000000,requireApproval:100000,dualApproval:250000,sanctions:["KP","IR","SY","CU","RU"],kycRequired:true,verifiableIntent:true,hitl:true,killswitch:true}},
  marketplace:{id:"marketplace",label:"Marketplace",icon:"◇",accent:"#38bdf8",
    desc:"Seller payouts, split settlements, multi-currency disbursements",
    defaults:{amount:3200,currency:"USD",fromCountry:"US",toCountry:"IN",toCurrency:"INR",beneficiary:"Seller #SKU-88912",purpose:"Weekly payout",urgency:"standard",intentSource:"human"},
    policies:{maxSingle:50000,maxDaily:500000,requireApproval:25000,dualApproval:50000,sanctions:["KP","IR","SY"],kycRequired:true,verifiableIntent:true,hitl:true,killswitch:true}},
  ai_commerce:{id:"ai_commerce",label:"AI-to-AI Commerce",icon:"◎",accent:"#a78bfa",
    desc:"Autonomous agent transactions, programmatic spend governance",
    defaults:{amount:890,currency:"USD",fromCountry:"US",toCountry:"SG",toCurrency:"USD",beneficiary:"Agent-API-7x9k2",purpose:"Autonomous procurement — cloud compute",urgency:"urgent",intentSource:"openai"},
    policies:{maxSingle:10000,maxDaily:100000,requireApproval:5000,dualApproval:10000,sanctions:["KP","IR","SY","CU"],kycRequired:false,verifiableIntent:true,hitl:true,killswitch:true}},
  enterprise:{id:"enterprise",label:"Enterprise Direct",icon:"◐",accent:"#fbbf24",
    desc:"Complex multi-entity payments, ERP integration, global compliance",
    defaults:{amount:1200000,currency:"USD",fromCountry:"US",toCountry:"JP",toCurrency:"JPY",beneficiary:"Toyota Motor Corp",purpose:"Strategic supplier — Q1 manufacturing",urgency:"standard",intentSource:"erp"},
    policies:{maxSingle:5000000,maxDaily:20000000,requireApproval:500000,dualApproval:1000000,sanctions:["KP","IR","SY","CU","RU","BY"],kycRequired:true,verifiableIntent:true,hitl:true,killswitch:true}},
  consumer:{id:"consumer",label:"Consumer AI Finance",icon:"◍",accent:"#f472b6",
    desc:"Personal AI agents — yield-only spending, DeFi governance",
    defaults:{amount:85,currency:"USDC",fromCountry:"US",toCountry:"US",toCurrency:"USDC",beneficiary:"Self — Spending Card",purpose:"Yield-funded purchase",urgency:"standard",intentSource:"defi_agent"},
    policies:{maxSingle:500,maxDaily:2000,requireApproval:200,dualApproval:500,sanctions:["KP","IR","SY"],kycRequired:false,verifiableIntent:false,hitl:true,killswitch:true}},
};

const RAILS=[
  {id:"visa",      name:"Visa Intelligent Commerce",speed:"Instant",   cost:"2.4%",   provider:"Visa",       type:"card"},
  {id:"mastercard",name:"Mastercard Agent Pay",     speed:"Instant",   cost:"2.5%",   provider:"Mastercard", type:"card"},
  {id:"swift",     name:"SWIFT gpi",                speed:"T+2",       cost:"$25–50", provider:"SWIFT",      type:"bank"},
  {id:"sepa",      name:"SEPA Instant",             speed:"~8s",       cost:"€0.20",  provider:"SEPA",       type:"bank"},
  {id:"wooshpay",  name:"WooshPay API",             speed:"~4 min",    cost:"1.2%",   provider:"WooshPay",   type:"api"},
  {id:"stablecoin",name:"USDC / USDT",              speed:"~2 min",    cost:"$0.01",  provider:"Circle",     type:"crypto"},
  {id:"rtp",       name:"RTP / FedNow",             speed:"~3s",       cost:"$0.50",  provider:"TCH/Fed",    type:"instant"},
  {id:"defi",      name:"DeFi / Aave",              speed:"~12s",      cost:"Gas",    provider:"Aave",       type:"defi"},
  {id:"selfcustody",name:"Self-Custody Card",       speed:"Instant",   cost:"$0.02",  provider:"Wirex",      type:"self"},
];

const INTENT_SOURCES=[
  {id:"google_ucp",  name:"Google UCP",    color:"#4285f4"},
  {id:"openai",      name:"OpenAI Agent",  color:"#10b981"},
  {id:"erp",         name:"ERP System",    color:"#fbbf24"},
  {id:"human",       name:"Human User",    color:"#f472b6"},
  {id:"custom_agent",name:"Custom AI",     color:"#a78bfa"},
  {id:"defi_agent",  name:"DeFi Agent",    color:"#38bdf8"},
];

const COUNTRIES=["US","UK","DE","JP","SG","BR","NG","AE","IN","AU","FR","CA","NL","CH","KP","IR","SY","CU","RU"];
const CURRENCIES=["USD","EUR","GBP","JPY","SGD","BRL","NGN","AED","INR","AUD","CHF","CAD","USDC","USDT"];
const FX={EUR:0.92,GBP:0.79,JPY:149.5,SGD:1.34,BRL:4.97,NGN:1550,AED:3.67,INR:83.1,AUD:1.53,CHF:0.88,CAD:1.36,USD:1,USDC:1,USDT:1};
const TX_STATES=["Created","Validated","Risk Assessed","Approved","Routed","Settled","Reconciled"];

const COMPS=[
  {name:"Circuit & Chisel",raised:"$19.2M",lead:"Primary VC, ParaFi, Stripe",   what:"ATXP protocol for agent-to-agent payments",    gap:"No policy engine, no compliance, no multi-rail governance"},
  {name:"Natural",         raised:"$9.8M", lead:"Abstract, Human Capital",       what:"B2B agentic payment automation",                gap:"No governance, no risk scoring, no audit trail"},
  {name:"Nekuda",          raised:"$5M",   lead:"Madrona, Visa, Amex Ventures",  what:"Agent checkout & credential management",        gap:"No policy enforcement, no rail optimization, no DeFi"},
  {name:"t54 Labs",        raised:"$5M",   lead:"Anagram, Franklin Templeton",   what:"Know Your Agent identity & compliance",         gap:"No payment governance, no rail selection, no policy engine"},
  {name:"Based",           raised:"$11.5M",lead:"Pantera, Coinbase Ventures",    what:"Consumer agentic commerce on Hyperliquid",     gap:"No enterprise governance, no multi-rail, no compliance"},
];

function genId(){return "PAY-"+Math.random().toString(36).substr(2,8).toUpperCase()}
function genTx(){return "RVN-"+Date.now().toString(36).toUpperCase()+Math.random().toString(36).substr(2,4).toUpperCase()}
function fmtAmt(n){return "$"+Number(n).toLocaleString()}
function now(){return new Date().toTimeString().slice(0,8)}

// ─── Simulation Engine ─────────────────────────────────────────────────────────

function pickRail(payment,vert){
  const {toCountry,toCurrency,amount,urgency}=payment;
  if(vert==="consumer") return {id:"selfcustody",name:"Self-Custody Card",provider:"Wirex/Gnosis Pay",reason:"Yield-funded self-custody wallet — principal protection preserved"};
  if(toCurrency==="USDC"||toCurrency==="USDT") return {id:"stablecoin",name:"USDC / USDT",provider:"Circle",reason:"Stablecoin settlement — near-zero cost, sub-minute finality"};
  if(["DE","FR","NL","CH"].includes(toCountry)) return {id:"sepa",name:"SEPA Instant",provider:"SEPA",reason:"EUR-zone destination — SEPA Instant at €0.20 flat, ~8s settlement"};
  if(urgency==="critical"&&amount<50000) return {id:"rtp",name:"RTP / FedNow",provider:"TCH/Fed",reason:"Critical urgency, moderate amount — RTP delivers ~3s at $0.50"};
  if(amount>100000) return {id:"swift",name:"SWIFT gpi",provider:"SWIFT",reason:"High-value cross-border — SWIFT gpi with end-to-end tracking"};
  if(["IN","SG","NG"].includes(toCountry)) return {id:"wooshpay",name:"WooshPay API",provider:"WooshPay",reason:"Emerging market corridor — WooshPay local rails at 1.2%"};
  if(amount<5000) return {id:"visa",name:"Visa Intelligent Commerce",provider:"Visa",reason:"Sub-$5K on supported corridor — Visa TAP-enabled instant settlement"};
  return {id:"swift",name:"SWIFT gpi",provider:"SWIFT",reason:"Default high-value cross-border via SWIFT gpi"};
}

function altRails(primary,amount){
  const alts=[];
  if(primary.id!=="visa") alts.push({id:"visa",name:"Visa Intelligent Commerce",reason:"Card-rail fallback with Visa TAP agent authentication"});
  if(primary.id!=="stablecoin") alts.push({id:"stablecoin",name:"USDC / USDT",reason:"Stablecoin alt — near-zero cost settlement"});
  if(primary.id!=="swift"&&amount>10000) alts.push({id:"swift",name:"SWIFT gpi",reason:"Traditional correspondent banking with gpi tracking"});
  return alts.slice(0,2);
}

function simulate(agentId,payment,vert,policies){
  const v=VERTICALS[vert];
  const isSanctioned=policies.sanctions.includes(payment.toCountry)||["KP","IR","SY","CU"].includes(payment.toCountry);
  const overMax=payment.amount>policies.maxSingle;
  const needsDual=payment.amount>=policies.dualApproval&&!overMax;
  const isCross=payment.fromCountry!==payment.toCountry;
  const isCrossCcy=payment.currency!==payment.toCurrency;
  const isHV=payment.amount>100000;
  const riskBase=isSanctioned?95:isCross?(isHV?42:28):(isHV?22:15);
  const riskScore=Math.max(5,Math.min(95,riskBase+Math.floor(Math.random()*10)-5));
  const rail=pickRail(payment,vert);
  const fxRate=FX[payment.toCurrency]||1;
  const converted=isCrossCcy?Math.round(payment.amount*fxRate*100)/100:null;
  const feeRate=payment.amount>500000?0.0008:payment.amount>100000?0.0015:payment.amount>10000?0.003:0.024;
  const totalFee=Math.max(0.50,Math.round(payment.amount*feeRate*100)/100);
  const txId=genTx();

  if(agentId==="orchestrator") return {
    classification:isHV?"high-value":isCross?"cross-border":payment.urgency==="urgent"?"urgent":"standard",
    intentSource:payment.intentSource,
    priority:isHV?"high":payment.urgency==="urgent"?"high":"medium",
    estimatedComplexity:isHV?"high":isCross?"medium":"low",
    routingHints:isCross?["cross_border_corridor","fx_hedge_eligible","multi_rail_candidate"]:["domestic_fast_rail","low_cost_priority"],
    summary:`Classified as ${isHV?"high-value ":""}${isCross?"cross-border ":""}${v.label.toLowerCase()} payment. ${needsDual?"Dual approval threshold met. ":""}Routing to Governance.`
  };

  if(agentId==="governance"){
    if(isSanctioned) return {
      approved:false,
      checks:[
        {name:"OFAC Sanctions Screening",status:"fail",detail:`Destination ${payment.toCountry} is on the OFAC/EU consolidated sanctions list. Transaction blocked.`},
        {name:"Amount Validation",status:"pass",detail:`${payment.currency} ${fmtAmt(payment.amount)} within single limit of ${fmtAmt(policies.maxSingle)}`},
        {name:"Beneficiary Verification",status:"warning",detail:"Suspended — sanctions block takes precedence"},
      ],
      complianceScore:12,escalationRequired:false,escalationReason:null,
      regulatoryFrameworks:["OFAC","EU-Sanctions","FATF-R6","PSD2"],
      summary:`REJECTED — ${payment.toCountry} is sanctioned. Transaction blocked at governance layer.`
    };
    if(overMax) return {
      approved:false,
      checks:[
        {name:"Amount Validation",status:"fail",detail:`${payment.currency} ${fmtAmt(payment.amount)} exceeds max single limit of ${fmtAmt(policies.maxSingle)}`},
        {name:"OFAC Sanctions Screening",status:"pass",detail:`${payment.toCountry} cleared against OFAC, EU, UN databases`},
        {name:"Daily Volume Check",status:"warning",detail:`Would consume ${Math.round(payment.amount/policies.maxDaily*100)}% of daily limit`},
      ],
      complianceScore:35,escalationRequired:false,escalationReason:null,
      regulatoryFrameworks:["SOC2","PCI-DSS","ISO20022"],
      summary:"REJECTED — Amount exceeds maximum single payment policy threshold."
    };
    const checks=[
      {name:"OFAC Sanctions Screening",status:"pass",detail:`${payment.toCountry} cleared against OFAC, EU, and UN consolidated sanctions databases. No matches.`},
      {name:"Amount Validation",status:"pass",detail:`${payment.currency} ${fmtAmt(payment.amount)} within limit of ${fmtAmt(policies.maxSingle)} (${Math.round(payment.amount/policies.maxSingle*100)}% utilisation)`},
      {name:"Beneficiary Verification",status:"pass",detail:`"${payment.beneficiary}" verified against KYC registry. No adverse media or PEP flags.`},
      {name:"Daily Volume Check",status:payment.amount>policies.maxDaily*0.5?"warning":"pass",detail:`Daily volume at ${Math.round(payment.amount/policies.maxDaily*100)}% of ${fmtAmt(policies.maxDaily)} limit${payment.amount>policies.maxDaily*0.5?". Approaching threshold.":"."}`},
    ];
    if(isCross) checks.push({name:"Corridor Compliance",status:"pass",detail:`${payment.fromCountry} → ${payment.toCountry} cleared. No capital control restrictions. AML/CFT requirements met.`});
    if(policies.kycRequired) checks.push({name:"KYC/AML Verification",status:"pass",detail:`Enhanced due diligence complete. Identity verified via ${vert==="consumer"?"DeFi wallet attestation":"corporate registry"}. Risk: standard.`});
    if(vert==="consumer") checks.push({name:"Principal Protection",status:"pass",detail:`$${payment.amount} funded from accrued DeFi yield ($${Math.round(payment.amount*1.8)} available). Principal untouched.`});
    if(policies.verifiableIntent&&payment.intentSource!=="human") checks.push({name:"Verifiable Intent",status:"pass",detail:`${INTENT_SOURCES.find(s=>s.id===payment.intentSource)?.name||"Agent"} signal validated. Intent matches authorised scope.`});
    return {
      approved:true,checks,
      complianceScore:isCross?87:94,
      escalationRequired:needsDual&&policies.hitl,
      escalationReason:needsDual?`${payment.currency} ${fmtAmt(payment.amount)} meets dual approval threshold (${fmtAmt(policies.dualApproval)}). Human authorisation required.`:null,
      regulatoryFrameworks:["PSD2","FATF","SOC2","PCI-DSS","ISO20022"].concat(isCross?["GDPR","MiCA"]:[]),
      summary:`APPROVED — All ${checks.length} compliance checks passed.${needsDual?" Dual approval escalation triggered.":""} Compliance score: ${isCross?87:94}%.`
    };
  }

  if(agentId==="control") return {
    riskScore,
    riskLevel:riskScore<30?"low":riskScore<60?"medium":riskScore<80?"high":"critical",
    fraudIndicators:[
      {indicator:"Velocity Check",severity:"low",detail:`Transaction frequency within normal patterns for ${v.label}. No anomalies detected.`},
      {indicator:"Beneficiary Pattern",severity:isCross?"medium":"low",detail:isCross?`First transaction to ${payment.toCountry} corridor this period. Enhanced monitoring applied.`:"Recurring beneficiary with established payment history."},
      {indicator:"Amount Deviation",severity:isHV?"medium":"low",detail:isHV?`Amount is ${Math.round(payment.amount/50000)}× above median for this vertical. Within policy, flagged for monitoring.`:`Amount within expected range for ${v.label} payments.`},
    ],
    recommendedRail:rail,
    alternativeRails:altRails(rail,payment.amount),
    fxOptimization:{
      applicable:isCrossCcy,
      strategy:isCrossCcy?`Mid-market rate lock (${fxRate} ${payment.toCurrency}/${payment.currency}). Estimated savings vs retail: $${Math.round(payment.amount*0.003).toLocaleString()}.`:"N/A — same-currency settlement",
      estimatedSavings:isCrossCcy?`$${Math.round(payment.amount*0.003).toLocaleString()}`:"$0",
    },
    summary:`Risk ${riskScore}/100 (${riskScore<30?"low":riskScore<60?"medium":"high"}). Rail: ${rail.name} via ${rail.provider}.${isCrossCcy?` FX saves ~$${Math.round(payment.amount*0.003).toLocaleString()}.`:""}`
  };

  if(agentId==="execution") return {
    status:"settled",
    selectedRail:rail.name,provider:rail.provider,transactionId:txId,
    settlementTime:rail.id==="swift"?"T+2 (48h est.)":rail.id==="sepa"?"8.2 seconds":rail.id==="rtp"?"3.1 seconds":rail.id==="visa"||rail.id==="mastercard"?"Sub-second":rail.id==="stablecoin"?"2 min 14s":rail.id==="defi"?"12.4s (2 blocks)":rail.id==="selfcustody"?"Instant":"4 min 38s",
    fees:{total:totalFee,breakdown:{network:Math.round(totalFee*0.45*100)/100,fx:isCrossCcy?Math.round(totalFee*0.3*100)/100:0,processing:Math.round(totalFee*0.2*100)/100,compliance:Math.round(totalFee*0.05*100)/100}},
    fxRate:isCrossCcy?fxRate:null,convertedAmount:converted,
    ledgerEntries:[
      {type:"debit", account:`Operating — ${payment.fromCountry}`,amount:payment.amount,   currency:payment.currency},
      {type:"credit",account:`Beneficiary — ${payment.beneficiary}`,amount:converted||payment.amount,currency:payment.toCurrency},
    ],
    summary:`Settled ${payment.currency} ${fmtAmt(payment.amount)} via ${rail.name}.${converted?` Converted to ${payment.toCurrency} ${Number(converted).toLocaleString()} @ ${fxRate}. `:" "}Fees: $${totalFee}. Settlement: ${rail.id==="swift"?"T+2":"sub-minute"}.`
  };

  if(agentId==="audit") return {
    auditId:"AUD-"+Date.now().toString(36).toUpperCase(),
    decisionChain:[
      {agent:"Orchestrator",decision:`Classified ${isHV?"high-value ":""}${isCross?"cross-border ":""}payment. Priority: ${isHV?"high":"medium"}`,reasonCode:"ORCH-CLF-001",confidence:97},
      {agent:"Governance",  decision:`All compliance checks passed.${needsDual?" Dual approval obtained.":""} Score: ${isCross?87:94}%`,reasonCode:`GOV-APR-${needsDual?"DAP":"STD"}`,confidence:94},
      {agent:"Control",     decision:`Risk ${riskScore}/100. Selected ${rail.name}.${isCrossCcy?" FX optimised.":""}`,reasonCode:`CTL-RSK-${riskScore<30?"LOW":"MED"}`,confidence:91},
      {agent:"Execution",   decision:`Settled via ${rail.provider}. ${txId}. Fees: $${totalFee}`,reasonCode:"EXE-STL-OK",confidence:99},
      {agent:"Audit",       decision:"Full regulatory trail. 7-year retention. All frameworks satisfied.",reasonCode:"AUD-CMP-FUL",confidence:96},
    ],
    complianceStatus:"compliant",
    riskClassification:riskScore<30?"low":riskScore<60?"medium":"high",
    regulatoryTags:["PSD2","FATF","SOC2","PCI-DSS","ISO20022"].concat(isCross?["GDPR","MiCA"]:[]).concat(vert==="consumer"?["DeFi-Governance"]:[]),
    dataRetention:"7 years",
    recommendations:[
      isCross?`Consider pre-funded FX positions for recurring ${payment.fromCountry}→${payment.toCountry} corridor`:"Domestic rail performing within SLA",
      isHV?"Implement batch processing for high-value payments to reduce overhead":"Current volume within optimal parameters",
      "Next review: Quarterly compliance audit per SOC2 Type II",
    ],
    summary:`Audit complete. 5-agent decision chain recorded. ${["PSD2","FATF","SOC2","PCI-DSS","ISO20022"].length+(isCross?2:0)} regulatory frameworks. Classification: compliant.`
  };
}

// ─── UI Helpers ────────────────────────────────────────────────────────────────

const css=`
.inp{width:100%;padding:9px 11px;border-radius:3px;background:var(--card);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:12px;outline:none;transition:border-color .15s;box-sizing:border-box}
.inp:focus{border-color:var(--accent,#06d6a0)}
.lbl{display:block;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.badge{padding:2px 7px;border-radius:2px;font-size:9px;letter-spacing:.08em;font-family:var(--mono);font-weight:500}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:3px;overflow:hidden}
.ph{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.015);flex-shrink:0}
.ph h2{font-family:var(--sans);font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.ph-dot{width:6px;height:6px;border-radius:50%}
.tag{padding:3px 8px;border-radius:2px;font-size:9px;font-family:var(--mono);letter-spacing:.06em;font-weight:500}
.btn-kill{padding:9px 14px;border-radius:3px;border:1px solid rgba(255,69,96,.35);background:rgba(255,69,96,.07);color:#ff4560;font-family:var(--mono);font-size:10px;letter-spacing:.1em;cursor:pointer;transition:all .15s}
.btn-kill:hover{background:rgba(255,69,96,.15)}
.btn-kill.halted{border-color:rgba(255,184,77,.4);background:rgba(255,184,77,.08);color:#ffb84d}
`;

function StyleInjector(){
  useEffect(()=>{
    const s=document.createElement("style");
    s.textContent=css;
    document.head.appendChild(s);
    return ()=>document.head.removeChild(s);
  },[]);
  return null;
}

function Inp({label,children}){
  return <div><label className="lbl">{label}</label>{children}</div>;
}

function Badge({label,value,color}){
  return <div style={{padding:"8px 12px",borderRadius:3,background:color+"14",border:`1px solid ${color}28`}}>
    <div style={{fontSize:9,color:"var(--muted)",letterSpacing:".1em",textTransform:"uppercase",marginBottom:3}}>{label}</div>
    <div style={{fontFamily:"var(--mono)",fontSize:16,fontWeight:700,color,lineHeight:1}}>{value}</div>
  </div>;
}

// ─── Header ─────────────────────────────────────────────────────────────────

function Header({vertical,killActive,onKillToggle,onHero}){
  const v=VERTICALS[vertical];
  return <div style={{height:52,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 20px",borderBottom:"1px solid var(--border)",background:"rgba(6,8,14,.97)",backdropFilter:"blur(10px)",flexShrink:0,zIndex:10}}>
    <div style={{display:"flex",alignItems:"center",gap:12,cursor:"pointer"}} onClick={onHero}>
      <div style={{width:30,height:30,borderRadius:6,background:`linear-gradient(135deg,${v.accent},${v.accent}88)`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"var(--sans)",fontWeight:800,fontSize:14,color:"#000",animation:"glow 3s ease-in-out infinite"}}
      >R</div>
      <div>
        <div style={{fontFamily:"var(--sans)",fontSize:15,fontWeight:800,letterSpacing:"-.3px"}}>Revvyn</div>

      </div>

      {killActive?"⬛ HALTED — CLICK TO RESUME":"⬛ Kill Switch"}

}

// ─── Vertical Tabs ─────────────────────────────────────────────────────────

function VerticalTabs({active,onChange}){
  return <div style={{display:"flex",gap:2,padding:"6px 8px",borderBottom:"1px solid var(--border)",background:"var(--surface)",flexShrink:0,overflowX:"auto"}}>
    {Object.values(VERTICALS).map(v=><button key={v.id} onClick={()=>onChange(v.id)} style={{
      padding:"5px 12px",borderRadius:3,border:`1px solid ${active===v.id?v.accent:"transparent"}`,
      background:active===v.id?v.accent+"12":"transparent",cursor:"pointer",
      fontFamily:"var(--mono)",fontSize:10,fontWeight:600,color:active===v.id?v.accent:"var(--muted)",
      whiteSpace:"nowrap",letterSpacing:".05em",transition:"all .15s"
    }}>{v.icon} {v.label}</button>)}
  </div>;
}

// ─── Agent Pipeline (horizontal) ───────────────────────────────────────────

function AgentPipeline({statuses,selected,onSelect,accent}){
  return <div style={{display:"flex",gap:4,padding:"10px 16px",background:"var(--surface)",borderBottom:"1px solid var(--border)",flexShrink:0,overflowX:"auto"}}>
    {AGENTS.map((a,i)=>{
      const st=statuses[a.id]||"idle";
      const isSel=selected===a.id;
      return <React.Fragment key={a.id}>
        <div onClick={()=>onSelect(a.id)} style={{
          flex:"1 0 0",minWidth:100,padding:"8px 10px",borderRadius:3,cursor:"pointer",
          background:isSel?a.color+"10":st==="running"?a.color+"06":"var(--card)",
          border:`1.5px solid ${isSel?a.color:st==="running"?a.color+"60":st==="complete"?a.color+"40":st==="failed"?a.color+"40":"var(--border)"}`,
          position:"relative",overflow:"hidden",transition:"all .2s"
        }}>
          {st==="running"&&<div style={{position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,transparent,${a.color},transparent)`,animation:"shimmer 1.5s infinite"}}/>}
          <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:3}}>
            <span style={{fontFamily:"var(--mono)",fontSize:12,color:a.color}}>{a.icon}</span>
            <span style={{fontFamily:"var(--sans)",fontSize:10,fontWeight:700,color:a.color,letterSpacing:".04em",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.name}</span>
            <div style={{marginLeft:"auto",width:6,height:6,borderRadius:"50%",flexShrink:0,
              background:st==="complete"?a.color:st==="failed"?"#ff4560":st==="running"?a.color:"var(--border)",
              boxShadow:st==="running"?`0 0 8px ${a.color}`:"none",
              animation:st==="running"?"pulse 1s infinite":"none"
            }}/>
          </div>
          <div style={{fontSize:9,color:"var(--muted)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
            {st==="running"?"Processing...":st==="complete"?"Done ✓":st==="failed"?"Blocked ✗":a.role}
          </div>
        </div>
        {i<AGENTS.length-1&&<div style={{display:"flex",alignItems:"center",color:st==="complete"?a.color:"var(--border)",fontSize:9,flexShrink:0}}>▸</div>}
      </React.Fragment>;
    })}
  </div>;
}

// ─── Lifecycle Bar ──────────────────────────────────────────────────────────

function LifecycleBar({current}){
  const idx=TX_STATES.indexOf(current);
  return <div style={{display:"flex",alignItems:"center",padding:"6px 16px",background:"var(--card)",borderBottom:"1px solid var(--border)",flexShrink:0,overflowX:"auto",gap:0}}>
    {TX_STATES.map((s,i)=><React.Fragment key={s}>
      <span style={{
        padding:"3px 8px",borderRadius:2,fontSize:9,fontFamily:"var(--mono)",
        fontWeight:i===idx?600:400,letterSpacing:".08em",whiteSpace:"nowrap",

        color:i===idx?"#00d4ff":i<idx?"#00e5a0":"var(--dim)",

      }}>{s.toUpperCase()}</span>

// ─── Policy Panel ───────────────────────────────────────────────────────────

    {key:"maxDaily",     label:"Daily Spend Limit",  max:vertical==="consumer"?10000:30000000},

    {key:"kycRequired",     label:"KYC / AML Verification", sub:"Counterparty identity check"},

          <div>
            <div style={{fontSize:12,color:"var(--text)"}}>{t.label}</div>
            <div style={{fontSize:9,color:"var(--muted)",marginTop:2}}>{t.sub}</div>
          </div>
          <div style={{position:"relative",width:36,height:20,flexShrink:0,cursor:"pointer"}} onClick={()=>update(t.key,!policies[t.key])}>

            <div style={{position:"absolute",width:14,height:14,borderRadius:"50%",top:3,left:policies[t.key]?19:3,
              background:policies[t.key]?v.accent:"var(--muted)",
              boxShadow:policies[t.key]?`0 0 8px ${v.accent}`:"none",

        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          {policies.sanctions.map(s=><span key={s} style={{padding:"2px 7px",borderRadius:2,fontSize:9,fontFamily:"var(--mono)",fontWeight:600,background:"rgba(255,69,96,.12)",color:"#ff4560"}}>{s}</span>)}

}

// ─── Payment Form ───────────────────────────────────────────────────────────

function PaymentForm({vertical,policies,onSubmit,isProcessing,killActive}){
  const v=VERTICALS[vertical];
  const [form,setForm]=useState({...v.defaults});
  useEffect(()=>setForm({...VERTICALS[vertical].defaults}),[vertical]);
  const u=(k,val)=>setForm(f=>({...f,[k]:val}));
  const s={width:"100%",padding:"9px 11px",borderRadius:3,background:"var(--card)",border:"1px solid var(--border)",color:"var(--text)",fontFamily:"var(--mono)",fontSize:12,outline:"none",boxSizing:"border-box"};
  const isCross=form.fromCountry!==form.toCountry;
  const fx=FX[form.toCurrency]||1;
  const converted=form.currency!==form.toCurrency?Math.round(form.amount*fx*100)/100:null;

  return <div style={{display:"flex",flexDirection:"column",gap:12,padding:"14px 16px",overflowY:"auto",flex:1}}>
    <div style={{padding:"10px 12px",borderRadius:3,background:v.accent+"08",border:`1px solid ${v.accent}20`}}>
      <div style={{fontFamily:"var(--sans)",fontSize:13,fontWeight:700,color:v.accent,marginBottom:3}}>{v.icon} {v.label}</div>
      <div style={{fontSize:11,color:"var(--muted)"}}>{v.desc}</div>
    </div>

    <Inp label="Intent Source">
      <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
        {INTENT_SOURCES.map(src=><button key={src.id} onClick={()=>u("intentSource",src.id)} style={{
          flex:"1 0 0",minWidth:60,padding:"5px 4px",borderRadius:3,cursor:"pointer",
          border:`1px solid ${form.intentSource===src.id?src.color:"var(--border)"}`,
          background:form.intentSource===src.id?src.color+"12":"var(--card)",
          fontFamily:"var(--mono)",fontSize:9,fontWeight:600,
          color:form.intentSource===src.id?src.color:"var(--muted)"
        }}>{src.name}</button>)}
      </div>
    </Inp>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
      <Inp label="Amount"><input type="number" value={form.amount} onChange={e=>u("amount",Number(e.target.value))} style={s}/></Inp>
      <Inp label="Currency"><select value={form.currency} onChange={e=>u("currency",e.target.value)} style={s}>{CURRENCIES.map(c=><option key={c}>{c}</option>)}</select></Inp>
    </div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
      <Inp label="From"><select value={form.fromCountry} onChange={e=>u("fromCountry",e.target.value)} style={s}>{COUNTRIES.map(c=><option key={c}>{c}</option>)}</select></Inp>
      <Inp label="To"><select value={form.toCountry} onChange={e=>u("toCountry",e.target.value)} style={s}>{COUNTRIES.map(c=><option key={c}>{c}</option>)}</select></Inp>
      <Inp label="To Ccy"><select value={form.toCurrency} onChange={e=>u("toCurrency",e.target.value)} style={s}>{CURRENCIES.map(c=><option key={c}>{c}</option>)}</select></Inp>
    </div>

    {isCross&&converted&&form.currency!==form.toCurrency&&<div style={{padding:"7px 10px",borderRadius:3,background:"rgba(0,212,255,.06)",border:"1px solid rgba(0,212,255,.2)",fontSize:11,color:"#00d4ff",fontFamily:"var(--mono)"}}>
      FX: {fmtAmt(form.amount)} {form.currency} → {Number(converted).toLocaleString()} {form.toCurrency} @ {fx}
    </div>}

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
      <Inp label="Beneficiary"><input value={form.beneficiary} onChange={e=>u("beneficiary",e.target.value)} style={s}/></Inp>
      <Inp label="Urgency"><select value={form.urgency} onChange={e=>u("urgency",e.target.value)} style={s}>
        <option value="standard">Standard</option>
        <option value="urgent">Urgent</option>
        <option value="critical">Critical</option>
      </select></Inp>

    <Inp label="Purpose"><input value={form.purpose} onChange={e=>u("purpose",e.target.value)} style={s}/></Inp>

      disabled={isProcessing||killActive}
      style={{padding:"13px",borderRadius:3,border:"none",cursor:isProcessing||killActive?"not-allowed":"pointer",
        background:killActive?"rgba(255,69,96,.15)":isProcessing?"var(--border)":`linear-gradient(135deg,${v.accent},${v.accent}bb)`,
        color:killActive?"#ff4560":isProcessing?"var(--muted)":"#000",
        fontFamily:"var(--sans)",fontSize:12,fontWeight:700,letterSpacing:".06em",transition:"all .2s"
      }}>
      {killActive?"⬛ HALTED":isProcessing?"⏳ Agents Processing...":"▶ Submit Payment Intent"}
    </button>
  </div>;
}

// ─── Agent Detail ───────────────────────────────────────────────────────────

function AgentDetail({agentId,results}){
  const agent=AGENTS.find(a=>a.id===agentId);
  const result=results[agentId];
  if(!result) return <div style={{padding:28,textAlign:"center",color:"var(--dim)",fontSize:11}}>Click an agent above to inspect its decision output</div>;
  return <div style={{padding:"14px 16px",overflowY:"auto",flex:1,display:"flex",flexDirection:"column",gap:12}}>
    <div style={{display:"flex",alignItems:"center",gap:10}}>
      <span style={{fontSize:18,color:agent.color}}>{agent.icon}</span>
      <div>
        <div style={{fontFamily:"var(--sans)",fontSize:14,fontWeight:700,color:agent.color}}>{agent.name}</div>
        <div style={{fontSize:10,color:"var(--muted)"}}>{agent.role}</div>
      </div>
    </div>
    {result.summary&&<div style={{padding:"10px 12px",borderRadius:3,background:agent.color+"08",border:`1px solid ${agent.color}20`,fontSize:12,color:"#cbd5e1",lineHeight:1.6}}>{result.summary}</div>}
    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
      {result.complianceScore!==undefined&&<Badge label="Compliance" value={result.complianceScore+"%"} color={result.complianceScore>80?"#00e5a0":"#ffb84d"}/>}
      {result.riskScore!==undefined&&<Badge label="Risk Score" value={result.riskScore+"/100"} color={result.riskScore<40?"#00e5a0":result.riskScore<70?"#ffb84d":"#ff4560"}/>}
      {result.approved!==undefined&&<Badge label="Status" value={result.approved?"APPROVED":"REJECTED"} color={result.approved?"#00e5a0":"#ff4560"}/>}
      {result.fees?.total!==undefined&&<Badge label="Fees" value={"$"+result.fees.total} color="#38bdf8"/>}
      {result.status&&<Badge label="Settlement" value={result.status.toUpperCase()} color={result.status==="settled"?"#00e5a0":"#ffb84d"}/>}
      {result.provider&&<Badge label="Provider" value={result.provider} color="#a78bfa"/>}
    </div>
    {result.checks&&<div>
      <div className="lbl" style={{marginBottom:6}}>Compliance Checks</div>
      {result.checks.map((c,i)=><div key={i} style={{display:"flex",alignItems:"flex-start",gap:7,marginBottom:4,padding:"6px 8px",borderRadius:2,background:"var(--card)",fontSize:11}}>
        <span className="tag" style={{flexShrink:0,background:c.status==="pass"?"rgba(0,229,160,.12)":c.status==="fail"?"rgba(255,69,96,.12)":"rgba(255,184,77,.12)",color:c.status==="pass"?"#00e5a0":c.status==="fail"?"#ff4560":"#ffb84d"}}>{c.status.toUpperCase()}</span>
        <span style={{color:"#94a3b8"}}><strong style={{color:"#cbd5e1"}}>{c.name}: </strong>{c.detail}</span>
      </div>)}
    </div>}
    {result.recommendedRail&&<div>
      <div className="lbl" style={{marginBottom:6}}>Rail Selection</div>
      <div style={{padding:"10px 12px",borderRadius:3,background:"rgba(0,229,160,.06)",border:"1px solid rgba(0,229,160,.2)",marginBottom:6}}>
        <div style={{fontSize:12,fontWeight:600,color:"#00e5a0",marginBottom:3}}>✓ {result.recommendedRail.name}</div>
        <div style={{fontSize:11,color:"var(--muted)"}}>{result.recommendedRail.reason}</div>
      </div>
      {result.alternativeRails?.map((r,i)=><div key={i} style={{padding:"7px 10px",borderRadius:3,background:"var(--card)",border:"1px solid var(--border)",marginBottom:4,fontSize:11,color:"var(--muted)"}}>
        Alt {i+1}: <span style={{color:"#38bdf8"}}>{r.name}</span> — {r.reason}
      </div>)}
    </div>}
    {result.fxOptimization?.applicable&&<div style={{padding:"10px 12px",borderRadius:3,background:"rgba(0,212,255,.06)",border:"1px solid rgba(0,212,255,.2)",fontSize:11,color:"var(--muted)",lineHeight:1.5}}>
      <span style={{color:"#00d4ff",fontWeight:600}}>FX Optimization: </span>{result.fxOptimization.strategy}
    </div>}
    {result.decisionChain&&<div>
      <div className="lbl" style={{marginBottom:6}}>Full Decision Chain</div>
      {result.decisionChain.map((d,i)=><div key={i} style={{display:"flex",gap:7,fontSize:11,marginBottom:3,padding:"5px 8px",borderRadius:2,background:"var(--card)"}}>
        <span style={{fontFamily:"var(--mono)",fontSize:8,color:"#38bdf8",fontWeight:600,whiteSpace:"nowrap"}}>[{d.reasonCode}]</span>
        <span style={{color:"#94a3b8",flex:1}}><strong style={{color:"#cbd5e1"}}>{d.agent}:</strong> {d.decision}</span>
        <span style={{fontSize:9,color:"var(--dim)",whiteSpace:"nowrap"}}>{d.confidence}%</span>
      </div>)}
    </div>}
    {result.recommendations&&<div>
      <div className="lbl" style={{marginBottom:6}}>Audit Recommendations</div>
      {result.recommendations.map((r,i)=><div key={i} style={{fontSize:11,color:"var(--muted)",padding:"5px 0",borderBottom:"1px solid var(--border)"}}>→ {r}</div>)}
    </div>}
    <details style={{marginTop:4}}>
      <summary style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--dim)",cursor:"pointer",listStyle:"none"}}>▸ Raw JSON output</summary>
      <pre style={{marginTop:6,padding:"10px",borderRadius:3,background:"#050709",fontSize:9,color:"var(--muted)",fontFamily:"var(--mono)",lineHeight:1.4,border:"1px solid var(--border)",whiteSpace:"pre-wrap",wordBreak:"break-word",maxHeight:250,overflow:"auto"}}>
        {JSON.stringify(result,null,2)}
      </pre>
    </details>
  </div>;
}

// ─── Audit Trail ────────────────────────────────────────────────────────────

function AuditTrail({entries}){
  const ref=useRef();
  useEffect(()=>{if(ref.current)ref.current.scrollTop=ref.current.scrollHeight},[entries]);
  return <div ref={ref} style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:3,padding:"10px 14px"}}>
    {entries.length===0&&<div style={{color:"var(--dim)",fontSize:11,textAlign:"center",padding:24}}>Audit trail populates as agents process...</div>}
    {entries.map((e,i)=>{
      const ag=AGENTS.find(a=>a.id===e.agent);
      return <div key={i} style={{padding:"6px 8px",borderRadius:2,background:"var(--card)",borderLeft:`3px solid ${ag?ag.color:"var(--border)"}`,animation:"fadeUp .2s ease"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:1}}>
          <span style={{fontFamily:"var(--mono)",fontSize:8,fontWeight:700,color:ag?ag.color:"var(--muted)",textTransform:"uppercase",letterSpacing:".06em"}}>{e.agent}</span>
          <span style={{fontFamily:"var(--mono)",fontSize:8,color:"var(--dim)"}}>{e.time}</span>
        </div>
        <div style={{fontSize:11,color:"#94a3b8",lineHeight:1.4}}>{e.message}</div>
        {e.status&&<span className="tag" style={{display:"inline-block",marginTop:2,background:e.status==="pass"?"rgba(0,229,160,.1)":e.status==="fail"?"rgba(255,69,96,.1)":"rgba(255,184,77,.1)",color:e.status==="pass"?"#00e5a0":e.status==="fail"?"#ff4560":"#ffb84d"}}>{e.status.toUpperCase()}</span>}
      </div>;
    })}
  </div>;
}

// ─── Analytics ──────────────────────────────────────────────────────────────

function Analytics({payments,vertical}){
  const v=VERTICALS[vertical];
  const vp=payments.filter(p=>p.vertical===vertical);
  const settled=vp.filter(p=>p.finalStatus==="settled");
  const rejected=vp.filter(p=>p.finalStatus==="rejected");
  const total=vp.reduce((s,p)=>s+(p.payment?.amount||0),0);
  const avgRisk=settled.length?Math.round(settled.reduce((s,p)=>s+(p.results?.control?.riskScore||0),0)/settled.length):0;
  const byRail={};
  settled.forEach(p=>{const r=p.results?.control?.recommendedRail?.name||"Unknown";byRail[r]=(byRail[r]||0)+1});
  return <div style={{padding:"14px 16px",display:"flex",flexDirection:"column",gap:12}}>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
      <Badge label="Total Processed" value={vp.length} color={v.accent}/>
      <Badge label="Volume" value={total>1e6?`$${(total/1e6).toFixed(1)}M`:`$${total.toLocaleString()}`} color={v.accent}/>
      <Badge label="Settled" value={`${settled.length} (${vp.length?Math.round(settled.length/vp.length*100):0}%)`} color="#00e5a0"/>
      <Badge label="Rejected" value={`${rejected.length} (${vp.length?Math.round(rejected.length/vp.length*100):0}%)`} color="#ff4560"/>
      <Badge label="Avg Risk Score" value={avgRisk||"—"} color={avgRisk<40?"#00e5a0":avgRisk<70?"#ffb84d":"#ff4560"}/>
      <Badge label="Escalations" value={vp.filter(p=>p.wasEscalated).length} color="#ffb84d"/>
    </div>
    {Object.keys(byRail).length>0&&<div>
      <div className="lbl" style={{marginBottom:8}}>Rail Distribution</div>
      {Object.entries(byRail).map(([name,count])=><div key={name} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid var(--border)",fontSize:11,color:"var(--muted)"}}>
        <span style={{color:"#38bdf8"}}>{name}</span>
        <span>{count} tx ({Math.round(count/settled.length*100)}%)</span>
      </div>)}
    </div>}
    {vp.length===0&&<div style={{textAlign:"center",color:"var(--dim)",fontSize:11,padding:16}}>Submit transactions to see analytics</div>}
  </div>;
}

// ─── Competitive Landscape ──────────────────────────────────────────────────

function Landscape(){
  return <div style={{padding:"14px 16px",display:"flex",flexDirection:"column",gap:12}}>

function HITLModal({payment,reason,checks,onApprove,onReject}){
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}}>
    <div style={{background:"var(--surface)",border:"1px solid rgba(255,184,77,.4)",borderRadius:4,padding:28,maxWidth:480,width:"100%",boxShadow:"0 0 60px rgba(255,184,77,.15)",animation:"fadeUp .3s ease"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18}}>
        <div style={{width:36,height:36,borderRadius:6,background:"rgba(255,184,77,.12)",border:"1px solid rgba(255,184,77,.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>⚠</div>

          <div style={{fontFamily:"var(--sans)",fontSize:14,fontWeight:700,color:"#ffb84d",textTransform:"uppercase",letterSpacing:".06em"}}>Human Review Required</div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,padding:"12px",borderRadius:3,background:"var(--card)",border:"1px solid var(--border)",marginBottom:12,fontSize:12}}>
        <div><span style={{color:"var(--muted)"}}>ID: </span><span style={{fontFamily:"var(--mono)",fontWeight:600}}>{payment.id}</span></div>
        <div><span style={{color:"var(--muted)"}}>Amount: </span><span style={{fontFamily:"var(--mono)"}}>{payment.currency} {fmtAmt(payment.amount)}</span></div>
        <div><span style={{color:"var(--muted)"}}>To: </span>{payment.beneficiary}</div>
        <div><span style={{color:"var(--muted)"}}>Route: </span>{payment.fromCountry} → {payment.toCountry}</div>
      </div>
      <div style={{padding:"10px 12px",borderRadius:3,background:"rgba(255,184,77,.06)",border:"1px solid rgba(255,184,77,.2)",fontSize:11,color:"var(--text)",lineHeight:1.5,marginBottom:12}}>{reason}</div>
      {checks.length>0&&<div style={{marginBottom:16}}>

      </div>
    </div>
  </div>;
}

// ─── Metrics Bar ────────────────────────────────────────────────────────────

function MetricsBar({payments}){
  const total=payments.length;
  const settled=payments.filter(p=>p.finalStatus==="settled").length;
  const rejected=payments.filter(p=>p.finalStatus==="rejected").length;
  const escalated=payments.filter(p=>p.wasEscalated).length;
  const items=[
    {label:"Total",value:total,color:"#00d4ff"},
    {label:"Settled",value:settled,color:"#00e5a0"},
    {label:"Blocked",value:rejected,color:"#ff4560"},
    {label:"Escalated",value:escalated,color:"#ffb84d"},
  ];
  return <div style={{display:"flex",borderBottom:"1px solid var(--border)",background:"var(--card)",flexShrink:0}}>
    {items.map(m=><div key={m.label} style={{flex:1,padding:"10px 14px",borderRight:"1px solid var(--border)"}}>
      <div style={{fontFamily:"var(--sans)",fontSize:20,fontWeight:800,color:m.color,lineHeight:1}}>{m.value}</div>
      <div style={{fontSize:9,color:"var(--muted)",marginTop:3,letterSpacing:".08em",textTransform:"uppercase"}}>{m.label}</div>
    </div>)}
  </div>;
}

// ─── Tab bar ─────────────────────────────────────────────────────────────────

function TabBar({tabs,active,onChange,accent}){
  return <div style={{display:"flex",gap:1,borderBottom:"1px solid var(--border)",background:"var(--surface)",flexShrink:0,overflowX:"auto"}}>
    {tabs.map(t=><button key={t.id} onClick={()=>onChange(t.id)} style={{
      padding:"10px 16px",border:"none",background:"transparent",
      fontFamily:"var(--mono)",fontSize:10,fontWeight:600,letterSpacing:".08em",
      color:active===t.id?accent:"var(--muted)",cursor:"pointer",whiteSpace:"nowrap",
      borderBottom:`2px solid ${active===t.id?accent:"transparent"}`,transition:"all .15s"
    }}>{t.label}</button>)}
  </div>;
}

// ─── Main App ─────────────────────────────────────────────────────────────────

function App(){
  const [showHero,setShowHero]=useState(true);
  const [vertical,setVertical]=useState("treasury");
  const [policies,setPolicies]=useState(VERTICALS.treasury.policies);
  const [payments,setPayments]=useState([]);
  const [isProcessing,setIsProcessing]=useState(false);
  const [killActive,setKillActive]=useState(false);
  const [agentStatuses,setAgentStatuses]=useState({});
  const [agentResults,setAgentResults]=useState({});
  const [selectedAgent,setSelectedAgent]=useState(null);
  const [auditEntries,setAuditEntries]=useState([]);
  const [selectedRail,setSelectedRail]=useState(null);
  const [txState,setTxState]=useState(null);
  const [leftTab,setLeftTab]=useState("payment");
  const [rightTab,setRightTab]=useState("pipeline");
  const [hitl,setHitl]=useState(null);
  const [intentSource,setIntentSource]=useState("human");
  const escRef=useRef(null);
  const v=VERTICALS[vertical];

  useEffect(()=>{setPolicies(VERTICALS[vertical].policies)},[vertical]);

  const addAudit=useCallback((agent,msg,status)=>{
    setAuditEntries(p=>[...p,{agent,message:msg,status,time:now()}]);
  },[]);

  const processPayment=useCallback(async(payment)=>{
    if(killActive||isProcessing)return;
    setIsProcessing(true);
    setAgentStatuses({});setAgentResults({});setSelectedAgent(null);setAuditEntries([]);setSelectedRail(null);setTxState("Created");
    setIntentSource(payment.intentSource||"human");
    setRightTab("pipeline");
    const rec={id:payment.id,payment,finalStatus:"processing",results:{},vertical,wasEscalated:false};
    setPayments(p=>[rec,...p]);

    const pol=policies;
    let aborted=false;
    const allResults={};

    for(let ai=0;ai<AGENTS.length;ai++){
      const agent=AGENTS[ai];
      if(aborted||killActive){setAgentStatuses(p=>({...p,[agent.id]:"skipped"}));continue;}
      setAgentStatuses(p=>({...p,[agent.id]:"running"}));
      setSelectedAgent(agent.id);
      addAudit(agent.id,`${agent.name} activated`,null);

      if(agent.id==="governance") setTxState("Validated");
      if(agent.id==="control")    setTxState("Risk Assessed");
      if(agent.id==="execution")  setTxState("Routed");

      await new Promise(r=>setTimeout(r,700+Math.random()*800));

      const result=simulate(agent.id,payment,vertical,pol);
      allResults[agent.id]=result;
      setAgentResults(p=>({...p,[agent.id]:result}));

      if(agent.id==="governance"){
        if(result.approved===false){
          setAgentStatuses(p=>({...p,[agent.id]:"failed"}));
          addAudit(agent.id,"REJECTED — "+result.summary,"fail");
          result.checks?.filter(c=>c.status==="fail").forEach(c=>addAudit(agent.id,`✗ ${c.name}: ${c.detail}`,"fail"));
          aborted=true;
          setPayments(p=>p.map(x=>x.id===payment.id?{...x,finalStatus:"rejected",results:allResults}:x));
          setTxState(null);
          continue;
        }
        if(result.escalationRequired&&pol.hitl){
          addAudit(agent.id,"ESCALATION: "+result.escalationReason,"warning");
          setHitl({payment,reason:result.escalationReason,checks:result.checks?.filter(c=>c.status==="pass").slice(0,3).map(c=>({label:c.name,detail:c.detail.slice(0,60)+"..."}))||[]});
          const approved=await new Promise(res=>{escRef.current=res});
          setHitl(null);
          setPayments(p=>p.map(x=>x.id===payment.id?{...x,wasEscalated:true}:x));
          if(!approved){
            addAudit(agent.id,"REJECTED by human reviewer","fail");
            setAgentStatuses(p=>({...p,[agent.id]:"failed"}));
            aborted=true;
            setPayments(p=>p.map(x=>x.id===payment.id?{...x,finalStatus:"rejected",results:allResults}:x));
            setTxState(null);
            continue;
          }
          addAudit(agent.id,"APPROVED by human reviewer — continuing pipeline","pass");
          setTxState("Approved");
        }
        result.checks?.forEach(c=>addAudit(agent.id,`${c.name}: ${c.detail}`,c.status));
      }

      if(agent.id==="control"&&result.recommendedRail){
        setSelectedRail(result.recommendedRail.id);
        addAudit(agent.id,`Rail: ${result.recommendedRail.name} — ${result.recommendedRail.reason}`,"pass");
        addAudit(agent.id,`Risk score: ${result.riskScore}/100 (${result.riskLevel})`,result.riskLevel==="low"?"pass":"warning");
      }
      if(agent.id==="execution"){
        setTxState("Settled");
        addAudit(agent.id,`SETTLED via ${result.selectedRail} [${result.provider}]`,"pass");
        addAudit(agent.id,`TX: ${result.transactionId} | Fees: $${result.fees?.total} | ${result.settlementTime}`,null);
      }
      if(agent.id==="audit"){
        setTxState("Reconciled");
        result.decisionChain?.forEach(d=>addAudit(agent.id,`[${d.reasonCode}] ${d.agent}: ${d.decision}`,null));
        addAudit(agent.id,`Tags: ${result.regulatoryTags?.join(" · ")}`,null);
      }

      setAgentStatuses(p=>({...p,[agent.id]:"complete"}));
      addAudit(agent.id,result.summary||"Complete","pass");
    }

    if(!aborted){
      const final={};AGENTS.forEach(a=>{final[a.id]="complete"});
      setAgentStatuses(final);
      setPayments(p=>p.map(x=>x.id===payment.id?{...x,finalStatus:"settled",results:allResults}:x));
    }
    setIsProcessing(false);
  },[vertical,policies,killActive,isProcessing,addAudit]);

  const runAutoDemo=useCallback(()=>{
    setShowHero(false);
    setVertical("treasury");
    setTimeout(()=>processPayment({...VERTICALS.treasury.defaults,intentSource:"erp",id:genId(),timestamp:new Date().toISOString(),vertical:"treasury"}),400);
  },[processPayment]);

  if(showHero) return <Hero onEnter={()=>setShowHero(false)} onAutoDemo={runAutoDemo}/>;

  const leftTabs=[{id:"payment",label:"Payment"},{id:"policy",label:"Governance"},{id:"landscape",label:"Landscape"},{id:"analytics",label:"Analytics"}];
  const rightTabs=[{id:"pipeline",label:"Agent Detail"},{id:"audit",label:`Audit (${auditEntries.length})`}];

  return <div style={{height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
    <StyleInjector/>
    <style>{`
      input[type=range]{-webkit-appearance:none;appearance:none;background:var(--border);border-radius:2px;height:3px;cursor:pointer;border:none;padding:0}
      input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--accent,#06d6a0);cursor:pointer}
      details summary{outline:none;user-select:none}
    `}</style>
    <Header vertical={vertical} killActive={killActive} onKillToggle={()=>{setKillActive(k=>!k);addAudit("orchestrator",killActive?"System resumed — transactions enabled":"⬛ KILL SWITCH ACTIVATED — all transactions halted",killActive?"pass":"fail")}} onHero={()=>setShowHero(true)}/>
    <VerticalTabs active={vertical} onChange={v=>{setVertical(v);setAgentStatuses({});setAgentResults({});setAuditEntries([]);setSelectedAgent(null);setTxState(null);setSelectedRail(null)}}/>
    <AgentPipeline statuses={agentStatuses} selected={selectedAgent} onSelect={id=>{setSelectedAgent(id);setRightTab("pipeline")}} accent={v.accent}/>
    {txState&&<LifecycleBar current={txState}/>}
    <StackDiagram selectedRail={selectedRail} intentSource={intentSource} vertical={vertical}/>
    <MetricsBar payments={payments}/>

    <div style={{flex:1,display:"flex",overflow:"hidden",minHeight:0}}>
      {/* Left */}
      <div style={{flex:"0 0 400px",borderRight:"1px solid var(--border)",display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <TabBar tabs={leftTabs} active={leftTab} onChange={setLeftTab} accent={v.accent}/>
        <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",minHeight:0}}>
          {leftTab==="payment"&&<PaymentForm vertical={vertical} policies={policies} onSubmit={processPayment} isProcessing={isProcessing} killActive={killActive}/>}
          {leftTab==="policy"&&<PolicyPanel vertical={vertical} policies={policies} onChange={setPolicies}/>}
          {leftTab==="landscape"&&<div style={{flex:1,overflowY:"auto"}}><Landscape/></div>}
          {leftTab==="analytics"&&<div style={{flex:1,overflowY:"auto"}}><Analytics payments={payments} vertical={vertical}/></div>}
        </div>
      </div>
      {/* Right */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minHeight:0}}>
        <TabBar tabs={rightTabs} active={rightTab} onChange={setRightTab} accent={v.accent}/>
        <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",minHeight:0}}>
          {rightTab==="pipeline"&&<div style={{flex:1,overflowY:"auto"}}><AgentDetail agentId={selectedAgent||"orchestrator"} results={agentResults}/></div>}
          {rightTab==="audit"&&<AuditTrail entries={auditEntries}/>}
        </div>
      </div>
    </div>

    {hitl&&<HITLModal payment={hitl.payment} reason={hitl.reason} checks={hitl.checks} onApprove={()=>{setHitl(null);if(escRef.current)escRef.current(true)}} onReject={()=>{setHitl(null);if(escRef.current)escRef.current(false)}}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
