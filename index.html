        const { useState, useEffect, useRef, useCallback } = React;

// ═══════════════════════════════════════════════════════════

const COUNTRIES = ["US","UK","DE","JP","SG","BR","NG","AE","IN","AU","FR","CA","NL","CH"];
const CURRENCIES = ["USD","EUR","GBP","JPY","SGD","BRL","NGN","AED","INR","AUD","CHF","CAD","USDC","USDT"];

const STATES = ["Created","Validated","Risk Assessed","Approved","Routed","Settled","Reconciled"];

function genId() { return "PAY-" + Math.random().toString(36).substr(2,8).toUpperCase(); }
function genTx() { return "TX-" + Date.now().toString(36).toUpperCase() + Math.random().toString(36).substr(2,4).toUpperCase(); }

// ═══════════════════════════════════════════════════════════
// AGENT PROMPTS
// ═══════════════════════════════════════════════════════════

function getPrompt(agentId, payment, vert, policies, prior) {
  const ctx = JSON.stringify({ payment, vertical: vert.id, policies, priorDecisions: prior });
  const railsCtx = JSON.stringify(RAILS.map(r => ({ id:r.id, name:r.name, speed:r.speed, cost:r.cost, provider:r.provider, type:r.type })));
  const p = {
    orchestrator: `You are the Orchestrator Agent in Revvyn — the governance layer for agentic commerce. Revvyn sits as the intelligence layer BETWEEN intent sources (Google UCP, OpenAI agents, ERPs, DeFi agents, human users) and execution rails (Visa, Mastercard, WooshPay, SWIFT, stablecoins, DeFi protocols, self-custody cards).

You are processing a payment for the "${vert.label}" vertical. Classify this intent and prepare routing context.
${vert.id === "consumer" ? "\nCONSUMER AI FINANCE CONTEXT: The core rule is yield-only spending. The AI agent can ONLY spend from DeFi yield (e.g. Aave/Compound returns), never from principal. Enforce budget caps based on available yield. Principal protection is the highest-priority policy. Think of this as a personal Yield Guardian." : ""}

Respond ONLY with valid JSON (no markdown, no backticks):
{"classification":"standard|high-value|cross-border|recurring|urgent|micro","intentSource":"${payment.intentSource || 'human'}","priority":"low|medium|high|critical","requiredChecks":["list"],"routingHints":["list"],"estimatedComplexity":"low|medium|high","summary":"one sentence"}

Context: ${ctx}`,

    governance: `You are the Governance Agent in Revvyn. You enforce compliance, policy, and regulatory rules. This is the CRITICAL differentiator — neither Google, Visa, Mastercard, nor WooshPay provides this governance layer.

Active policies: Max single: $${policies.maxSingle.toLocaleString()}. Daily: $${policies.maxDaily.toLocaleString()}. Approval above: $${policies.requireApproval.toLocaleString()}. Dual approval: $${policies.dualApproval.toLocaleString()}. Sanctioned: ${policies.sanctions.join(",")}. KYC: ${policies.kycRequired}.
${vert.id === "consumer" ? "\nCONSUMER YIELD GUARDIAN CONTEXT: The most critical rule is PRINCIPAL PROTECTION. The user's DeFi principal must NEVER be touched. Only accrued yield can be spent. If the requested amount exceeds available yield, DENY the transaction. Check yield balance, enforce budget caps, and ensure the spending source is verified yield — not principal drawdown." : ""}

Respond ONLY with valid JSON:
{"approved":true/false,"checks":[{"name":"name","status":"pass|fail|warning","detail":"explanation"}],"complianceScore":0-100,"escalationRequired":true/false,"escalationReason":"reason or null","escalationType":"none|human_review|dual_approval|senior_approval","regulatoryFrameworks":["PSD2","FATF","SOC2","PCI-DSS","ISO20022","GDPR","MiCA"],"summary":"one sentence"}

Context: ${ctx}`,

    control: `You are the Control Agent in Revvyn. You perform risk assessment and SELECT the optimal payment rail from the competitive landscape: Visa Intelligent Commerce, Mastercard Agent Pay, WooshPay API, SWIFT gpi, SEPA Instant, stablecoins (USDC/USDT), RTP/FedNow, DeFi protocols (Aave/Compound), and Self-Custody Cards (Wirex Pay/Gnosis Safe).
${vert.id === "consumer" ? "CONSUMER CONTEXT: For personal AI agent transactions, prefer DeFi and self-custody rails (Aave yield → USDC → self-custody spending card). Near-zero fees on L2, full user control, no intermediary. Traditional rails are fallback only." : "Pick the BEST rail based on: cost, speed, reliability, corridor coverage, and payment characteristics."}

Available rails: ${railsCtx}

Respond ONLY with valid JSON:
{"riskScore":0-100,"riskLevel":"low|medium|high|critical","fraudIndicators":[{"indicator":"name","severity":"low|medium|high","detail":"explanation"}],"recommendedRail":{"id":"id","name":"name","provider":"provider","reason":"detailed reason for selection including cost/speed tradeoff"},"alternativeRails":[{"id":"id","name":"name","reason":"why alternative"}],"fxOptimization":{"applicable":true/false,"strategy":"description","estimatedSavings":"amount"},"humanReviewRequired":true/false,"summary":"one sentence including which rail was chosen and why"}

Context: ${ctx}`,

    execution: `You are the Execution Agent in Revvyn. You handle settlement via the selected rail. The rail was chosen by the Control Agent — simulate realistic execution through that specific provider.

Respond ONLY with valid JSON:
{"status":"settled|pending|failed","selectedRail":"rail name from control agent","provider":"Visa|Mastercard|WooshPay|SWIFT|SEPA|Circle|TCH|Aave|Wirex","transactionId":"${genTx()}","settlementTime":"realistic time for this rail","fees":{"total":number,"currency":"USD","breakdown":{"network":number,"fx":number,"processing":number,"compliance":number}},"fxRate":number_or_null,"convertedAmount":number_or_null,"ledgerEntries":[{"type":"debit|credit","account":"name","amount":number,"currency":"code"}],"networkResponse":{"code":"200|201|202","message":"realistic response from the rail provider"},"summary":"one sentence"}

Context: ${ctx}`,

    audit: `You are the Audit Agent in Revvyn. Create a comprehensive, explainable audit trail that satisfies regulatory requirements across PSD2, FATF, SOC2, ISO 20022, MiCA, and GDPR.

Respond ONLY with valid JSON:
{"auditId":"AUD-${Date.now().toString(36).toUpperCase()}","decisionChain":[{"agent":"name","decision":"what","reasonCode":"CODE","confidence":0-100}],"complianceStatus":"compliant|non-compliant|review-needed","riskClassification":"low|medium|high","regulatoryTags":["specific regulations"],"railProvider":"which provider was used","dataRetention":"7 years","recommendations":["actionable recommendations"],"summary":"one sentence"}

Context: ${ctx}`
  };
  return p[agentId];
}

async function callAgent(id, payment, vert, policies, prior = {}) {
  try {
    const r = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, messages: [{ role: "user", content: getPrompt(id, payment, vert, policies, prior) }] }),
    });
    const d = await r.json();
    const t = d.content?.map(i => i.text || "").join("") || "";
    return JSON.parse(t.replace(/```json|```/g, "").trim());
  } catch (e) { return { error: true, message: e.message, summary: `Error: ${e.message}` }; }
}

// ═══════════════════════════════════════════════════════════
// COMPONENTS
// ═══════════════════════════════════════════════════════════

function Tabs({ tabs, active, onChange, accent }) {
  return (
    <div style={{ display: "flex", gap: "1px", borderBottom: "1px solid #1b2030", overflow: "auto", flexShrink: 0, background: "#0d1117" }}>
      {tabs.map(t => (
        <button key={t.id} onClick={() => onChange(t.id)} style={{
          padding: "9px 14px", border: "none", background: active === t.id ? "#141a26" : "transparent",
          fontFamily: "var(--m)", fontSize: "9px", fontWeight: 600, color: active === t.id ? accent : "#4a5568",
          cursor: "pointer", letterSpacing: "0.4px", whiteSpace: "nowrap",
          borderBottom: `2px solid ${active === t.id ? accent : "transparent"}`, transition: "all 0.15s",
        }}>{t.label}</button>
      ))}
    </div>
  );
}

function PipelineRow({ statuses, results, selected, onSelect }) {
  return (
    <div style={{ display: "flex", gap: "3px", padding: "10px 12px", overflowX: "auto", flexShrink: 0 }}>
      {AGENTS.map((a, i) => {
        const st = statuses[a.id] || "pending";
        const sel = selected === a.id;
        return (
          <div key={a.id} style={{ display: "flex", alignItems: "center", gap: "3px", flex: "1 0 0", minWidth: 0 }}>
            <div onClick={() => onSelect(a.id)} style={{
              flex: 1, padding: "9px 7px", borderRadius: "8px", cursor: "pointer", minWidth: 0,
              background: sel ? `${a.color}12` : st === "running" ? `${a.color}06` : "#0d1117",
              border: `1.5px solid ${sel ? a.color : st === "running" ? a.color + "50" : "#1b2030"}`,
              transition: "all 0.2s", position: "relative", overflow: "hidden",
            }}>
              {st === "running" && <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: "2px", background: `linear-gradient(90deg, transparent, ${a.color}, transparent)`, animation: "shimmer 1.5s infinite" }} />}
              <div style={{ display: "flex", alignItems: "center", gap: "4px", marginBottom: "2px" }}>
                <span style={{ fontFamily: "var(--m)", fontSize: "10px", color: a.color }}>{a.icon}</span>
                <span style={{ fontFamily: "var(--m)", fontSize: "7px", fontWeight: 700, color: a.color, letterSpacing: "0.3px", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{a.name.toUpperCase()}</span>
                <div style={{ marginLeft: "auto", width: "5px", height: "5px", borderRadius: "50%", flexShrink: 0,
                  background: st === "complete" ? "#10b981" : st === "failed" ? "#ef4444" : st === "running" ? a.color : "#1b2030",
                  boxShadow: st === "running" ? `0 0 6px ${a.color}` : "none",
                  animation: st === "running" ? "pulse 1s infinite" : "none",
                }} />
              </div>
              <div style={{ fontSize: "7px", color: "#4a5568", fontFamily: "var(--b)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                {st === "running" ? "Processing..." : st === "complete" ? "Done" : st === "failed" ? "Blocked" : a.role}
              </div>
            </div>
            {i < AGENTS.length - 1 && <span style={{ color: st === "complete" ? "#06d6a0" : "#1b2030", fontFamily: "var(--m)", fontSize: "7px", flexShrink: 0 }}>▸</span>}
          </div>
        );
      })}
    </div>
  );
}

function StackDiagram({ selectedRail, intentSource }) {
  const srcColor = INTENT_SOURCES.find(s => s.id === intentSource)?.color || "#4a5568";
  const railObj = RAILS.find(r => r.id === selectedRail);
  return (
    <div style={{ padding: "10px 12px", flexShrink: 0 }}>

      <div style={{ display: "flex", flexDirection: "column", gap: "2px" }}>
        {/* Intent Layer */}
        <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>

          <div style={{ flex: 1, display: "flex", gap: "3px" }}>
            {INTENT_SOURCES.map(s => (
              <div key={s.id} style={{
                flex: 1, padding: "4px 3px", borderRadius: "4px", textAlign: "center",
                background: intentSource === s.id ? `${s.color}15` : "#0d1117",
                border: `1px solid ${intentSource === s.id ? s.color : "#1b2030"}`,
              }}>
                <div style={{ fontFamily: "var(--m)", fontSize: "6px", fontWeight: 600, color: intentSource === s.id ? s.color : "#4a5568" }}>{s.name}</div>
              </div>
            ))}
          </div>
        </div>
        {/* Arrow */}
        <div style={{ textAlign: "center", fontFamily: "var(--m)", fontSize: "8px", color: "#06d6a0", padding: "1px 0" }}>↓</div>
        {/* REVVYN LAYER */}
        <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
          <div style={{ width: "70px", fontFamily: "var(--m)", fontSize: "7px", color: "#06d6a0", textAlign: "right", fontWeight: 700 }}>REVVYN</div>
          <div style={{ flex: 1, padding: "6px 10px", borderRadius: "6px", background: "linear-gradient(135deg, #06d6a008, #a78bfa08)", border: "1.5px solid #06d6a040", textAlign: "center" }}>
            <div style={{ fontFamily: "var(--m)", fontSize: "8px", fontWeight: 700, color: "#06d6a0", letterSpacing: "0.5px" }}>GOVERNANCE · CONTROL · EXECUTION</div>
            <div style={{ fontFamily: "var(--m)", fontSize: "6px", color: "#64748b", marginTop: "1px" }}>Policy Engine → Risk Engine → Rail Optimizer → Settlement</div>
          </div>
        </div>
        {/* Arrow */}
        <div style={{ textAlign: "center", fontFamily: "var(--m)", fontSize: "8px", color: "#38bdf8", padding: "1px 0" }}>↓</div>
        {/* Rail Layer */}
        <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
          <div style={{ width: "70px", fontFamily: "var(--m)", fontSize: "7px", color: "#4a5568", textAlign: "right" }}>RAILS</div>
          <div style={{ flex: 1, display: "flex", gap: "2px", flexWrap: "wrap" }}>
            {RAILS.map(r => (
              <div key={r.id} style={{
                flex: "1 0 0", minWidth: "55px", padding: "3px 2px", borderRadius: "4px", textAlign: "center",
                background: selectedRail === r.id ? "#10b98110" : "#0d1117",
                border: `1px solid ${selectedRail === r.id ? "#10b981" : "#1b2030"}`,
              }}>
                <div style={{ fontSize: "8px" }}>{r.icon}</div>
                <div style={{ fontFamily: "var(--m)", fontSize: "5px", fontWeight: 600, color: selectedRail === r.id ? "#10b981" : "#94a3b8" }}>{r.name.length > 12 ? r.provider : r.name}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function StateMachine({ current }) {
  const idx = STATES.indexOf(current);
  return (
    <div style={{ display: "flex", gap: "2px", padding: "0 12px 8px", flexWrap: "wrap", flexShrink: 0 }}>
      {STATES.map((s, i) => (
        <div key={s} style={{ display: "flex", alignItems: "center", gap: "2px" }}>
          <span style={{
            padding: "2px 5px", borderRadius: "3px", fontFamily: "var(--m)", fontSize: "6px", fontWeight: 600,
            background: i <= idx ? "#10b98115" : "#0d1117", color: i <= idx ? "#10b981" : "#262d3d",
            border: i === idx ? "1px solid #10b98140" : "1px solid transparent",
          }}>{s.toUpperCase()}</span>
          {i < STATES.length - 1 && <span style={{ color: i < idx ? "#10b981" : "#1b2030", fontSize: "6px" }}>→</span>}
        </div>
      ))}
    </div>
  );
}

function PaymentForm({ vertical, onSubmit, isProcessing, killActive }) {
  const v = VERTICALS[vertical];
  const [form, setForm] = useState({ ...v.defaults, intentSource: "human" });
  useEffect(() => { setForm({ ...VERTICALS[vertical].defaults, intentSource: vertical === "consumer" ? "defi_agent" : "human" }); }, [vertical]);
  const u = (k, val) => setForm(f => ({ ...f, [k]: val }));

  const inp = { width: "100%", padding: "7px 9px", borderRadius: "5px", background: "#0d1117", border: "1px solid #1b2030", color: "#e2e8f0", fontFamily: "var(--m)", fontSize: "11px", outline: "none", boxSizing: "border-box" };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: "10px", padding: "12px" }}>
      <div style={{ padding: "10px", borderRadius: "8px", background: `${v.accent}08`, border: `1px solid ${v.accent}20` }}>
        <div style={{ fontFamily: "var(--m)", fontSize: "11px", fontWeight: 700, color: v.accent }}>{v.icon} {v.label}</div>
        <div style={{ fontSize: "10px", color: "#4a5568", marginTop: "2px" }}>{v.desc}</div>
      </div>

      {/* Intent Source */}
      <Fld label="INTENT SOURCE">
        <div style={{ display: "flex", gap: "4px", flexWrap: "wrap" }}>
          {INTENT_SOURCES.map(s => (
            <button key={s.id} onClick={() => u("intentSource", s.id)} style={{
              flex: "1 0 0", minWidth: "60px", padding: "6px 4px", borderRadius: "5px", border: `1px solid ${form.intentSource === s.id ? s.color : "#1b2030"}`,
              background: form.intentSource === s.id ? `${s.color}12` : "#0d1117", cursor: "pointer", textAlign: "center",
            }}>
              <div style={{ fontFamily: "var(--m)", fontSize: "7px", fontWeight: 600, color: form.intentSource === s.id ? s.color : "#4a5568" }}>{s.name}</div>
            </button>
          ))}
        </div>
      </Fld>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px" }}>
        <Fld label="AMOUNT"><input type="number" value={form.amount} onChange={e => u("amount", Number(e.target.value))} style={inp} /></Fld>
        <Fld label="CURRENCY"><select value={form.currency} onChange={e => u("currency", e.target.value)} style={inp}>{CURRENCIES.map(c => <option key={c}>{c}</option>)}</select></Fld>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "8px" }}>
        <Fld label="FROM"><select value={form.fromCountry} onChange={e => u("fromCountry", e.target.value)} style={inp}>{COUNTRIES.map(c => <option key={c}>{c}</option>)}</select></Fld>
        <Fld label="TO"><select value={form.toCountry} onChange={e => u("toCountry", e.target.value)} style={inp}>{[...COUNTRIES, ...SANCTIONED].map(c => <option key={c}>{c}</option>)}</select></Fld>
        <Fld label="CCY"><select value={form.toCurrency} onChange={e => u("toCurrency", e.target.value)} style={inp}>{CURRENCIES.map(c => <option key={c}>{c}</option>)}</select></Fld>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px" }}>
        <Fld label="BENEFICIARY"><input value={form.beneficiary} onChange={e => u("beneficiary", e.target.value)} style={inp} /></Fld>
        <Fld label="URGENCY"><select value={form.urgency} onChange={e => u("urgency", e.target.value)} style={inp}><option value="standard">Standard</option><option value="urgent">Urgent</option><option value="critical">Critical</option></select></Fld>
      </div>
      <Fld label="PURPOSE"><input value={form.purpose} onChange={e => u("purpose", e.target.value)} style={inp} /></Fld>

      <button onClick={() => onSubmit({ ...form, id: genId(), timestamp: new Date().toISOString(), vertical })} disabled={isProcessing || killActive}
        style={{
          padding: "12px", borderRadius: "8px", border: "none",
          background: killActive ? "#ef444420" : isProcessing ? "#1b2030" : `linear-gradient(135deg, ${v.accent}, ${v.accent}bb)`,
          color: killActive ? "#ef4444" : isProcessing ? "#4a5568" : "#000",
          fontFamily: "var(--m)", fontSize: "11px", fontWeight: 700, cursor: (isProcessing || killActive) ? "not-allowed" : "pointer", letterSpacing: "0.8px",
        }}>
        {killActive ? "⛔ HALTED" : isProcessing ? "⏳ AGENTS PROCESSING..." : "▶ SUBMIT PAYMENT INTENT"}

  );
}

function Fld({ label, children }) {
  return <div><label style={{ display: "block", fontFamily: "var(--m)", fontSize: "7px", color: "#4a5568", letterSpacing: "0.8px", marginBottom: "3px", fontWeight: 600 }}>{label}</label>{children}</div>;
}

function PolicyEditor({ vertical, policies, onChange }) {

    <div style={{ display: "flex", flexDirection: "column", gap: "12px", padding: "12px" }}>
      <div style={{ fontSize: "11px", color: "#64748b" }}>Active governance rules for <span style={{ color: v.accent, fontWeight: 600 }}>{v.label}</span></div>
      {[
        { key: "maxSingle", label: "MAX SINGLE PAYMENT", max: vertical === "consumer" ? 5000 : 10000000 },
        { key: "maxDaily", label: "DAILY LIMIT", max: vertical === "consumer" ? 20000 : 50000000 },
        { key: "requireApproval", label: "APPROVAL THRESHOLD", max: vertical === "consumer" ? 2000 : 5000000 },
        { key: "dualApproval", label: "DUAL APPROVAL", max: vertical === "consumer" ? 5000 : 10000000 },
      ].map(({ key, label, max }) => (
        <div key={key}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "3px" }}>
            <span style={{ fontFamily: "var(--m)", fontSize: "8px", color: "#4a5568", letterSpacing: "0.5px", fontWeight: 600 }}>{label}</span>
            <span style={{ fontFamily: "var(--m)", fontSize: "10px", color: v.accent, fontWeight: 600 }}>{fmt(policies[key])}</span>
          </div>
          <input type="range" min={0} max={max} step={vertical === "consumer" ? 50 : 50000} value={policies[key]}
            onChange={e => onChange({ ...policies, [key]: Number(e.target.value) })} style={{ width: "100%", accentColor: v.accent, height: "3px" }} />
        </div>
      ))}
      <div style={{ padding: "8px", borderRadius: "6px", background: "#0d1117", border: "1px solid #1b2030" }}>
        <div style={{ fontFamily: "var(--m)", fontSize: "7px", color: "#4a5568", marginBottom: "4px" }}>SANCTIONED</div>
        <div style={{ display: "flex", gap: "3px", flexWrap: "wrap" }}>
          {policies.sanctions.map(s => <span key={s} style={{ padding: "2px 5px", borderRadius: "3px", fontSize: "8px", fontFamily: "var(--m)", fontWeight: 600, background: "#ef444415", color: "#ef4444" }}>{s}</span>)}
        </div>
      </div>
      {vertical === "consumer" && (
        <div style={{ padding: "8px", borderRadius: "6px", background: "#f472b608", border: "1px solid #f472b620" }}>
          <div style={{ fontFamily: "var(--m)", fontSize: "7px", color: "#f472b6", marginBottom: "4px", fontWeight: 600 }}>YIELD GUARDIAN RULES</div>
          <div style={{ fontSize: "9px", color: "#94a3b8", lineHeight: 1.4 }}>Principal protection: ON. Only accrued DeFi yield may be spent. Preferred rails: Aave → USDC → Self-Custody Card (Wirex/Gnosis). Kill switch halts all agent spending instantly.</div>
        </div>
      )}
    </div>
  );
}

function AgentDetail({ agentId, results }) {
  const agent = AGENTS.find(a => a.id === agentId);
  const result = results[agentId];
  if (!result) return <div style={{ padding: "20px", textAlign: "center", color: "#262d3d", fontSize: "10px" }}>Click an agent to inspect</div>;

  return (
    <div style={{ padding: "12px", overflowY: "auto" }}>
      <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "10px" }}>
        <span style={{ fontFamily: "var(--m)", fontSize: "14px", color: agent.color }}>{agent.icon}</span>
        <div>
          <div style={{ fontFamily: "var(--m)", fontSize: "12px", fontWeight: 700, color: agent.color }}>{agent.name}</div>
          <div style={{ fontSize: "9px", color: "#4a5568" }}>{agent.role}</div>
        </div>
      </div>
      {result.summary && <div style={{ padding: "8px 10px", borderRadius: "6px", background: `${agent.color}08`, border: `1px solid ${agent.color}20`, marginBottom: "10px", fontSize: "11px", color: "#cbd5e1", lineHeight: 1.4 }}>{result.summary}</div>}

      <div style={{ display: "flex", gap: "5px", marginBottom: "10px", flexWrap: "wrap" }}>
        {result.complianceScore !== undefined && <Badge label="Compliance" value={`${result.complianceScore}%`} color={result.complianceScore > 80 ? "#10b981" : "#fbbf24"} />}
        {result.riskScore !== undefined && <Badge label="Risk" value={`${result.riskScore}/100`} color={result.riskScore < 40 ? "#10b981" : result.riskScore < 70 ? "#fbbf24" : "#ef4444"} />}
        {result.approved !== undefined && <Badge label="Status" value={result.approved ? "APPROVED" : "REJECTED"} color={result.approved ? "#10b981" : "#ef4444"} />}
        {result.riskLevel && !result.complianceScore && <Badge label="Level" value={result.riskLevel.toUpperCase()} color={result.riskLevel === "low" ? "#10b981" : "#fbbf24"} />}
        {result.fees?.total !== undefined && <Badge label="Fees" value={`$${result.fees.total}`} color="#38bdf8" />}
        {result.status && <Badge label="Settlement" value={result.status.toUpperCase()} color={result.status === "settled" ? "#10b981" : "#fbbf24"} />}
        {result.provider && <Badge label="Provider" value={result.provider} color="#a78bfa" />}
      </div>

      {result.checks && (
        <div style={{ marginBottom: "10px" }}>
          <div style={{ fontFamily: "var(--m)", fontSize: "7px", color: "#4a5568", marginBottom: "4px" }}>CHECKS</div>
          {result.checks.map((c, i) => (
            <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: "5px", fontSize: "9px", marginBottom: "3px", padding: "3px 5px", borderRadius: "3px", background: "#0d1117" }}>
              <span style={{ padding: "1px 3px", borderRadius: "2px", fontFamily: "var(--m)", fontSize: "6px", fontWeight: 700, flexShrink: 0, background: c.status === "pass" ? "#10b98115" : c.status === "fail" ? "#ef444415" : "#fbbf2415", color: c.status === "pass" ? "#10b981" : c.status === "fail" ? "#ef4444" : "#fbbf24" }}>{c.status.toUpperCase()}</span>
              <span style={{ color: "#94a3b8" }}><strong style={{ color: "#cbd5e1" }}>{c.name}:</strong> {c.detail}</span>
            </div>
          ))}
        </div>
      )}

      {result.decisionChain && (
        <div style={{ marginBottom: "10px" }}>
          <div style={{ fontFamily: "var(--m)", fontSize: "7px", color: "#4a5568", marginBottom: "4px" }}>DECISION CHAIN</div>
          {result.decisionChain.map((d, i) => (
            <div key={i} style={{ display: "flex", gap: "5px", fontSize: "9px", marginBottom: "2px", padding: "3px 5px", borderRadius: "3px", background: "#0d1117" }}>
              <span style={{ fontFamily: "var(--m)", fontSize: "7px", color: "#38bdf8", fontWeight: 600 }}>[{d.reasonCode}]</span>
              <span style={{ color: "#94a3b8", flex: 1 }}>{d.agent}: {d.decision}</span>
              <span style={{ fontFamily: "var(--m)", fontSize: "7px", color: "#4a5568" }}>{d.confidence}%</span>
            </div>
          ))}
        </div>
      )}

      <details><summary style={{ fontFamily: "var(--m)", fontSize: "8px", color: "#4a5568", cursor: "pointer" }}>Raw JSON</summary>
        <pre style={{ marginTop: "4px", padding: "8px", borderRadius: "5px", background: "#080a10", fontSize: "7px", color: "#4a5568", fontFamily: "var(--m)", lineHeight: 1.4, border: "1px solid #1b2030", whiteSpace: "pre-wrap", wordBreak: "break-word", overflow: "auto", maxHeight: "250px" }}>{JSON.stringify(result, null, 2)}</pre>
      </details>
    </div>
  );
}

function Badge({ label, value, color }) {
  return (
    <div style={{ padding: "4px 7px", borderRadius: "5px", background: `${color}10`, border: `1px solid ${color}20` }}>

}

function AuditTrail({ entries }) {

    <div ref={ref} style={{ display: "flex", flexDirection: "column", gap: "3px", padding: "8px 12px", overflowY: "auto" }}>
      {entries.length === 0 && <div style={{ color: "#262d3d", fontSize: "10px", textAlign: "center", padding: "16px" }}>Audit trail populates as agents process...</div>}
      {entries.map((e, i) => (
        <div key={i} style={{ padding: "5px 7px", borderRadius: "4px", background: "#0d1117", borderLeft: `2px solid ${AGENTS.find(a => a.id === e.agent)?.color || "#1b2030"}` }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "1px" }}>

function Analytics({ payments, vertical }) {
  const v = VERTICALS[vertical];
  const settled = payments.filter(p => p.finalStatus === "settled");
  const rejected = payments.filter(p => p.finalStatus === "rejected");
  const total = payments.reduce((s, p) => s + (p.payment?.amount || 0), 0);
  const avgRisk = settled.length ? Math.round(settled.reduce((s, p) => s + (p.results?.control?.riskScore || 0), 0) / settled.length) : 0;

  const railCounts = {};
  settled.forEach(p => { const r = p.results?.execution?.selectedRail || p.results?.execution?.provider || "unknown"; railCounts[r] = (railCounts[r] || 0) + 1; });

  return (
    <div style={{ padding: "12px", display: "flex", flexDirection: "column", gap: "10px" }}>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "6px" }}>
        <SC label="Processed" value={payments.length} sub={vertical === "consumer" ? `$${total.toLocaleString()}` : `$${(total/1e6).toFixed(1)}M`} color={v.accent} />
        <SC label="Settled" value={settled.length} sub={`${payments.length ? Math.round(settled.length/payments.length*100) : 0}%`} color="#10b981" />
        <SC label="Rejected" value={rejected.length} sub={`${payments.length ? Math.round(rejected.length/payments.length*100) : 0}%`} color="#ef4444" />
        <SC label="Avg Risk" value={avgRisk} sub={avgRisk < 40 ? "Low" : "Med"} color={avgRisk < 40 ? "#10b981" : "#fbbf24"} />
      </div>
      {Object.keys(railCounts).length > 0 && (
        <div style={{ padding: "8px", borderRadius: "6px", background: "#0d1117", border: "1px solid #1b2030" }}>
          <div style={{ fontFamily: "var(--m)", fontSize: "7px", color: "#4a5568", marginBottom: "6px" }}>RAIL USAGE</div>
          {Object.entries(railCounts).map(([r, c]) => (
            <div key={r} style={{ display: "flex", justifyContent: "space-between", fontSize: "9px", marginBottom: "2px" }}>
              <span style={{ color: "#94a3b8" }}>{r}</span>
              <span style={{ fontFamily: "var(--m)", fontWeight: 600, color: v.accent }}>{c}x</span>
            </div>
          ))}
        </div>
      )}
      {payments.slice(0, 6).map(p => (
        <div key={p.id} style={{ display: "flex", justifyContent: "space-between", padding: "5px 7px", borderRadius: "3px", background: "#0d1117", fontSize: "9px", alignItems: "center" }}>
          <span style={{ fontFamily: "var(--m)", color: v.accent, fontWeight: 600, fontSize: "8px" }}>{p.payment.id}</span>
          <span style={{ color: "#4a5568", fontSize: "8px" }}>{p.payment.currency} {Number(p.payment.amount).toLocaleString()}</span>
          <span style={{ fontFamily: "var(--m)", fontSize: "7px", fontWeight: 700, color: p.finalStatus === "settled" ? "#10b981" : p.finalStatus === "rejected" ? "#ef4444" : "#38bdf8" }}>{(p.finalStatus || "...").toUpperCase()}</span>
        </div>
      ))}
      {payments.length === 0 && <div style={{ textAlign: "center", color: "#262d3d", fontSize: "10px", padding: "12px" }}>No data yet</div>}
    </div>
  );
}

function SC({ label, value, sub, color }) {
  return (
    <div style={{ padding: "10px", borderRadius: "8px", background: "#0d1117", border: "1px solid #1b2030" }}>
      <div style={{ fontFamily: "var(--m)", fontSize: "6px", color: "#4a5568", letterSpacing: "0.5px" }}>{label.toUpperCase()}</div>
      <div style={{ fontFamily: "var(--m)", fontSize: "20px", fontWeight: 700, color, lineHeight: 1.1 }}>{value}</div>
      <div style={{ fontSize: "8px", color: "#4a5568", marginTop: "1px" }}>{sub}</div>

  );
}

function App() {
  const [vertical, setVertical] = useState("treasury");
  const [policies, setPolicies] = useState(VERTICALS.treasury.policies);
  const [payments, setPayments] = useState([]);
  const [isProcessing, setIsProcessing] = useState(false);
  const [killActive, setKillActive] = useState(false);
  const [agentStatuses, setAgentStatuses] = useState({});
  const [agentResults, setAgentResults] = useState({});
  const [selectedAgent, setSelectedAgent] = useState(null);
  const [auditEntries, setAuditEntries] = useState([]);
  const [selectedRail, setSelectedRail] = useState(null);
  const [paymentState, setPaymentState] = useState(null);
  const [mainTab, setMainTab] = useState("payment");
  const [escalation, setEscalation] = useState(null);
  const [intentSource, setIntentSource] = useState("human");
  const escRef = useRef(null);
  const v = VERTICALS[vertical];

  useEffect(() => { setPolicies(VERTICALS[vertical].policies); }, [vertical]);

  const addAudit = useCallback((agent, msg, st) => {
    setAuditEntries(p => [...p, { agent, message: msg, status: st, time: new Date().toLocaleTimeString("en-US", { hour12: false, hour: "2-digit", minute: "2-digit", second: "2-digit" }) }]);
  }, []);

  const processPayment = useCallback(async (payment) => {
    if (killActive) return;
    setIsProcessing(true); setAgentStatuses({}); setAgentResults({}); setSelectedAgent(null);
    setAuditEntries([]); setSelectedRail(null); setPaymentState("Created"); setMainTab("pipeline");
    setIntentSource(payment.intentSource || "human");

    const rec = { id: payment.id, payment, finalStatus: "processing", results: {}, vertical };
    setPayments(p => [rec, ...p]);

    let prior = {}, aborted = false;

    for (const agent of AGENTS) {
      if (aborted || killActive) { setAgentStatuses(p => ({ ...p, [agent.id]: "skipped" })); continue; }
      setAgentStatuses(p => ({ ...p, [agent.id]: "running" }));
      addAudit(agent.id, `${agent.name} activated`, null);

      if (agent.id === "governance") setPaymentState("Validated");
      if (agent.id === "control") setPaymentState("Risk Assessed");
      if (agent.id === "execution") setPaymentState("Routed");

      await new Promise(r => setTimeout(r, 400));
      const result = await callAgent(agent.id, payment, VERTICALS[vertical], policies, prior);
      setAgentResults(p => ({ ...p, [agent.id]: result })); prior[agent.id] = result;

      if (result.error) { setAgentStatuses(p => ({ ...p, [agent.id]: "failed" })); addAudit(agent.id, `Error: ${result.message}`, "fail"); aborted = true; continue; }

      if (agent.id === "governance") {
        if (result.approved === false) {
          setAgentStatuses(p => ({ ...p, [agent.id]: "failed" })); addAudit(agent.id, `REJECTED — ${result.summary}`, "fail");
          result.checks?.filter(c => c.status === "fail").forEach(c => addAudit(agent.id, `✗ ${c.name}: ${c.detail}`, "fail"));
          aborted = true; setPayments(p => p.map(x => x.id === payment.id ? { ...x, finalStatus: "rejected", results: prior } : x)); continue;
        }
        if (result.escalationRequired) {
          addAudit(agent.id, `ESCALATION: ${result.escalationReason}`, "warning");
          setEscalation({ payment, result });
          const approved = await new Promise(res => { escRef.current = res; });
          setEscalation(null);
          if (!approved) { addAudit(agent.id, "REJECTED by human", "fail"); setAgentStatuses(p => ({ ...p, [agent.id]: "failed" })); aborted = true; setPayments(p => p.map(x => x.id === payment.id ? { ...x, finalStatus: "rejected", results: prior } : x)); continue; }
          addAudit(agent.id, "APPROVED by human", "pass"); setPaymentState("Approved");
        }
        result.checks?.forEach(c => addAudit(agent.id, `${c.name}: ${c.detail}`, c.status));
      }

      if (agent.id === "control" && result.recommendedRail) {
        setSelectedRail(result.recommendedRail.id);
        addAudit(agent.id, `Rail: ${result.recommendedRail.name} (${result.recommendedRail.provider || ""}) — ${result.recommendedRail.reason}`, "pass");
        addAudit(agent.id, `Risk: ${result.riskScore}/100 (${result.riskLevel})`, result.riskLevel === "low" ? "pass" : "warning");
      }

      if (agent.id === "execution") {
        setPaymentState("Settled");
        addAudit(agent.id, `${result.status?.toUpperCase()} via ${result.selectedRail} [${result.provider || ""}]`, result.status === "settled" ? "pass" : "warning");
        if (result.fees) addAudit(agent.id, `Fees: $${result.fees.total}`, null);
      }

      if (agent.id === "audit") {
        setPaymentState("Reconciled");
        result.decisionChain?.forEach(d => addAudit(agent.id, `[${d.reasonCode}] ${d.agent}: ${d.decision}`, null));
      }

      setAgentStatuses(p => ({ ...p, [agent.id]: "complete" })); addAudit(agent.id, result.summary || "Complete", "pass");
    }

    if (!aborted) setPayments(p => p.map(x => x.id === payment.id ? { ...x, finalStatus: prior.execution?.status || "settled", results: prior } : x));
    setIsProcessing(false);
  }, [vertical, policies, killActive, addAudit]);

  return (
    <div style={{ height: "100vh", display: "flex", flexDirection: "column", background: "#080a12", color: "#e2e8f0", fontFamily: "var(--b)", overflow: "hidden" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');
        :root { --m: 'IBM Plex Mono', monospace; --b: 'Outfit', sans-serif; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
        @keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }
        * { box-sizing: border-box; margin: 0; scrollbar-width: thin; scrollbar-color: #1b2030 transparent; }
        ::-webkit-scrollbar { width: 3px; } ::-webkit-scrollbar-thumb { background: #1b2030; border-radius: 3px; }
        select option { background: #0d1117; color: #e2e8f0; }
        input:focus, select:focus { border-color: ${v.accent} !important; outline: none; }
        input[type=range] { -webkit-appearance: none; background: #1b2030; border-radius: 3px; height: 3px; cursor: pointer; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: ${v.accent}; }
        details summary { cursor: pointer; } details summary:hover { color: #94a3b8; }
      `}</style>

      {/* HEADER */}
      <div style={{ padding: "8px 14px", borderBottom: "1px solid #1b2030", display: "flex", alignItems: "center", justifyContent: "space-between", background: "#0a0e18", flexShrink: 0 }}>
        <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
          <div style={{ width: "26px", height: "26px", borderRadius: "6px", background: `linear-gradient(135deg, ${v.accent}, ${v.accent}88)`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "12px", fontWeight: 700, color: "#000" }}>R</div>
          <div>
            <div style={{ fontFamily: "var(--m)", fontSize: "11px", fontWeight: 700 }}>REVVYN</div>
            <div style={{ fontSize: "8px", color: "#4a5568", fontFamily: "var(--m)" }}>The Governance Layer — Protocol-Agnostic · Enterprise to Consumer</div>
          </div>
        </div>
        <div onClick={() => { setKillActive(!killActive); addAudit("orchestrator", killActive ? "System resumed" : "⛔ KILL SWITCH", killActive ? "pass" : "fail"); }}
          style={{ display: "flex", alignItems: "center", gap: "5px", padding: "4px 10px", borderRadius: "5px", cursor: "pointer", background: killActive ? "#ef444412" : "#10b98108", border: `1px solid ${killActive ? "#ef444440" : "#10b98130"}` }}>
          <div style={{ width: "6px", height: "6px", borderRadius: "50%", background: killActive ? "#ef4444" : "#10b981", boxShadow: `0 0 5px ${killActive ? "#ef4444" : "#10b981"}` }} />
          <span style={{ fontFamily: "var(--m)", fontSize: "8px", fontWeight: 700, color: killActive ? "#ef4444" : "#10b981" }}>{killActive ? "HALTED" : "LIVE"}</span>
        </div>
      </div>

      {/* VERTICALS */}
      <div style={{ display: "flex", gap: "2px", padding: "5px 10px", borderBottom: "1px solid #1b2030", background: "#0a0e18", flexShrink: 0, overflowX: "auto" }}>
        {Object.values(VERTICALS).map(vt => (
          <button key={vt.id} onClick={() => setVertical(vt.id)} style={{
            padding: "5px 10px", borderRadius: "5px", border: `1px solid ${vertical === vt.id ? vt.accent : "transparent"}`,
            background: vertical === vt.id ? `${vt.accent}12` : "transparent", cursor: "pointer",
            fontFamily: "var(--m)", fontSize: "8px", fontWeight: 600, color: vertical === vt.id ? vt.accent : "#4a5568", whiteSpace: "nowrap",
          }}>{vt.icon} {vt.label.toUpperCase()}</button>
        ))}
      </div>

      {/* PIPELINE */}
      <PipelineRow statuses={agentStatuses} results={agentResults} selected={selectedAgent} onSelect={s => { setSelectedAgent(s); setMainTab("pipeline"); }} />
      {paymentState && <StateMachine current={paymentState} />}

      {/* STACK DIAGRAM */}
      <StackDiagram selectedRail={selectedRail} intentSource={intentSource} />

      {/* TABS */}
      <Tabs tabs={[
        { id: "payment", label: "Payment" },
        { id: "pipeline", label: "Agent Detail" },
        { id: "audit", label: `Audit (${auditEntries.length})` },
        { id: "policy", label: "Governance" },
        { id: "landscape", label: "Landscape" },
        { id: "analytics", label: "Analytics" },
      ]} active={mainTab} onChange={setMainTab} accent={v.accent} />

      {/* CONTENT */}
      <div style={{ flex: 1, overflowY: "auto" }}>
        {mainTab === "payment" && <PaymentForm vertical={vertical} onSubmit={processPayment} isProcessing={isProcessing} killActive={killActive} />}
        {mainTab === "pipeline" && <AgentDetail agentId={selectedAgent || "orchestrator"} results={agentResults} />}
        {mainTab === "audit" && <AuditTrail entries={auditEntries} />}
        {mainTab === "policy" && <PolicyEditor vertical={vertical} policies={policies} onChange={setPolicies} />}
        {mainTab === "landscape" && <CompetitiveLandscape />}
        {mainTab === "analytics" && <Analytics payments={payments} vertical={vertical} />}
      </div>

      {escalation && <EscalationModal payment={escalation.payment} result={escalation.result} onApprove={() => escRef.current?.(true)} onReject={() => escRef.current?.(false)} />}
    </div>
  );
}

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
