<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<style>
:root{
  --bg:#070D18;--surface:#0B1220;--surface2:#0F1829;--card:#0D1624;
  --border:#1A2840;--border2:#243858;
  --text:#E8EDF5;--muted:#5E7494;--dim:#253548;
  --gold:#C49A2C;--gold2:#A8821E;--gold-glow:rgba(196,154,44,.15);
  --sans:'Inter',sans-serif;--mono:'DM Mono',monospace;
  --red:#E05252;--green:#3DB88A;--blue:#4A9EFF;--amber:#D4914A;--violet:#8B72D4;--rose:#C46E8A;
}
html[data-theme="light"]{
  --bg:#F0EBE0;--surface:#E8E2D5;--surface2:#E0D9CA;--card:#EAE4D8;
  --border:#C0B49C;--border2:#A89880;
  --text:#0F1520;--muted:#4A3D2E;--dim:#8A7A65;
  --gold:#7A5C0A;--gold2:#5E4608;--gold-glow:rgba(122,92,10,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px 200px;}
html[data-theme="light"] body::after{opacity:.035}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes glow{0%,100%{box-shadow:0 0 20px var(--gold-glow)}50%{box-shadow:0 0 44px var(--gold-glow)}}
@keyframes borderPulse{0%,100%{border-color:rgba(196,154,44,.3)}50%{border-color:rgba(196,154,44,.7)}}
select option{background:var(--surface);color:var(--text)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

// ─── Data ───────────────────────────────────────────────────────────────────
const AGENTS=[
  {id:"orchestrator",name:"Orchestrator",icon:"◉",color:"#C49A2C",role:"Intent classification"},
  {id:"governance",  name:"Governance",  icon:"⬡",color:"#8B72D4",role:"Policy & compliance"},
  {id:"control",     name:"Control",     icon:"◆",color:"#4A9EFF",role:"Risk & rail selection"},
  {id:"execution",   name:"Execution",   icon:"▸",color:"#3DB88A",role:"Settlement"},
  {id:"audit",       name:"Audit",       icon:"◫",color:"#C46E8A",role:"Explainability"},
];

const VERTICALS={
  treasury:{id:"treasury",label:"Enterprise Treasury",icon:"◈",accent:"#C49A2C",
    desc:"Cross-border vendor payments, FX optimisation, multi-bank routing",
    defaults:{amount:250000,currency:"USD",fromCountry:"US",toCountry:"DE",toCurrency:"EUR",beneficiary:"Siemens AG",purpose:"Vendor invoice #INV-2026-4471",urgency:"standard",intentSource:"erp"},
    policies:{maxSingle:500000,maxDaily:2000000,requireApproval:100000,dualApproval:250000,sanctions:["KP","IR","SY","CU","RU"],kycRequired:true}},
  marketplace:{id:"marketplace",label:"Marketplace",icon:"◇",accent:"#4A9EFF",
    desc:"Seller payouts, split settlements, multi-currency disbursements",
    defaults:{amount:3200,currency:"USD",fromCountry:"US",toCountry:"IN",toCurrency:"INR",beneficiary:"Seller #SKU-88912",purpose:"Weekly payout",urgency:"standard",intentSource:"human"},
    policies:{maxSingle:50000,maxDaily:500000,requireApproval:25000,dualApproval:50000,sanctions:["KP","IR","SY"],kycRequired:true}},
  ai_commerce:{id:"ai_commerce",label:"AI-to-AI Commerce",icon:"◎",accent:"#8B72D4",
    desc:"Autonomous agent transactions, programmatic spend governance",
    defaults:{amount:890,currency:"USD",fromCountry:"US",toCountry:"SG",toCurrency:"USD",beneficiary:"Agent-API-7x9k2",purpose:"Autonomous procurement — cloud compute",urgency:"urgent",intentSource:"openai"},
    policies:{maxSingle:10000,maxDaily:100000,requireApproval:5000,dualApproval:10000,sanctions:["KP","IR","SY","CU"],kycRequired:false}},
  insurance:{id:"insurance",label:"Insurance",icon:"◉",accent:"#D4914A",
    desc:"Claims settlement, liability payouts, reinsurance, agent-driven claim decisions",
    defaults:{amount:47500,currency:"USD",fromCountry:"US",toCountry:"UK",toCurrency:"GBP",beneficiary:"Claimant #CLM-2026-881",purpose:"Motor claim settlement",urgency:"standard",intentSource:"erp"},
    policies:{maxSingle:500000,maxDaily:5000000,requireApproval:25000,dualApproval:100000,sanctions:["KP","IR","SY","CU","RU"],kycRequired:true}},
  enterprise:{id:"enterprise",label:"Enterprise Direct",icon:"◐",accent:"#3DB88A",
    desc:"Complex multi-entity payments, ERP integration, global compliance",
    defaults:{amount:1200000,currency:"USD",fromCountry:"US",toCountry:"JP",toCurrency:"JPY",beneficiary:"Toyota Motor Corp",purpose:"Strategic supplier — Q1 manufacturing",urgency:"standard",intentSource:"erp"},
    policies:{maxSingle:5000000,maxDaily:20000000,requireApproval:500000,dualApproval:1000000,sanctions:["KP","IR","SY","CU","RU","BY"],kycRequired:true}},
  consumer:{id:"consumer",label:"Consumer AI Finance",icon:"◍",accent:"#C46E8A",
    desc:"Personal AI agents — yield-only spending, DeFi governance",
    defaults:{amount:85,currency:"USDC",fromCountry:"US",toCountry:"US",toCurrency:"USDC",beneficiary:"Self — Spending Card",purpose:"Yield-funded purchase",urgency:"standard",intentSource:"defi_agent"},
    policies:{maxSingle:500,maxDaily:2000,requireApproval:200,dualApproval:500,sanctions:["KP","IR","SY"],kycRequired:false}},
};

const RAILS=[
  {id:"visa",       name:"Visa Intelligent Commerce", speed:"Instant",  cost:"2.4%",   provider:"Visa",      type:"card"},
  {id:"mastercard", name:"Mastercard Agent Pay",      speed:"Instant",  cost:"2.5%",   provider:"Mastercard",type:"card"},
  {id:"swift",      name:"SWIFT gpi",                speed:"T+2",      cost:"$25–50",  provider:"SWIFT",     type:"bank"},
  {id:"sepa",       name:"SEPA Instant",             speed:"~8s",      cost:"€0.20",   provider:"SEPA",      type:"bank"},
  {id:"wooshpay",   name:"WooshPay API",             speed:"~4 min",   cost:"1.2%",    provider:"WooshPay",  type:"api"},
  {id:"stablecoin", name:"USDC / USDT",              speed:"~2 min",   cost:"$0.01",   provider:"Circle",    type:"crypto"},
  {id:"rtp",        name:"RTP / FedNow",             speed:"~3s",      cost:"$0.50",   provider:"TCH/Fed",   type:"instant"},
  {id:"defi",       name:"DeFi / Aave",              speed:"~12s",     cost:"Gas",     provider:"Aave",      type:"defi"},
  {id:"selfcustody",name:"Self-Custody Card",        speed:"Instant",  cost:"$0.02",   provider:"Wirex",     type:"self"},
];

const INTENT_SOURCES=[
  {id:"google_ucp",  name:"Google UCP",   color:"#4A9EFF"},
  {id:"openai",      name:"OpenAI Agent", color:"#3DB88A"},
  {id:"erp",         name:"ERP System",   color:"#C49A2C"},
  {id:"human",       name:"Human User",   color:"#C46E8A"},
  {id:"custom_agent",name:"Custom AI",    color:"#8B72D4"},
  {id:"defi_agent",  name:"DeFi Agent",   color:"#4A9EFF"},
];

const COUNTRIES=["US","UK","DE","JP","SG","BR","NG","AE","IN","AU","FR","CA","NL","CH","KP","IR","SY","CU","RU","BY","VE","MM"];
const CURRENCIES=["USD","EUR","GBP","JPY","SGD","BRL","NGN","AED","INR","AUD","CHF","CAD","USDC","USDT"];
const TX_STATES=["Created","Validated","Risk Assessed","Approved","Routed","Settled","Reconciled"];

const FX={EUR:0.92,GBP:0.79,JPY:149.5,SGD:1.34,BRL:4.97,NGN:1550,AED:3.67,INR:83.1,AUD:1.53,CHF:0.88,CAD:1.36,USD:1,USDC:1,USDT:1};

const COMPS=[
  {name:"Circuit & Chisel",raised:"$19.2M",lead:"Primary VC, ParaFi, Stripe",what:"ATXP protocol for agent-to-agent payments",gap:"No policy engine, no compliance, no multi-rail governance"},
  {name:"Natural",raised:"$9.8M",lead:"Abstract, Human Capital",what:"B2B agentic payment automation",gap:"No governance, no risk scoring, no audit trail"},
  {name:"Nekuda",raised:"$5M",lead:"Madrona, Visa, Amex Ventures",what:"Agent checkout & credential management",gap:"No policy enforcement, no rail optimisation, no DeFi"},
  {name:"t54 Labs",raised:"$5M",lead:"Anagram, Franklin Templeton, Ripple",what:"Know Your Agent identity & compliance",gap:"No payment governance, no rail selection, no policy engine"},
  {name:"Based",raised:"$11.5M",lead:"Pantera, Coinbase Ventures",what:"Consumer agentic commerce on Hyperliquid",gap:"No enterprise governance, no multi-rail, no compliance"},
  {name:"Certen Protocol",raised:"Unknown",lead:"Chain-first",what:"On-chain payment policy",gap:"Minimal traction, no enterprise rails, no cross-chain governance"},
];

function genId(){return "PAY-"+Math.random().toString(36).substr(2,8).toUpperCase();}
function genTx(){return "RVN-"+Date.now().toString(36).toUpperCase()+Math.random().toString(36).substr(2,4).toUpperCase();}
function fmtAmt(n){return Number(n).toLocaleString();}
function now(){const d=new Date();return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})+' · '+d.toTimeString().slice(0,8);}

// ─── Simulation Engine ───────────────────────────────────────────────────────
function pickRail(payment,vertical){
  const {toCountry,toCurrency,amount,urgency}=payment;
  if(vertical==="consumer") return {id:"selfcustody",name:"Self-Custody Card",provider:"Wirex/Gnosis Pay",reason:"Yield-funded self-custody wallet minimises counterparty risk and preserves principal protection."};
  if(toCurrency==="USDC"||toCurrency==="USDT") return {id:"stablecoin",name:"USDC / USDT",provider:"Circle",reason:"Stablecoin settlement offers near-zero cost with sub-minute finality."};
  if(["DE","FR","NL","CH","BE","AT"].includes(toCountry)) return {id:"sepa",name:"SEPA Instant",provider:"SEPA",reason:"EUR-zone destination qualifies for SEPA Instant — sub-second settlement at €0.20 flat."};
  if(urgency==="critical"&&amount<50000) return {id:"rtp",name:"RTP / FedNow",provider:"TCH/Fed",reason:"Critical urgency with moderate amount — RTP delivers seconds settlement at $0.50."};
  if(amount>100000) return {id:"swift",name:"SWIFT gpi",provider:"SWIFT",reason:"High-value cross-border transfer — SWIFT gpi offers end-to-end tracking with correspondent banking network."};
  if(["IN","SG","NG","AE"].includes(toCountry)) return {id:"wooshpay",name:"WooshPay API",provider:"WooshPay",reason:"Emerging market corridor optimised via WooshPay local rails — 1.2% with fast settlement."};
  if(amount<5000) return {id:"visa",name:"Visa Intelligent Commerce",provider:"Visa",reason:"Sub-$5K transaction on supported corridor — Visa TAP-enabled instant settlement at 2.4%."};
  return {id:"swift",name:"SWIFT gpi",provider:"SWIFT",reason:"Default high-value cross-border routing via SWIFT gpi with end-to-end tracking."};
}

function simulateAgent(agentId,payment,vert,policies){
  const v=VERTICALS[vert];
  const isSanctionedCountry=policies.sanctions.includes(payment.toCountry);
  const overMax=payment.amount>policies.maxSingle;
  const needsDual=payment.amount>=policies.dualApproval;
  const isCross=payment.fromCountry!==payment.toCountry;
  const isCrossCcy=payment.currency!==payment.toCurrency;
  const isHV=payment.amount>100000;
  const riskScore=Math.max(5,Math.min(95,
    (isSanctionedCountry?95:isCross?(isHV?44:30):(isHV?22:15))+Math.floor(Math.random()*10)-5));
  const rail=pickRail(payment,vert);
  const fxRate=FX[payment.toCurrency]||1;
  const converted=isCrossCcy?Math.round(payment.amount*fxRate*100)/100:null;
  const feeRate=payment.amount>500000?0.0008:payment.amount>100000?0.0015:payment.amount>10000?0.003:0.024;
  const totalFee=Math.max(0.50,Math.round(payment.amount*feeRate*100)/100);
  const txId=genTx();

  if(agentId==="orchestrator") return {
    classification:isHV?"high-value":isCross?"cross-border":payment.urgency==="urgent"?"urgent":"standard",
    intentSource:payment.intentSource,priority:isHV||payment.urgency==="urgent"?"high":"medium",
    requiredChecks:["sanctions_screening","amount_validation","kyc_verification","corridor_check"],
    summary:`Classified ${isHV?"high-value ":""}${isCross?"cross-border ":""}${v.label.toLowerCase()} payment. ${needsDual?"Dual approval threshold met. ":""}Routing to governance.`
  };

  if(agentId==="governance"){
    if(isSanctionedCountry) return {
      approved:false,
      checks:[
        {name:"OFAC Sanctions Screening",status:"fail",detail:`Destination country ${payment.toCountry} is on the OFAC/EU consolidated sanctions list. Transaction blocked.`},
        {name:"Amount Validation",status:"pass",detail:`${payment.currency} ${fmtAmt(payment.amount)} within single transaction limit of $${fmtAmt(policies.maxSingle)}.`},
        {name:"Beneficiary Verification",status:"warning",detail:"Verification suspended — sanctions block takes precedence."}
      ],
      complianceScore:12,escalationRequired:false,
      regulatoryFrameworks:["OFAC","EU-Sanctions","FATF-R6","PSD2"],
      summary:`REJECTED — Destination country ${payment.toCountry} is sanctioned. Blocked at governance layer.`
    };
    if(overMax) return {
      approved:false,
      checks:[
        {name:"Amount Validation",status:"fail",detail:`${payment.currency} ${fmtAmt(payment.amount)} exceeds maximum single payment limit of $${fmtAmt(policies.maxSingle)}.`},
        {name:"OFAC Sanctions Screening",status:"pass",detail:`Destination ${payment.toCountry} cleared against OFAC, EU, and UN sanctions databases.`},
      ],
      complianceScore:35,escalationRequired:false,
      regulatoryFrameworks:["SOC2","PCI-DSS","ISO20022"],
      summary:`REJECTED — Amount exceeds maximum single payment policy threshold of $${fmtAmt(policies.maxSingle)}.`
    };
    const checks=[
      {name:"OFAC Sanctions Screening",status:"pass",detail:`Destination ${payment.toCountry} cleared against OFAC, EU, and UN consolidated sanctions databases. No matches found.`},
      {name:"Amount Validation",status:"pass",detail:`${payment.currency} ${fmtAmt(payment.amount)} within limit of $${fmtAmt(policies.maxSingle)} (${Math.round(payment.amount/policies.maxSingle*100)}% utilisation).`},
      {name:"Beneficiary Verification",status:"pass",detail:`"${payment.beneficiary}" verified against KYC registry. No adverse media or PEP flags.`},
      {name:"Daily Volume Check",status:payment.amount>policies.maxDaily*0.5?"warning":"pass",detail:`Daily volume at ${Math.round(payment.amount/policies.maxDaily*100)}% of $${fmtAmt(policies.maxDaily)} limit.`},
      {name:"AP2 Mandate Validation",status:["google_ucp","openai","erp","custom_agent"].includes(payment.intentSource)?"pass":"warning",detail:["google_ucp","openai","erp","custom_agent"].includes(payment.intentSource)?`Google AP2 Intent + Cart Mandate verified. Cryptographic proof of user authorisation confirmed. Revvyn enforcing whether acting on it is permitted.`:`No AP2 Mandate present for ${payment.intentSource} source. Revvyn applying enhanced policy scrutiny.`},
    ];
    if(isCross) checks.push({name:"Corridor Compliance",status:"pass",detail:`${payment.fromCountry} → ${payment.toCountry} corridor cleared. No capital control restrictions.`});
    if(policies.kycRequired) checks.push({name:"KYC/AML Verification",status:"pass",detail:`Enhanced due diligence completed. Risk rating: standard.`});
    if(["google_ucp","openai","erp","custom_agent"].includes(payment.intentSource)) checks.push({name:"AP2 Mandate Verification",status:"pass",detail:`Google Agent Payments Protocol mandate verified. Cryptographically-signed Intent Mandate confirms user authorised this agent action. AP2 proves authorisation — Revvyn enforces whether the payment is permitted.`});
    if(vert==="insurance") checks.push({name:"Claims Authorisation",status:"pass",detail:`Claim #${payment.purpose.slice(-8)} verified against policy register. Settlement within authorised limit.`});
    const esc=needsDual&&!overMax;
    return {
      approved:true,checks,complianceScore:isCross?87:94,
      escalationRequired:esc,
      escalationReason:esc?`Amount of ${payment.currency} ${fmtAmt(payment.amount)} meets dual approval threshold ($${fmtAmt(policies.dualApproval)}). Human authorisation required.`:null,
      escalationType:esc?"dual_approval":"none",
      regulatoryFrameworks:["PSD2","FATF","SOC2","PCI-DSS","ISO20022"].concat(isCross?["GDPR","MiCA"]:[]).concat(vert==="insurance"?["Solvency II","IAIS"]:[]),
      summary:`APPROVED — All ${checks.length} compliance checks passed.${esc?" Dual approval escalation triggered.":""} Score: ${isCross?87:94}%.`
    };
  }

  if(agentId==="control") return {
    riskScore,riskLevel:riskScore<30?"low":riskScore<60?"medium":riskScore<80?"high":"critical",
    fraudIndicators:[
      {indicator:"Velocity Check",severity:"low",detail:"Transaction frequency within normal patterns. No anomalies."},
      {indicator:"Beneficiary Pattern",severity:isCross?"medium":"low",detail:isCross?`First transaction to ${payment.toCountry} corridor this period. Enhanced monitoring applied.`:"Recurring beneficiary with established payment history."},
      {indicator:"Amount Deviation",severity:isHV?"medium":"low",detail:isHV?`Amount is ${Math.round(payment.amount/50000)}x above median for this vertical. Within policy.`:`Amount within expected range for ${v.label} payments.`},
    ],
    recommendedRail:rail,
    alternativeRails:[
      rail.id!=="visa"?{id:"visa",name:"Visa Intelligent Commerce",reason:"Card-rail fallback with Visa TAP agent authentication"}:null,
      rail.id!=="stablecoin"?{id:"stablecoin",name:"USDC / USDT",reason:"Near-zero cost stablecoin alternative"}:null,
    ].filter(Boolean).slice(0,2),
    fxOptimization:{
      applicable:isCrossCcy,
      strategy:isCrossCcy?`Mid-market rate lock with 15-minute execution window. Estimated savings vs retail: $${Math.round(payment.amount*0.003).toLocaleString()} ${payment.currency}.`:"N/A — same-currency settlement.",
    },
    summary:`Risk score ${riskScore}/100 (${riskScore<30?"low":riskScore<60?"medium":"high"}). Rail: ${rail.name} via ${rail.provider}.${isCrossCcy?` FX savings ~$${Math.round(payment.amount*0.003).toLocaleString()}.`:""}`
  };

  if(agentId==="execution") return {
    status:"settled",selectedRail:rail.name,provider:rail.provider,transactionId:txId,
    settlementTime:rail.id==="swift"?"T+2 (48h est.)":rail.id==="sepa"?"8.2 seconds":rail.id==="rtp"?"3.1 seconds":rail.id==="visa"||rail.id==="mastercard"?"Instant (sub-second)":rail.id==="stablecoin"?"2 min 14 sec":rail.id==="defi"?"12.4 sec (2 blocks)":"4 min 38 sec",
    fees:{total:totalFee,currency:"USD",breakdown:{network:Math.round(totalFee*.45*100)/100,fx:isCrossCcy?Math.round(totalFee*.3*100)/100:0,processing:Math.round(totalFee*.2*100)/100,compliance:Math.round(totalFee*.05*100)/100}},
    fxRate:isCrossCcy?fxRate:null,convertedAmount:converted,
    ledgerEntries:[
      {type:"debit",account:`Operating — ${payment.fromCountry}`,amount:payment.amount,currency:payment.currency},
      {type:"credit",account:`Beneficiary — ${payment.beneficiary}`,amount:converted||payment.amount,currency:payment.toCurrency},
    ],
    summary:`Settled ${payment.currency} ${fmtAmt(payment.amount)} via ${rail.name}.${converted?` Converted to ${payment.toCurrency} ${fmtAmt(converted)} @ ${fxRate}.`:""} Fees: $${totalFee}.`
  };

  if(agentId==="audit") return {
    auditId:"AUD-"+Date.now().toString(36).toUpperCase(),
    decisionChain:[
      {agent:"Orchestrator",decision:`Classified ${isHV?"high-value ":""}${isCross?"cross-border ":""}intent`,reasonCode:"ORCH-CLF-001",confidence:97},
      {agent:"Governance",decision:`All compliance checks passed. Score: ${isCross?87:94}%`,reasonCode:`GOV-APR-${needsDual?"DAP":"STD"}`,confidence:94},
      {agent:"Control",decision:`Risk ${riskScore}/100. Selected ${rail.name}`,reasonCode:`CTL-RSK-${riskScore<30?"LOW":"MED"}`,confidence:91},
      {agent:"Execution",decision:`Settled via ${rail.provider}. ${txId}. Fees: $${totalFee}`,reasonCode:"EXE-STL-OK",confidence:99},
      {agent:"Audit",decision:"Full regulatory trail. 7-year retention. All frameworks satisfied.",reasonCode:"AUD-CMP-FUL",confidence:96},
    ],
    complianceStatus:"compliant",
    riskClassification:riskScore<30?"low":riskScore<60?"medium":"high",
    regulatoryTags:["PSD2","FATF","SOC2","PCI-DSS","ISO20022"].concat(isCross?["GDPR","MiCA"]:[]).concat(vert==="insurance"?["Solvency II","IAIS"]:[]),
    dataRetention:"7 years",
    summary:`Audit complete. 5-agent decision chain recorded. All frameworks satisfied.`
  };
}

function StyleInjector(){useEffect(()=>{const s=document.createElement("style");s.textContent=CSS;document.head.appendChild(s);return()=>document.head.removeChild(s);},[]);return null;}

// ─── Components ──────────────────────────────────────────────────────────────
function Badge({label,value,color}){
  return <div style={{padding:"7px 9px",borderRadius:2,background:color+"10",border:`1px solid ${color}22`,minWidth:0}}>
    <div className="lbl" style={{margin:0,marginBottom:3,fontSize:9}}>{label}</div>
    <div style={{fontFamily:"var(--mono)",fontSize:14,fontWeight:700,color,lineHeight:1}}>{value}</div>
  </div>;
}

function TabBar({tabs,active,onChange,accent}){
  return <div style={{display:"flex",gap:1,borderBottom:"1px solid var(--border)",background:"var(--surface)",flexShrink:0,overflowX:"auto"}}>
    {tabs.map(t=><button key={t.id} onClick={()=>onChange(t.id)} style={{padding:"11px 16px",border:"none",background:"transparent",fontFamily:"var(--sans)",fontSize:11,fontWeight:600,color:active===t.id?(accent||"var(--gold)"):"var(--muted)",cursor:"pointer",letterSpacing:".06em",textTransform:"uppercase",whiteSpace:"nowrap",borderBottom:`2px solid ${active===t.id?(accent||"var(--gold)"):"transparent"}`,transition:"all .15s"}}>{t.label}</button>)}
  </div>;
}

function AgentPipeline({statuses,selected,onSelect}){
  return <div style={{display:"flex",gap:5,padding:"10px 14px",flexShrink:0,overflowX:"auto",borderBottom:"1px solid var(--border)",background:"var(--surface)"}}>
    {AGENTS.map((a,i)=>{
      const st=statuses[a.id]||"pending",sel=selected===a.id;
      return <div key={a.id} style={{display:"flex",alignItems:"center",gap:4,flex:"1 0 0",minWidth:0}}>
        <div onClick={()=>onSelect(a.id)} style={{flex:1,padding:"8px 7px",borderRadius:2,cursor:"pointer",minWidth:0,background:sel?a.color+"12":st==="running"?a.color+"06":"var(--card)",border:`1.5px solid ${sel?a.color:st==="running"?a.color+"50":"var(--border)"}`,transition:"all .2s",position:"relative",overflow:"hidden"}}>
          {st==="running"&&<div style={{position:"absolute",top:0,left:0,right:0,height:1,background:`linear-gradient(90deg,transparent,${a.color},transparent)`,animation:"shimmer 1.5s infinite"}}/>}
          <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:2}}>
            <span style={{fontFamily:"var(--mono)",fontSize:11,color:a.color}}>{a.icon}</span>
            <span style={{fontSize:10,fontWeight:700,color:a.color,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{a.name}</span>
            <div style={{width:6,height:6,borderRadius:"50%",flexShrink:0,background:st==="complete"?"#3DB88A":st==="failed"?"#E05252":st==="running"?a.color:"var(--border)",boxShadow:st==="running"?`0 0 8px ${a.color}`:"none",animation:st==="running"?"pulse 1s infinite":"none"}}/>
          </div>
          <div style={{fontSize:9,color:"var(--muted)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{st==="running"?"Processing…":st==="complete"?"Complete ✓":st==="failed"?"Blocked ✗":a.role}</div>
        </div>
        {i<AGENTS.length-1&&<span style={{color:st==="complete"?"#3DB88A":"var(--border)",fontFamily:"var(--mono)",fontSize:8,flexShrink:0}}>▸</span>}
      </div>;
    })}
  </div>;
}

function TxStateBar({current}){
  const idx=TX_STATES.indexOf(current);
  return <div style={{display:"flex",gap:2,padding:"6px 14px",flexShrink:0,flexWrap:"wrap",borderBottom:"1px solid var(--border)",background:"var(--surface)"}}>
    {TX_STATES.map((s,i)=><div key={s} style={{display:"flex",alignItems:"center",gap:2}}>
      <span style={{padding:"2px 7px",borderRadius:2,fontFamily:"var(--mono)",fontSize:9,fontWeight:600,background:i<=idx?"rgba(61,184,138,.08)":"var(--card)",color:i<=idx?"#3DB88A":"var(--dim)",border:i===idx?"1px solid rgba(61,184,138,.3)":"1px solid transparent"}}>{s.toUpperCase()}</span>
      {i<TX_STATES.length-1&&<span style={{color:i<idx?"#3DB88A":"var(--border)",fontSize:8}}>→</span>}
    </div>)}
  </div>;
}

function PaymentForm({vertical,onSubmit,isProcessing,killActive}){
  const v=VERTICALS[vertical];
  const [form,setForm]=useState({...v.defaults});
  useEffect(()=>setForm({...VERTICALS[vertical].defaults}),[vertical]);
  const u=(k,val)=>setForm(f=>({...f,[k]:val}));
  const isCross=form.fromCountry!==form.toCountry;
  const fxRate=FX[form.toCurrency]||1;
  const converted=form.currency!==form.toCurrency?Math.round(form.amount*fxRate*100)/100:null;

  return <div style={{display:"flex",flexDirection:"column",gap:11,padding:"14px 16px"}}>
    <div style={{padding:"11px 13px",borderRadius:2,background:v.accent+"08",border:`1px solid ${v.accent}22`}}>
      <div style={{fontSize:14,fontWeight:700,color:v.accent,marginBottom:2}}>{v.icon} {v.label}</div>
      <div style={{fontSize:12,color:"var(--muted)",lineHeight:1.5}}>{v.desc}</div>
    </div>
    <div>
      <label className="lbl">Intent Source</label>
      <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
        {INTENT_SOURCES.map(s=><button key={s.id} onClick={()=>u("intentSource",s.id)} style={{flex:"1 0 0",minWidth:55,padding:"6px 3px",borderRadius:2,border:`1px solid ${form.intentSource===s.id?s.color:"var(--border)"}`,background:form.intentSource===s.id?s.color+"12":"var(--card)",cursor:"pointer",textAlign:"center"}}>
          <div style={{fontSize:10,fontWeight:600,color:form.intentSource===s.id?s.color:"var(--muted)",fontFamily:"var(--mono)"}}>{s.name}</div>
        </button>)}
      </div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
      <div><label className="lbl">Amount</label><input type="number" className="inp" value={form.amount} onChange={e=>u("amount",Number(e.target.value))}/></div>
      <div><label className="lbl">Currency</label><select className="inp" value={form.currency} onChange={e=>u("currency",e.target.value)}>{CURRENCIES.map(c=><option key={c}>{c}</option>)}</select></div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
      <div><label className="lbl">From</label><select className="inp" value={form.fromCountry} onChange={e=>u("fromCountry",e.target.value)}>{COUNTRIES.map(c=><option key={c}>{c}</option>)}</select></div>
      <div><label className="lbl">To</label><select className="inp" value={form.toCountry} onChange={e=>u("toCountry",e.target.value)}>{COUNTRIES.map(c=><option key={c}>{c}</option>)}</select></div>
      <div><label className="lbl">To CCY</label><select className="inp" value={form.toCurrency} onChange={e=>u("toCurrency",e.target.value)}>{CURRENCIES.map(c=><option key={c}>{c}</option>)}</select></div>
    </div>
    {isCross&&converted&&<div style={{padding:"6px 10px",borderRadius:2,background:"rgba(74,158,255,.06)",border:"1px solid rgba(74,158,255,.2)",fontFamily:"var(--mono)",fontSize:11,color:"#4A9EFF"}}>
      ◆ FX: {form.currency} {fmtAmt(form.amount)} → {form.toCurrency} {fmtAmt(converted)} @ {fxRate} (ECB reference)
    </div>}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
      <div><label className="lbl">Beneficiary</label><input className="inp" value={form.beneficiary} onChange={e=>u("beneficiary",e.target.value)}/></div>
      <div><label className="lbl">Urgency</label><select className="inp" value={form.urgency} onChange={e=>u("urgency",e.target.value)}><option value="standard">Standard</option><option value="urgent">Urgent</option><option value="critical">Critical</option></select></div>
    </div>
    <div><label className="lbl">Purpose</label><input className="inp" value={form.purpose} onChange={e=>u("purpose",e.target.value)}/></div>
    <button onClick={()=>onSubmit({...form,id:genId(),timestamp:new Date().toISOString()})} disabled={isProcessing||killActive} style={{padding:"13px",borderRadius:2,border:"none",background:killActive?"rgba(224,82,82,.08)":isProcessing?"var(--border)":v.accent,color:killActive?"#E05252":isProcessing?"var(--muted)":v.accent==="#C49A2C"||v.accent==="#3DB88A"||v.accent==="#D4914A"?"#000":"#fff",fontFamily:"var(--mono)",fontSize:12,fontWeight:700,cursor:(isProcessing||killActive)?"not-allowed":"pointer",letterSpacing:".08em",textTransform:"uppercase",transition:"all .2s"}}>
      {killActive?"⛔ HALTED":isProcessing?"⏳ AGENTS PROCESSING…":"▶ SUBMIT PAYMENT INTENT"}
    </button>
  </div>;
}

function PolicyEditor({vertical,policies,onChange}){
  const v=VERTICALS[vertical];
  const sliders=[
    {key:"maxSingle",label:"Max Single Payment",max:vertical==="consumer"?5000:10000000},
    {key:"maxDaily",label:"Daily Limit",max:vertical==="consumer"?20000:50000000},
    {key:"requireApproval",label:"Approval Threshold",max:vertical==="consumer"?2000:5000000},
    {key:"dualApproval",label:"Dual Approval",max:vertical==="consumer"?5000:10000000},
  ];
  return <div style={{display:"flex",flexDirection:"column",gap:14,padding:"14px 16px"}}>
    <div style={{fontSize:12,color:"var(--muted)"}}>Active governance rules for <span style={{color:v.accent,fontWeight:600}}>{v.label}</span></div>
    {sliders.map(s=><div key={s.key}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
        <label className="lbl" style={{margin:0}}>{s.label}</label>
        <span style={{fontFamily:"var(--mono)",fontSize:12,color:v.accent,fontWeight:600}}>${Number(policies[s.key]).toLocaleString()}</span>
      </div>
      <input type="range" min={0} max={s.max} step={vertical==="consumer"?50:50000} value={policies[s.key]} onChange={e=>onChange({...policies,[s.key]:Number(e.target.value)})} style={{width:"100%",accentColor:v.accent}}/>
    </div>)}
    <div style={{padding:"10px 12px",borderRadius:2,background:"var(--card)",border:"1px solid var(--border)"}}>
      <label className="lbl" style={{marginBottom:6}}>Sanctioned Countries</label>
      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
        {policies.sanctions.map(s=><span key={s} className="tag" style={{background:"rgba(224,82,82,.08)",color:"#E05252",border:"1px solid rgba(224,82,82,.2)"}}>{s}</span>)}
      </div>
    </div>
    {vertical==="consumer"&&<div style={{padding:"10px 12px",borderRadius:2,background:"rgba(196,110,138,.06)",border:"1px solid rgba(196,110,138,.18)"}}>
      <label className="lbl" style={{color:"#C46E8A",marginBottom:4}}>Yield Guardian</label>
      <div style={{fontSize:12,color:"var(--muted)",lineHeight:1.5}}>Principal protection: ON. Only accrued DeFi yield may be spent. Principal remains untouched.</div>
    </div>}
  </div>;
}

function AgentDetail({agentId,results}){
  const agent=AGENTS.find(a=>a.id===agentId);
  const result=results[agentId];
  if(!result) return <div style={{padding:28,textAlign:"center",color:"var(--dim)",fontSize:13}}>Select an agent above to inspect its decision output</div>;
  return <div style={{padding:"13px 15px",overflowY:"auto",flex:1,display:"flex",flexDirection:"column",gap:11}}>
    <div style={{display:"flex",alignItems:"center",gap:9}}>
      <span style={{fontSize:15,color:agent.color}}>{agent.icon}</span>
      <div>
        <div style={{fontSize:16,fontWeight:700,color:agent.color}}>{agent.name}</div>
        <div style={{fontSize:11,color:"var(--muted)"}}>{agent.role}</div>
      </div>
    </div>
    {result.summary&&<div style={{padding:"9px 11px",borderRadius:2,background:agent.color+"07",border:`1px solid ${agent.color}22`,fontSize:13,color:"var(--text)",lineHeight:1.6,opacity:.9}}>{result.summary}</div>}
    <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
      {result.complianceScore!==undefined&&<Badge label="Compliance" value={result.complianceScore+"%"} color={result.complianceScore>80?"#3DB88A":"#D4914A"}/>}
      {result.riskScore!==undefined&&<Badge label="Risk Score" value={result.riskScore+"/100"} color={result.riskScore<40?"#3DB88A":result.riskScore<70?"#D4914A":"#E05252"}/>}
      {result.approved!==undefined&&<Badge label="Decision" value={result.approved?"APPROVED":"REJECTED"} color={result.approved?"#3DB88A":"#E05252"}/>}
      {result.fees?.total!==undefined&&<Badge label="Fees" value={"$"+result.fees.total} color="#4A9EFF"/>}
      {result.status&&<Badge label="Settlement" value={result.status.toUpperCase()} color="#3DB88A"/>}
      {result.provider&&<Badge label="Provider" value={result.provider} color="#8B72D4"/>}
    </div>
    {result.checks&&<div>
      <label className="lbl" style={{marginBottom:5}}>Compliance Checks</label>
      {result.checks.map((c,i)=><div key={i} style={{display:"flex",alignItems:"flex-start",gap:6,marginBottom:3,padding:"6px 8px",borderRadius:2,background:"var(--card)",border:"1px solid var(--border)",fontSize:11}}>
        <span className="tag" style={{flexShrink:0,background:c.status==="pass"?"rgba(61,184,138,.1)":c.status==="fail"?"rgba(224,82,82,.1)":"rgba(212,145,74,.1)",color:c.status==="pass"?"#3DB88A":c.status==="fail"?"#E05252":"#D4914A"}}>{c.status.toUpperCase()}</span>
        <span style={{color:"var(--muted)",flex:1,lineHeight:1.5}}><strong style={{color:"var(--text)",fontWeight:600}}>{c.name}: </strong>{c.detail}</span>
      </div>)}
    </div>}
    {result.recommendedRail&&<div>
      <label className="lbl" style={{marginBottom:5}}>Rail Selection</label>
      <div style={{padding:"8px 10px",borderRadius:2,background:"rgba(61,184,138,.05)",border:"1px solid rgba(61,184,138,.2)",marginBottom:4}}>
        <div style={{fontSize:13,fontWeight:600,color:"#3DB88A",marginBottom:2}}>✓ {result.recommendedRail.name}</div>
        <div style={{fontSize:11,color:"var(--muted)"}}>{result.recommendedRail.reason}</div>
      </div>
      {result.alternativeRails?.map((r,i)=><div key={i} style={{padding:"5px 8px",borderRadius:2,background:"var(--card)",border:"1px solid var(--border)",marginBottom:2,fontSize:11,color:"var(--muted)"}}>
        Alt {i+1}: <span style={{color:"#4A9EFF"}}>{r.name}</span> — {r.reason}
      </div>)}
    </div>}
    {result.decisionChain&&<div>
      <label className="lbl" style={{marginBottom:5}}>Decision Chain</label>
      {result.decisionChain.map((d,i)=><div key={i} style={{display:"flex",gap:6,fontSize:11,marginBottom:2,padding:"5px 7px",borderRadius:2,background:"var(--card)",border:"1px solid var(--border)"}}>
        <span style={{fontFamily:"var(--mono)",fontSize:10,color:"#4A9EFF",fontWeight:600,whiteSpace:"nowrap"}}>[{d.reasonCode}]</span>
        <span style={{color:"var(--muted)",flex:1}}><strong style={{color:"var(--text)",fontWeight:600}}>{d.agent}:</strong> {d.decision}</span>
        <span style={{fontSize:10,color:"var(--muted)",opacity:.7,whiteSpace:"nowrap"}}>{d.confidence}%</span>
      </div>)}
    </div>}
    {result.regulatoryTags&&<div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
      {result.regulatoryTags.map(t=><span key={t} className="tag" style={{background:"rgba(196,154,44,.08)",color:"var(--gold)",border:"1px solid rgba(196,154,44,.2)"}}>{t}</span>)}
    </div>}
    <details>
      <summary style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--muted)"}}>▸ Raw JSON</summary>
      <pre style={{marginTop:5,padding:8,borderRadius:2,background:"var(--card)",fontSize:9,color:"var(--muted)",fontFamily:"var(--mono)",lineHeight:1.4,border:"1px solid var(--border)",whiteSpace:"pre-wrap",wordBreak:"break-word",maxHeight:200,overflow:"auto"}}>{JSON.stringify(result,null,2)}</pre>
    </details>
  </div>;
}

function AuditTrail({entries}){
  const ref=useRef();
  useEffect(()=>{if(ref.current)ref.current.scrollTop=ref.current.scrollHeight;},[entries]);
  return <div ref={ref} style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:2,padding:"10px 14px"}}>
    {entries.length===0&&<div style={{color:"var(--dim)",fontSize:13,textAlign:"center",padding:24}}>Audit trail populates as agents process transactions</div>}
    {entries.map((e,i)=>{
      const ag=AGENTS.find(a=>a.id===e.agent);
      return <div key={i} style={{padding:"6px 9px",borderRadius:2,background:"var(--card)",borderLeft:`2px solid ${ag?ag.color+"70":"var(--border)"}`,animation:"fadeUp .2s ease"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:3,gap:8}}>
          <span style={{fontSize:11,fontWeight:700,color:ag?ag.color:"var(--muted)",textTransform:"uppercase",letterSpacing:".06em",flexShrink:0}}>{e.agent}</span>
          <span style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--muted)",whiteSpace:"nowrap"}}>{e.time}</span>
        </div>
        <div style={{fontSize:12,color:"var(--text)",lineHeight:1.5,opacity:.85}}>{e.message}</div>
        {e.status&&<span className="tag" style={{display:"inline-block",marginTop:3,background:e.status==="pass"?"rgba(61,184,138,.09)":e.status==="fail"?"rgba(224,82,82,.09)":"rgba(212,145,74,.09)",color:e.status==="pass"?"#3DB88A":e.status==="fail"?"#E05252":"#D4914A",border:`1px solid ${e.status==="pass"?"rgba(61,184,138,.2)":e.status==="fail"?"rgba(224,82,82,.2)":"rgba(212,145,74,.2)"}`}}>{e.status.toUpperCase()}</span>}
      </div>;
    })}
  </div>;
}

function Analytics({payments}){
  const settled=payments.filter(p=>p.finalStatus==="settled");
  const rejected=payments.filter(p=>p.finalStatus==="rejected");
  const total=payments.reduce((s,p)=>s+(p.payment?.amount||0),0);
  const avgRisk=settled.length?Math.round(settled.reduce((s,p)=>s+(p.results?.control?.riskScore||0),0)/settled.length):0;
  return <div style={{display:"flex",flexDirection:"column",gap:10,padding:"14px 16px"}}>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
      {[["Processed",payments.length,`$${(total/1e6).toFixed(2)}M total`,"var(--gold)"],
        ["Settled",settled.length,`${payments.length?Math.round(settled.length/payments.length*100):0}% rate`,"#3DB88A"],
        ["Rejected",rejected.length,`${payments.length?Math.round(rejected.length/payments.length*100):0}% rate`,"#E05252"],
        ["Avg Risk",avgRisk,avgRisk<40?"Low":"Med",avgRisk<40?"#3DB88A":"#D4914A"],
      ].map(([label,value,sub,color])=><div key={label} style={{padding:"11px 12px",borderRadius:2,background:"var(--card)",border:"1px solid var(--border)"}}>
        <label className="lbl" style={{margin:0,marginBottom:4,fontSize:9}}>{label}</label>
        <div style={{fontFamily:"var(--mono)",fontSize:22,fontWeight:700,color,lineHeight:1}}>{value}</div>
        <div style={{fontSize:10,color:"var(--muted)",marginTop:3}}>{sub}</div>
      </div>)}
    </div>
    {payments.length===0&&<div style={{textAlign:"center",color:"var(--dim)",fontSize:13,padding:14}}>Submit payments to see analytics</div>}
    {payments.length>0&&<div>
      <label className="lbl" style={{marginBottom:6}}>Transaction History</label>
      <div style={{display:"flex",flexDirection:"column",gap:2,maxHeight:280,overflowY:"auto"}}>
        {[...payments].reverse().map(p=><div key={p.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 9px",borderRadius:2,background:"var(--card)",border:"1px solid var(--border)",fontSize:11}}>
          <div style={{width:6,height:6,borderRadius:"50%",background:p.finalStatus==="settled"?"#3DB88A":p.finalStatus==="rejected"?"#E05252":"#D4914A",flexShrink:0}}/>
          <span style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--muted)",flexShrink:0}}>{p.id}</span>
          <span style={{color:"var(--text)",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.payment?.beneficiary}</span>
          <span style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--gold)",flexShrink:0}}>{p.payment?.currency} {fmtAmt(p.payment?.amount)}</span>
          <span className="tag" style={{background:p.finalStatus==="settled"?"rgba(61,184,138,.08)":"rgba(224,82,82,.08)",color:p.finalStatus==="settled"?"#3DB88A":"#E05252",flexShrink:0}}>{p.finalStatus?.toUpperCase()}</span>
        </div>)}
      </div>
    </div>}
  </div>;
}

      <span style={{color:"var(--gold)",fontWeight:700}}>$50M+ raised</span> in agentic payment infrastructure in the last 6 months. Every funded company solves execution, identity, or checkout. <span style={{color:"var(--gold)",fontWeight:600}}>Nobody is building the governance layer. That's Revvyn.</span>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
        <span style={{fontSize:15,fontWeight:700,color:"var(--gold)"}}>◈ REVVYN</span>
        <span style={{fontFamily:"var(--mono)",fontSize:11,fontWeight:700,color:"#D4914A"}}>Raising $1.5M Seed</span>
      </div>
      <div style={{fontSize:12,color:"var(--text)",lineHeight:1.6,opacity:.9}}>Protocol-agnostic governance layer: policy enforcement, risk scoring, 9-rail optimisation, compliance audit trails. 6 verticals. Consumes trust signals — <span style={{color:"#E05252"}}>MVI</span>, <span style={{color:"#8B72D4"}}>ERC-8004</span>, <span style={{color:"#4A9EFF"}}>Visa TAP</span>, <span style={{color:"#3DB88A"}}>Google AP2 Mandate</span> — as inputs. <strong style={{color:"var(--gold)"}}>The only company building the governance layer for agentic commerce.</strong></div>
    </div>
  </div>;
}

  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",backdropFilter:"blur(6px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}}>
    <div style={{background:"var(--surface)",border:"1px solid rgba(212,145,74,.35)",borderRadius:3,padding:22,maxWidth:420,width:"100%",animation:"fadeUp .3s ease"}}>
      <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:14}}>
        <div style={{width:32,height:32,borderRadius:3,background:"rgba(212,145,74,.08)",border:"1px solid rgba(212,145,74,.25)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>⚠</div>
        <div>
          <div style={{fontSize:15,fontWeight:700,color:"#D4914A"}}>Human Review Required</div>
          <div style={{fontSize:11,color:"var(--muted)"}}>Pipeline paused — awaiting decision</div>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,padding:"9px 11px",borderRadius:2,background:"var(--card)",border:"1px solid var(--border)",marginBottom:9,fontSize:12}}>
        <div><span style={{color:"var(--muted)"}}>ID: </span><span style={{fontFamily:"var(--mono)",fontWeight:500}}>{payment.id}</span></div>
        <div><span style={{color:"var(--muted)"}}>Amount: </span><span style={{fontFamily:"var(--mono)"}}>{payment.currency} {fmtAmt(payment.amount)}</span></div>
        <div><span style={{color:"var(--muted)"}}>To: </span>{payment.beneficiary}</div>
        <div><span style={{color:"var(--muted)"}}>Route: </span>{payment.fromCountry} → {payment.toCountry}</div>
      </div>
      {reason&&<div style={{padding:"7px 9px",borderRadius:2,background:"rgba(212,145,74,.05)",border:"1px solid rgba(212,145,74,.18)",fontSize:11,color:"var(--text)",lineHeight:1.5,marginBottom:9}}>{reason}</div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
        <button onClick={onReject} style={{padding:10,borderRadius:2,border:"1px solid rgba(224,82,82,.3)",background:"rgba(224,82,82,.06)",color:"#E05252",fontFamily:"var(--mono)",fontSize:10,fontWeight:600,cursor:"pointer",letterSpacing:".08em"}}>✗ REJECT</button>
        <button onClick={onApprove} style={{padding:10,borderRadius:2,border:"none",background:"#3DB88A",color:"#000",fontFamily:"var(--mono)",fontSize:10,fontWeight:700,cursor:"pointer",letterSpacing:".08em"}}>✓ APPROVE</button>
      </div>
    </div>
  </div>;
}

    <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse 80% 50% at 50% -10%,rgba(196,154,44,.06),transparent 60%)"}}/>
    <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse 60% 40% at 80% 90%,rgba(139,114,212,.04),transparent 50%)"}}/>
    <div style={{textAlign:"center",maxWidth:720,position:"relative",zIndex:1}}>
      <div style={{display:"inline-flex",alignItems:"center",gap:12,marginBottom:32,animation:"fadeUp .6s ease-out"}}>
        <div style={{width:48,height:48,borderRadius:3,background:"linear-gradient(135deg,#C49A2C,#A8821E)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:800,color:"#000",animation:"glow 3s ease-in-out infinite"}}>R</div>
        <div style={{textAlign:"left"}}>
          <div style={{fontSize:22,fontWeight:800,letterSpacing:"-.3px"}}>Revvyn</div>
          <div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--muted)",letterSpacing:".1em"}}>GOVERNANCE SIMULATOR</div>

      <h1 style={{fontSize:"clamp(28px,5vw,52px)",fontWeight:800,lineHeight:1.1,marginBottom:20,animation:"fadeUp .6s ease-out .1s both"}}>
        The Governance Layer for{" "}
        <span style={{background:"linear-gradient(135deg,#C49A2C,#D4914A)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Agentic Commerce</span>
      </h1>
      <p style={{fontSize:"clamp(15px,2vw,18px)",color:"var(--muted)",lineHeight:1.6,marginBottom:16,maxWidth:520,margin:"0 auto 24px",animation:"fadeUp .6s ease-out .2s both"}}>When an AI agent wants to spend money, Revvyn decides if it's allowed to.</p>
      <div style={{display:"inline-block",padding:"9px 18px",borderRadius:2,background:"rgba(196,154,44,.06)",border:"1px solid rgba(196,154,44,.2)",marginBottom:36,animation:"fadeUp .6s ease-out .25s both"}}>
        <span style={{fontFamily:"var(--mono)",fontSize:13,color:"var(--gold)",fontWeight:600}}>$50M+ raised in agentic payments infra. $0 in governance.</span>
      </div>
      <div style={{display:"flex",justifyContent:"center",gap:"clamp(24px,5vw,56px)",marginBottom:40,animation:"fadeUp .6s ease-out .3s both",flexWrap:"wrap"}}>
        {[["6","Verticals","var(--gold)"],["9","Payment Rails","#4A9EFF"],["5","AI Agents","#8B72D4"]].map(([n,label,color])=><div key={label} style={{textAlign:"center"}}>
          <div style={{fontFamily:"var(--mono)",fontSize:"clamp(32px,4vw,48px)",fontWeight:700,color,lineHeight:1}}>{n}</div>
          <div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--muted)",letterSpacing:"1.2px",marginTop:2}}>{label.toUpperCase()}</div>

      </div>
      <div style={{display:"flex",gap:11,justifyContent:"center",flexWrap:"wrap",animation:"fadeUp .6s ease-out .4s both"}}>
        <button onClick={onAutoDemo} style={{padding:"13px 32px",borderRadius:2,border:"none",background:"linear-gradient(135deg,#C49A2C,#A8821E)",color:"#000",fontFamily:"var(--mono)",fontSize:12,fontWeight:700,cursor:"pointer",letterSpacing:".1em",boxShadow:"0 4px 28px rgba(196,154,44,.22)",textTransform:"uppercase"}}>▶ Watch Live Demo</button>
        <button onClick={onEnter} style={{padding:"13px 32px",borderRadius:2,border:"1px solid var(--border)",background:"transparent",color:"var(--text)",fontFamily:"var(--mono)",fontSize:12,fontWeight:500,cursor:"pointer",letterSpacing:".1em",textTransform:"uppercase"}}>Open Simulator</button>
      </div>
      <div style={{marginTop:16,animation:"fadeUp .6s ease-out .5s both"}}>
        <button onClick={()=>window.open("mailto:daniel@revvyn.io?subject=Revvyn%20Access%20Request","_blank")} style={{padding:"8px 18px",borderRadius:2,border:"1px solid rgba(196,154,44,.28)",background:"rgba(196,154,44,.05)",color:"var(--gold)",fontFamily:"var(--mono)",fontSize:10,cursor:"pointer",letterSpacing:".1em",textTransform:"uppercase"}}>Request Early Access</button>
      </div>

}

// ─── App ─────────────────────────────────────────────────────────────────────
function App(){
  const [theme,setTheme]=useState("dark");
  const [showHero,setShowHero]=useState(true);
  const [vertical,setVertical]=useState("treasury");
  const [policies,setPolicies]=useState({...VERTICALS.treasury.policies});
  const [payments,setPayments]=useState([]);
  const [agentStatuses,setAgentStatuses]=useState({});
  const [agentResults,setAgentResults]=useState({});
  const [selectedAgent,setSelectedAgent]=useState(null);
  const [auditEntries,setAuditEntries]=useState([]);
  const [isProcessing,setIsProcessing]=useState(false);
  const [killActive,setKillActive]=useState(false);
  const [txState,setTxState]=useState(null);
  const [selectedRail,setSelectedRail]=useState(null);
  const [leftTab,setLeftTab]=useState("payment");
  const [rightTab,setRightTab]=useState("pipeline");
  const [hitl,setHitl]=useState(null);
  const escRef=useRef(null);

  useEffect(()=>{document.documentElement.setAttribute("data-theme",theme);},[theme]);
  useEffect(()=>{setPolicies({...VERTICALS[vertical].policies});},[vertical]);

  const v=VERTICALS[vertical];

  const addAudit=useCallback((agent,message,status)=>{
    setAuditEntries(p=>[...p,{agent,message,status,time:now()}]);
  },[]);

  const processPayment=useCallback(async(paymentData)=>{
    if(isProcessing||killActive) return;
    const payment={...paymentData,id:paymentData.id||genId(),timestamp:paymentData.timestamp||new Date().toISOString(),vertical};
    setIsProcessing(true);
    setAgentStatuses({});setAgentResults({});setSelectedRail(null);setTxState("Created");
    setPayments(p=>[...p,{id:payment.id,payment,vertical,finalStatus:"pending"}]);
    const allResults={};let aborted=false;
    for(const agent of AGENTS){
      if(killActive){aborted=true;break;}
      await new Promise(r=>setTimeout(r,700+Math.random()*500));
      setAgentStatuses(p=>({...p,[agent.id]:"running"}));
      setSelectedAgent(agent.id);
      if(agent.id==="orchestrator") setTxState("Validated");
      if(agent.id==="governance") setTxState("Risk Assessed");
      if(agent.id==="control") setTxState("Routed");
      const result=simulateAgent(agent.id,payment,vertical,policies);
      allResults[agent.id]=result;
      setAgentResults(p=>({...p,[agent.id]:result}));
      if(agent.id==="governance"){
        if(result.approved===false){
          setAgentStatuses(p=>({...p,[agent.id]:"failed"}));
          addAudit(agent.id,`REJECTED — ${result.summary}`,"fail");
          result.checks?.filter(c=>c.status==="fail").forEach(c=>addAudit(agent.id,`✗ ${c.name}: ${c.detail}`,"fail"));
          aborted=true;
          setPayments(p=>p.map(x=>x.id===payment.id?{...x,finalStatus:"rejected",results:allResults}:x));
          break;
        }
        if(result.escalationRequired){
          addAudit(agent.id,`ESCALATION: ${result.escalationReason}`,"warning");
          setHitl({payment,reason:result.escalationReason});
          const approved=await new Promise(res=>{escRef.current=res;});
          setHitl(null);
          if(!approved){
            addAudit(agent.id,"REJECTED by human reviewer","fail");
            setAgentStatuses(p=>({...p,[agent.id]:"failed"}));
            aborted=true;
            setPayments(p=>p.map(x=>x.id===payment.id?{...x,finalStatus:"rejected",results:allResults}:x));
            break;
          }
          addAudit(agent.id,"APPROVED by human reviewer — pipeline resumed","pass");
          setTxState("Approved");
        }
        result.checks?.forEach(c=>addAudit(agent.id,`${c.name}: ${c.detail}`,c.status));
      }
      if(agent.id==="control"&&result.recommendedRail){
        setSelectedRail(result.recommendedRail.id);
        addAudit(agent.id,`Rail: ${result.recommendedRail.name} — ${result.recommendedRail.reason}`,"pass");
        addAudit(agent.id,`Risk: ${result.riskScore}/100 (${result.riskLevel})`,result.riskLevel==="low"?"pass":"warning");
      }
      if(agent.id==="execution"){
        setTxState("Settled");
        addAudit(agent.id,`SETTLED via ${result.selectedRail} [${result.provider}]`,"pass");
        addAudit(agent.id,`TX: ${result.transactionId} | Fees: $${result.fees.total}`);
        if(result.convertedAmount) addAudit(agent.id,`FX: ${payment.currency} ${fmtAmt(payment.amount)} → ${payment.toCurrency} ${fmtAmt(result.convertedAmount)} @ ${result.fxRate}`,"pass");
      }
      if(agent.id==="audit"){
        setTxState("Reconciled");
        result.decisionChain?.forEach(d=>addAudit(agent.id,`[${d.reasonCode}] ${d.agent}: ${d.decision}`));
        addAudit(agent.id,result.summary,"pass");
      }
      setAgentStatuses(p=>({...p,[agent.id]:"complete"}));
      if(agent.id!=="audit") addAudit(agent.id,result.summary||"Complete","pass");
    }
    if(!aborted){
      setPayments(p=>p.map(x=>x.id===payment.id?{...x,finalStatus:"settled",results:allResults}:x));
    }
    setIsProcessing(false);
  },[vertical,policies,killActive,isProcessing,addAudit]);

  const runAutoDemo=useCallback(()=>{
    setShowHero(false);setVertical("treasury");setPolicies({...VERTICALS.treasury.policies});
    setTimeout(()=>processPayment({...VERTICALS.treasury.defaults,id:genId(),timestamp:new Date().toISOString()}),300);
  },[processPayment]);

  if(showHero) return <><StyleInjector/><Hero onEnter={()=>setShowHero(false)} onAutoDemo={runAutoDemo}/></>;

  const leftTabs=[{id:"payment",label:"Payment"},{id:"policy",label:"Governance"},{id:"analytics",label:"Analytics"},{id:"landscape",label:"Landscape"}];
  const rightTabs=[{id:"pipeline",label:"Agent Detail"},{id:"audit",label:`Audit (${auditEntries.length})`}];

  return <div style={{height:"100vh",display:"flex",flexDirection:"column",background:"var(--bg)",overflow:"hidden"}}>
    <StyleInjector/>
    {/* Header */}
    <div style={{padding:"7px 14px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"space-between",background:"var(--surface)",flexShrink:0}}>
      <div style={{display:"flex",alignItems:"center",gap:9}}>
        <div onClick={()=>setShowHero(true)} style={{width:28,height:28,borderRadius:3,background:"linear-gradient(135deg,#C49A2C,#A8821E)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,color:"#000",cursor:"pointer"}}>R</div>
        <div>
          <div style={{fontSize:14,fontWeight:700,letterSpacing:"-.2px"}}>Revvyn</div>
          <div style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--muted)",letterSpacing:".08em"}}>GOVERNANCE SIMULATOR</div>
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:7}}>
        <button onClick={()=>setTheme(t=>t==="dark"?"light":"dark")} style={{padding:"6px 11px",borderRadius:2,border:"1px solid var(--border)",background:"transparent",color:"var(--muted)",fontFamily:"var(--mono)",fontSize:9,cursor:"pointer",letterSpacing:".06em"}}>
          {theme==="dark"?"◑ Light":"◐ Dark"}
        </button>
        <button className={"btn-kill"+(killActive?" halted":"")} onClick={()=>{setKillActive(k=>!k);addAudit("orchestrator",killActive?"System resumed":"⛔ KILL SWITCH — All processing halted",killActive?"pass":"fail");}}>
          {killActive?"⛔ HALTED":"■ KILL SWITCH"}
        </button>
        <button className="btn-access" onClick={()=>window.open("mailto:daniel@revvyn.io?subject=Revvyn%20Access%20Request","_blank")}>
          Request Access
        </button>
      </div>
    </div>
    {/* Verticals */}
    <div style={{display:"flex",gap:2,padding:"6px 10px",borderBottom:"1px solid var(--border)",background:"var(--surface)",flexShrink:0,overflowX:"auto"}}>
      {Object.values(VERTICALS).map(vt=><button key={vt.id} onClick={()=>{setVertical(vt.id);setAgentStatuses({});setAgentResults({});setAuditEntries([]);setSelectedAgent(null);setTxState(null);setSelectedRail(null);}} style={{padding:"5px 11px",borderRadius:2,border:`1px solid ${vertical===vt.id?vt.accent:"transparent"}`,background:vertical===vt.id?vt.accent+"10":"transparent",cursor:"pointer",fontFamily:"var(--sans)",fontSize:11,fontWeight:600,color:vertical===vt.id?vt.accent:"var(--muted)",whiteSpace:"nowrap",transition:"all .15s"}}>
        {vt.icon} {vt.label}
      </button>)}
    </div>
    {/* Agent pipeline */}
    <AgentPipeline statuses={agentStatuses} selected={selectedAgent} onSelect={id=>{setSelectedAgent(id);setRightTab("pipeline");}}/>
    {txState&&<TxStateBar current={txState}/>}
    {/* Main content */}
    <div style={{flex:1,display:"flex",overflow:"hidden"}}>
      {/* Left panel */}
      <div style={{width:"44%",maxWidth:500,borderRight:"1px solid var(--border)",display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <TabBar tabs={leftTabs} active={leftTab} onChange={setLeftTab} accent={v.accent}/>
        <div style={{flex:1,overflowY:"auto"}}>
          {leftTab==="payment"&&<PaymentForm vertical={vertical} onSubmit={processPayment} isProcessing={isProcessing} killActive={killActive}/>}
          {leftTab==="policy"&&<PolicyEditor vertical={vertical} policies={policies} onChange={setPolicies}/>}
          {leftTab==="analytics"&&<Analytics payments={payments}/>}
          {leftTab==="landscape"&&<Landscape/>}
        </div>
      </div>
      {/* Right panel */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <TabBar tabs={rightTabs} active={rightTab} onChange={setRightTab}/>
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          {rightTab==="pipeline"&&<AgentDetail agentId={selectedAgent||"orchestrator"} results={agentResults}/>}
          {rightTab==="audit"&&<AuditTrail entries={auditEntries}/>}
        </div>
      </div>
    </div>
    {hitl&&<HITLModal payment={hitl.payment} reason={hitl.reason} onApprove={()=>{if(escRef.current)escRef.current(true);}} onReject={()=>{if(escRef.current)escRef.current(false);}}/>}
  </div>;
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
